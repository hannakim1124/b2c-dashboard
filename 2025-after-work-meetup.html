<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퇴근 후 밋업 (2025)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f2f4f6; color: #191F28; padding: 48px 24px; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; }
    .back { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: #8b95a1; font-size: 13px; font-weight: 500; margin-bottom: 24px; }
    .back:hover { color: #3182f6; }
    .hero { background: #fff; border-radius: 20px; padding: 56px 40px; text-align: center; box-shadow: 0 1px 3px rgba(4,4,4,0.04); margin-bottom: 24px; }
    .type-tag { display: inline-block; font-size: 11px; padding: 4px 12px; border-radius: 8px; background: #fff3e0; color: #ff9500; font-weight: 700; margin-bottom: 12px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; color: #191F28; letter-spacing: -1px; }
    .subtitle { font-size: 14px; color: #8B95A1; margin-bottom: 8px; }
    .landing-link { display: inline-block; font-size: 12px; padding: 6px 14px; border-radius: 8px; background: #f9fafb; color: #3182f6; text-decoration: none; font-weight: 600; margin-top: 8px; }
    .landing-link:hover { background: #f2f4f6; }
    .coming-soon { display: inline-block; font-size: 48px; font-weight: 800; color: #e5e8eb; letter-spacing: 3px; margin: 32px 0 8px; }
    .coming-soon-desc { font-size: 13px; color: #b0b8c1; margin-bottom: 32px; }
    .connect-btn { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; padding: 14px 24px; border-radius: 12px; background: #191F28; color: #fff; border: none; cursor: pointer; font-family: Pretendard; font-weight: 700; transition: all 0.15s; }
    .connect-btn:hover { background: #3182F6; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(49,130,246,0.3); }
    .docs-card { background: #fff; border-radius: 16px; padding: 24px 28px; box-shadow: 0 1px 3px rgba(4,4,4,0.04); }
    .docs-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: #333D4B; display: flex; justify-content: space-between; align-items: center; }
    .docs-count { font-size: 12px; color: #8B95A1; font-weight: 500; }
    .doc-row { display: flex; align-items: center; padding: 10px 14px; border-radius: 10px; background: #f9fafb; margin-bottom: 6px; font-size: 13px; flex-wrap: wrap; gap: 6px; }
    .doc-row .doc-label { flex: 1; color: #4e5968; min-width: 140px; }
    .doc-row .doc-link { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: #fff; color: #3182f6; text-decoration: none; font-weight: 600; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .doc-row .doc-link:hover { background: #e8f3ff; }
    .doc-row .doc-count-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #e8f3ff; color: #3182f6; font-weight: 700; margin-left: 4px; }
    .section-title { font-size: 11px; font-weight: 700; margin: 14px 0 8px; }
    .section-title.req { color: #00c48c; }
    .section-title.opt { color: #ff9500; }
    .section-title.per { color: #3182f6; }
    .empty-hint { text-align: center; font-size: 12px; color: #b0b8c1; padding: 24px; }

    /* 모달 */
    .modal-backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; justify-content: center; align-items: center; }
    .modal-inner { background: #fff; border-radius: 20px; padding: 28px; width: 580px; max-width: 92vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .modal-inner h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .modal-inner .modal-desc { font-size: 12px; color: #6B7684; margin-bottom: 18px; }
    .modal-section { background: #f9fafb; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
    .modal-section .sec-title { font-size: 11px; font-weight: 700; margin-bottom: 10px; }
    .modal-field { margin-bottom: 12px; }
    .modal-field:last-child { margin-bottom: 0; }
    .modal-field > label { display: block; font-size: 11px; color: #4e5968; font-weight: 600; margin-bottom: 4px; }
    .input-row { display: flex; gap: 6px; margin-bottom: 4px; }
    .input-row input { flex: 1; padding: 8px 12px; border: 1px solid #E5E8EB; border-radius: 8px; font-size: 12px; font-family: Pretendard; outline: none; }
    .input-row input:focus { border-color: #3182f6; }
    .input-row .remove-btn { width: 28px; flex-shrink: 0; border: none; background: #f2f4f6; color: #8b95a1; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: Pretendard; }
    .input-row .remove-btn:hover { background: #FEE; color: #F04452; }
    .add-link-btn { font-size: 11px; padding: 4px 10px; border: 1px dashed #E5E8EB; border-radius: 8px; background: #fff; color: #8b95a1; cursor: pointer; margin-top: 2px; font-family: Pretendard; font-weight: 600; }
    .add-link-btn:hover { background: #f9fafb; color: #3182f6; border-color: #3182f6; border-style: solid; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
    .modal-buttons button { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-family: Pretendard; font-weight: 700; cursor: pointer; }
    .btn-cancel { border: 1px solid #E5E8EB; background: #fff; color: #6B7684; }
    .btn-save { border: none; background: #191F28; color: #fff; }
    .btn-save:hover { background: #3182F6; }

    @media (max-width: 480px) {
      body { padding: 24px 16px; }
      .hero { padding: 36px 20px; }
      h1 { font-size: 22px; }
      .coming-soon { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="./index.html" class="back">← B2C 대시보드</a>

    <!-- 히어로 -->
    <div class="hero">
      <span class="type-tag" id="typeTag">2025 · 밋업</span>
      <h1 id="eventTitle">퇴근 후 밋업</h1>
      <p class="subtitle" id="subtitleText">[부제/테마] | 2025.MM.DD</p>

      <div class="coming-soon">COMING SOON</div>
      <p class="coming-soon-desc">문서 연결 후 데이터 대시보드가 생성됩니다</p>

      <button class="connect-btn" onclick="openDocModal()">
        📋 <span>필요 문서 연결하기 <span id="btn-count">(0/11)</span></span>
      </button>
    </div>

    <!-- 연결된 문서 -->
    <div class="docs-card">
      <h3>연결된 문서 <span class="docs-count" id="total-count">0/11</span></h3>
      <div id="docsList">
        <div class="empty-hint">아직 연결된 문서가 없어요<br>위 버튼을 눌러 문서를 하나씩 연결해주세요</div>
      </div>
      <div id="generateSection" style="display:none;margin-top:20px;padding-top:20px;border-top:1px solid #f2f4f6;text-align:center">
        <button onclick="requestGenerate()" style="display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:12px;background:#3182F6;color:#fff;border:none;cursor:pointer;font-family:Pretendard;font-weight:700;font-size:14px" onmouseenter="this.style.background='#1b64da'" onmouseleave="this.style.background='#3182F6'">🚀 <span>이 문서들로 대시보드 생성 요청</span></button>
        <p style="font-size:11px;color:#8b95a1;margin-top:10px;line-height:1.5">클릭하면 Claude에게 보낼 메시지가 클립보드에 복사돼요<br>채팅창에 붙여넣기만 하면 대시보드가 생성됩니다</p>
      </div>
    </div>

    <div id="toast" style="display:none;position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#191F28;color:#fff;padding:14px 24px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.15);z-index:9999"></div>
  </div>

  <!-- 문서 연결 모달 -->
  <div class="modal-backdrop" id="docModal">
    <div class="modal-inner">
      <h2>필요 문서 연결</h2>
      <div class="modal-desc">구글 드라이브 / 시트 / 노션 / EDA URL을 넣어요. 항목당 여러 링크 추가 가능 (+ 버튼)</div>
      <div id="modal-sections"></div>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="clearAllDocs()" style="color:#F04452;border-color:#fecaca;margin-right:auto">전체 지우기</button>
        <button class="btn-cancel" onclick="closeDocModal()">취소</button>
        <button class="btn-save" onclick="saveDocs()">저장</button>
      </div>
    </div>
  </div>

  <script>
    const EVENT_ID = 'after-work-meetup';
    const EVENT_NAME = '퇴근 후 밋업';
    const DOC_DEFS = [
      { id:1,  label:'예산 품의서',          group:'req', ph:'EDA / 드라이브 URL' },
      { id:2,  label:'정산 내역 (VAT 별도)',  group:'req', ph:'시트/문서 URL' },
      { id:3,  label:'신청자 원본 (구글폼)',   group:'req', ph:'구글 시트 URL' },
      { id:4,  label:'광고 리포트 (Meta 등)', group:'req', ph:'시트/리포트 URL' },
      { id:5,  label:'참여 실적 (줌 참석자 등)', group:'opt', ph:'시트/CSV URL' },
      { id:6,  label:'GA 데이터 (UTM 유입)',  group:'opt', ph:'시트 URL' },
      { id:7,  label:'만족도 설문',           group:'opt', ph:'시트 URL' },
      { id:8,  label:'이력서 DB 검증 (PDA팀)', group:'opt', ph:'시트/메타베이스 URL' },
      { id:9,  label:'SNS 후기·기대평',       group:'opt', ph:'링크 모음 URL' },
      { id:10, label:'사후 리포트 / WBR',      group:'per', ph:'문서 URL' },
      { id:11, label:'노션 업무일지',         group:'per', ph:'노션 URL' }
    ];
    const GROUP_META = {
      req: { title:'🟢 필수', color:'#00c48c', max:4 },
      opt: { title:'🟡 있으면 좋은', color:'#FF9500', max:5 },
      per: { title:'🔵 있으면 완벽', color:'#3182F6', max:2 }
    };

    // ── 저장/로드 ──────────────────────────────────
    function getDocs() {
      return JSON.parse(localStorage.getItem('b2c_docs_' + EVENT_ID) || '{}');
    }
    function setDocs(d) {
      localStorage.setItem('b2c_docs_' + EVENT_ID, JSON.stringify(d));
    }
    function toArray(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val;
      return [val];
    }

    // ── 모달 렌더 ──────────────────────────────────
    function renderModalSections() {
      const container = document.getElementById('modal-sections');
      container.innerHTML = '';
      ['req','opt','per'].forEach(grpKey => {
        const meta = GROUP_META[grpKey];
        const items = DOC_DEFS.filter(d => d.group === grpKey);
        let html = '<div class="modal-section">';
        html += '<div class="sec-title" style="color:' + meta.color + '">' + meta.title + ' <span id="m-count-' + grpKey + '" style="color:#B0B8C1;font-weight:500;margin-left:4px">0/' + meta.max + '</span></div>';
        items.forEach(d => {
          html += '<div class="modal-field" data-doc-id="' + d.id + '">';
          html += '<label>' + d.id + '. ' + d.label + '</label>';
          html += '<div class="doc-input-list"></div>';
          html += '<button type="button" class="add-link-btn" onclick="addInputRow(' + d.id + ', \'\')">+ 링크 추가</button>';
          html += '</div>';
        });
        html += '</div>';
        container.innerHTML += html;
      });
    }

    function addInputRow(docId, value) {
      const field = document.querySelector('.modal-field[data-doc-id="' + docId + '"]');
      if (!field) return;
      const list = field.querySelector('.doc-input-list');
      const def = DOC_DEFS[docId - 1];
      const row = document.createElement('div');
      row.className = 'input-row';
      const input = document.createElement('input');
      input.type = 'url';
      input.placeholder = def.ph;
      input.className = 'doc-input';
      input.value = value || '';
      input.addEventListener('input', updateModalCounts);
      row.appendChild(input);

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '×';
      removeBtn.title = '이 링크 지우기';
      removeBtn.onclick = function() {
        row.remove();
        // 모든 input이 지워지면 빈 input 하나 유지
        if (list.children.length === 0) addInputRow(docId, '');
        updateModalCounts();
      };
      row.appendChild(removeBtn);

      list.appendChild(row);
      updateModalCounts();
    }

    function getDocValues(docId) {
      const field = document.querySelector('.modal-field[data-doc-id="' + docId + '"]');
      if (!field) return [];
      return Array.from(field.querySelectorAll('.doc-input'))
        .map(i => i.value.trim()).filter(Boolean);
    }

    function updateModalCounts() {
      const hasValue = id => getDocValues(id).length > 0;
      const req = [1,2,3,4].filter(hasValue).length;
      const opt = [5,6,7,8,9].filter(hasValue).length;
      const per = [10,11].filter(hasValue).length;
      document.getElementById('m-count-req').textContent = req + '/4';
      document.getElementById('m-count-opt').textContent = opt + '/5';
      document.getElementById('m-count-per').textContent = per + '/2';
    }

    function openDocModal() {
      renderModalSections();
      const docs = getDocs();
      DOC_DEFS.forEach(d => {
        const urls = toArray(docs[d.id]);
        if (urls.length === 0) addInputRow(d.id, '');
        else urls.forEach(u => addInputRow(d.id, u));
      });
      updateModalCounts();
      document.getElementById('docModal').style.display = 'flex';
    }

    function closeDocModal() {
      document.getElementById('docModal').style.display = 'none';
    }

    document.getElementById('docModal').addEventListener('click', function(e) {
      if (e.target === this) closeDocModal();
    });

    function saveDocs() {
      const docs = {};
      DOC_DEFS.forEach(d => {
        const urls = getDocValues(d.id);
        if (urls.length === 1) docs[d.id] = urls[0];
        else if (urls.length > 1) docs[d.id] = urls;
      });
      setDocs(docs);
      renderDocs();
      closeDocModal();
      showToast('💾 저장 완료!');
    }

    function clearAllDocs() {
      if (!confirm('연결된 모든 문서를 지울까요?')) return;
      setDocs({});
      renderDocs();
      closeDocModal();
      showToast('🗑️ 전체 삭제 완료');
    }

    function removeDoc(id) {
      if (!confirm(DOC_DEFS[id-1].label + ' 문서를 지울까요?')) return;
      const docs = getDocs();
      delete docs[id];
      setDocs(docs);
      renderDocs();
    }

    // ── 렌더링 ────────────────────────────────────
    function renderDocs() {
      const docs = getDocs();
      const connected = Object.keys(docs).length;
      const totalUrls = Object.values(docs).reduce((sum, v) => sum + toArray(v).length, 0);

      document.getElementById('btn-count').textContent = '(' + connected + '/11)';
      document.getElementById('total-count').textContent = connected + '/11' + (totalUrls > connected ? ' (링크 ' + totalUrls + '개)' : '');

      updateDashboardPreview(connected, totalUrls);
      document.getElementById('generateSection').style.display = connected > 0 ? 'block' : 'none';

      const container = document.getElementById('docsList');
      if (connected === 0) {
        container.innerHTML = '<div class="empty-hint">아직 연결된 문서가 없어요<br>위 버튼을 눌러 문서를 하나씩 연결해주세요</div>';
        return;
      }

      let html = '';
      ['req','opt','per'].forEach(grp => {
        const items = DOC_DEFS.filter(d => d.group === grp && docs[d.id]);
        if (items.length === 0) return;
        const meta = GROUP_META[grp];
        html += '<div class="section-title ' + grp + '">' + meta.title + ' (' + items.length + '/' + meta.max + ')</div>';
        items.forEach(d => {
          const urls = toArray(docs[d.id]);
          let row = '<div class="doc-row">';
          row += '<span class="doc-label">' + d.id + '. ' + d.label;
          if (urls.length > 1) row += '<span class="doc-count-badge">' + urls.length + '</span>';
          row += '</span>';
          urls.forEach((u, idx) => {
            row += '<a class="doc-link" href="' + u + '" target="_blank" title="' + u + '">' + (urls.length > 1 ? '링크 ' + (idx+1) : '열기') + ' →</a>';
          });
          row += '<button onclick="removeDoc(' + d.id + ')" style="width:24px;height:24px;border-radius:50%;border:none;background:#f2f4f6;color:#8b95a1;cursor:pointer;font-size:13px;font-family:Pretendard" title="전체 삭제">×</button>';
          row += '</div>';
          html += row;
        });
      });
      container.innerHTML = html;
    }

    function updateDashboardPreview(connected, totalUrls) {
      const coming = document.querySelector('.coming-soon');
      const desc = document.querySelector('.coming-soon-desc');
      if (!coming || !desc) return;
      if (connected === 0) {
        coming.textContent = 'COMING SOON';
        coming.style.color = '#e5e8eb';
        coming.style.fontSize = '48px';
        desc.textContent = '문서 연결 후 데이터 대시보드가 생성됩니다';
      } else {
        const pct = Math.round(connected / 11 * 100);
        coming.textContent = pct + '%';
        coming.style.color = pct >= 36 ? '#3182F6' : '#FF9500';
        coming.style.fontSize = '64px';
        desc.innerHTML = '<span style="color:#191F28;font-weight:700">' + connected + '개 문서' + (totalUrls > connected ? ' · 총 링크 ' + totalUrls + '개' : '') + '</span> · 생성 버튼 누르면 대시보드 완성';
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 2500);
    }

    function requestGenerate() {
      const docs = getDocs();
      const lines = DOC_DEFS.filter(d => docs[d.id]).map(d => {
        const urls = toArray(docs[d.id]);
        return '- ' + d.label + ': ' + urls.join(' / ');
      }).join('\n');
      const msg = EVENT_NAME + ' 대시보드 만들어줘. 연결된 문서:\n' + lines;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(msg).then(() => {
          showToast('📋 복사 완료! Claude 채팅창에 붙여넣기 해주세요');
        }).catch(() => { prompt('아래 메시지를 복사해서 Claude에게 붙여넣기 하세요', msg); });
      } else { prompt('아래 메시지를 복사해서 Claude에게 붙여넣기 하세요', msg); }
    }

    renderDocs();
  </script>
</body>
</html>
