<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>localStorage 디버그</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', sans-serif; background: #F2F4F6; padding: 32px; line-height: 1.5; color: #191F28; }
    h1 { font-size: 24px; margin-bottom: 8px; letter-spacing: -0.02em; }
    .lead { font-size: 14px; color: #4E5968; margin-bottom: 24px; }
    .panel { background: #fff; border-radius: 14px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .key-name { font-size: 13px; font-weight: 800; color: #3182F6; margin-bottom: 8px; font-family: monospace; }
    .meta { font-size: 12px; color: #8B95A1; margin-bottom: 12px; }
    pre { background: #F9FAFB; border: 1px solid #E5E8EB; border-radius: 8px; padding: 16px; overflow: auto; font-size: 12px; max-height: 480px; line-height: 1.6; }
    .target { background: #FFF7E0; border: 2px solid #FFB700; }
    .target .key-name { color: #B57F00; }
    .copy-btn { padding: 6px 14px; background: #3182F6; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; margin-left: 8px; }
    .copy-btn:hover { background: #1B64DA; }
    .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 3px 10px; background: #E8F3FF; color: #3182F6; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .url-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; padding: 16px; background: #E5F9F4; border-radius: 8px; }
    .url-list-title { font-size: 13px; font-weight: 800; color: #008B6A; margin-bottom: 4px; }
    .url-item { font-size: 12px; word-break: break-all; padding: 6px 10px; background: #fff; border-radius: 6px; }
    a { color: #3182F6; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>📦 localStorage 디버그</h1>
  <p class="lead">b2c_* 로 시작하는 모든 키와 값을 표시합니다. 노란색 박스는 user-1778119091616 카드.</p>
  <p class="lead"><a href="index.html">← 피드로 돌아가기</a></p>

  <div id="output"></div>

  <script>
    const TARGET_ID = 'user-1778119091616';
    const out = document.getElementById('output');

    function copy(text) {
      navigator.clipboard.writeText(text).then(() => alert('복사됨!'));
    }
    window.copy = copy;

    function findUrls(obj) {
      const urls = [];
      function walk(v, path) {
        if (v == null) return;
        if (typeof v === 'string') {
          if (/^https?:\/\//.test(v)) urls.push({ path, url: v });
        } else if (Array.isArray(v)) {
          v.forEach((x, i) => walk(x, path + '[' + i + ']'));
        } else if (typeof v === 'object') {
          for (const k in v) walk(v[k], path + '.' + k);
        }
      }
      walk(obj, '');
      return urls;
    }

    const keys = Object.keys(localStorage).filter(k => k.startsWith('b2c_'));
    if (keys.length === 0) {
      out.innerHTML = '<div class="panel"><p>저장된 b2c_* 키가 없어요.</p></div>';
    }

    keys.forEach(k => {
      const raw = localStorage.getItem(k) || '';
      let parsed = null;
      try { parsed = JSON.parse(raw); } catch(e) {}

      // user-1778119091616 카드 특별 처리
      let isTarget = false;
      let targetCard = null;
      if (k === 'b2c_user_projects' && Array.isArray(parsed)) {
        targetCard = parsed.find(p => p.id === TARGET_ID);
        if (targetCard) isTarget = true;
      }
      if (k === 'b2c_overrides' && parsed && parsed[TARGET_ID]) {
        targetCard = parsed[TARGET_ID];
        isTarget = true;
      }

      const panel = document.createElement('div');
      panel.className = 'panel' + (isTarget ? ' target' : '');

      const size = (raw.length / 1024).toFixed(1) + ' KB';
      const itemCount = Array.isArray(parsed) ? parsed.length + ' items' : (parsed && typeof parsed === 'object' ? Object.keys(parsed).length + ' keys' : 'string');

      let targetSection = '';
      if (isTarget && targetCard) {
        const urls = findUrls(targetCard);
        targetSection = `
          <div class="url-list">
            <div class="url-list-title">🎯 user-1778119091616 카드의 모든 URL (${urls.length}개)</div>
            ${urls.map(u => `
              <div class="url-item">
                <span class="badge">${u.path}</span>
                <a href="${u.url}" target="_blank">${u.url}</a>
                <button class="copy-btn" onclick="copy('${u.url.replace(/'/g, "\\'")}')">복사</button>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:16px;font-size:12px;color:#4E5968;font-weight:700;">📋 카드 전체 데이터:</div>
          <pre>${JSON.stringify(targetCard, null, 2).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</pre>
        `;
      }

      panel.innerHTML = `
        <div class="row">
          <div class="key-name">${k}</div>
          <span class="badge">${itemCount}</span>
          <span class="badge">${size}</span>
          <button class="copy-btn" onclick="copy(${JSON.stringify(raw).replace(/"/g, '&quot;')})">전체 복사</button>
        </div>
        ${targetSection || ''}
        ${!isTarget ? `<pre>${(parsed ? JSON.stringify(parsed, null, 2) : raw).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])).slice(0, 8000)}</pre>` : ''}
      `;
      out.appendChild(panel);
    });
  </script>
</body>
</html>
