                              <span class="cnt">${item.val.toLocaleString()} <span style="color:var(--c-text-3);font-weight:600">${item.pct.toFixed(1)}%</span></span>
                            </div>
                          `).join('')}
                        </div>
                      </div>` : '';
                    const valLabel = sessIdx >= 0 ? '세션' : (userIdx >= 0 ? '사용자' : '건수');
                    const srcDist = aggregate(srcIdx);
                    const medDist = aggregate(medIdx);
                    const campDist = aggregate(campIdx);
                    const empty = (srcDist.length+medDist.length+campDist.length) === 0;
                    return `
                      <div style="font-size:11px;color:var(--c-text-3);margin-bottom:6px">GA 시트: ${dataRows.length.toLocaleString()}행 분석 · <a href="${escapeHtml(gaSheetUrl)}" target="_blank" rel="noopener" style="color:var(--c-primary);font-weight:600">시트 열기 ↗</a> · <span style="cursor:pointer;color:var(--c-danger)" onclick="if(confirm('GA 연결 끊을까요?')){localStorage.removeItem('b2c_ga_sheet_${escapeHtml(p.id || '')}');location.reload();}">연결 해제</span></div>
                      ${dist('📍 유입 출처 (Source) — ' + valLabel, srcDist)}
                      ${dist('🔗 매체 (Medium) — ' + valLabel, medDist)}
                      ${dist('🎯 캠페인 (Campaign) — ' + valLabel, campDist)}
                      ${empty ? '<div style="font-size:12px;color:var(--c-warning);font-weight:600;padding:10px 12px;background:var(--c-warning-bg);border-radius:6px;margin-top:8px">⚠️ UTM 컬럼(source/medium/campaign) 자동 인식 실패. 시트 헤더에 utm_source 등 키워드 포함 필요</div>' : ''}`;
                  }

                  // 데이터 없으면 입력 영역만
                  if (!adReport) {
                    return `
                      <section class="section" id="ad-efficiency">
                        <span class="sec-eyebrow">Ad Efficiency</span>
                        <h2 class="sec-title">📈 광고 효율</h2>
                        <div class="ad-card">
                          <div class="ad-empty" style="text-align:left">
                            <div style="font-weight:800;color:var(--c-text);margin-bottom:8px;font-size:14px">광고 리포트 연결</div>
                            <div style="margin-bottom:14px">광고 데이터 입력하면 <strong>노출 / 클릭 / CTR / CPC / CPA</strong>를 가독성 좋게 보여드려요</div>
                            <button onclick="openAdReportSubmitModal('${escapeHtml(p.id || '')}')" style="padding:12px 18px;background:var(--c-primary);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%">📥 광고 리포트 입력 (링크 / 텍스트)</button>
                          </div>
                          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--c-border)">
                            <div style="font-size:13px;font-weight:800;color:var(--c-text);margin-bottom:8px">🌐 GA 유입 출처 (UTM)</div>
                            ${renderGaSection()}
                          </div>
                        </div>
                      </section>`;
                  }

                  // 데이터 있으면 분석 결과
                  const r = adReport;
                  const fmt = (n) => (n != null ? Number(n).toLocaleString() : '-');
                  const kpis = [
                    r.totalSpent != null && { lbl: '광고비 집행', val: fmt(r.totalSpent) + '원', flavor: 'primary' },
                    r.impressions != null && { lbl: '노출', val: fmt(r.impressions), sub: 'Impressions' },
                    r.clicks != null && { lbl: '클릭', val: fmt(r.clicks), sub: 'Clicks' },
                    r.ctr != null && { lbl: 'CTR', val: r.ctr.toFixed(2) + '%', sub: '클릭률', light: r.ctr >= 2 ? 'green' : r.ctr >= 1 ? 'yellow' : 'red' },
                    r.cpc != null && { lbl: 'CPC', val: fmt(r.cpc) + '원', sub: '클릭당 단가', light: r.cpc <= 200 ? 'green' : r.cpc <= 500 ? 'yellow' : 'red' },
                    r.cpa != null && { lbl: 'CPA', val: fmt(r.cpa) + '원', sub: '전환당 단가', light: r.cpa <= 3500 ? 'green' : r.cpa <= 6500 ? 'yellow' : 'red' }
                  ].filter(Boolean);

                  // 캠페인/매체/소재별 분포
                  const distSection = (title, list) => list?.length ? `
                    <div style="margin-top:14px">
                      <div style="font-size:12px;font-weight:800;color:var(--c-text-2);margin-bottom:8px">${title}</div>
                      <div class="ad-source-list">
                        ${list.slice(0, 8).map(item => {
                          const pct = item.share != null ? item.share.toFixed(1) : '-';
                          return `
                            <div class="ad-source-row">
                              <span class="lbl" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</span>
                              <div class="bar-wrap"><div class="bar" style="width:${item.share || 0}%"></div></div>
                              <span class="cnt">${fmt(item.spent)}원${item.share != null ? ` (${pct}%)` : ''}</span>
                            </div>`;
                        }).join('')}
                      </div>
                    </div>` : '';

                  return `
                    <section class="section" id="ad-efficiency">
                      <span class="sec-eyebrow">Ad Efficiency</span>
                      <h2 class="sec-title">📈 광고 효율 <span style="font-size:12px;color:var(--c-text-3);font-weight:600;margin-left:6px">${r.lastUpdated ? '갱신 ' + r.lastUpdated : ''}</span></h2>
                      <div class="ad-card">
                        ${kpis.length ? `
                          <div class="ad-kpi-grid">
                            ${kpis.map(k => `
                              <div class="ad-kpi">
                                ${k.light ? `<span class="light ${k.light}"></span>` : ''}
                                <div class="lbl">${escapeHtml(k.lbl)}</div>
                                <div class="val ${escapeHtml(k.flavor || '')}">${escapeHtml(k.val)}</div>
                                ${k.sub ? `<div class="sub">${escapeHtml(k.sub)}</div>` : ''}
                              </div>
                            `).join('')}
                          </div>` : ''}
                        ${distSection('🎨 소재 / 캠페인별', r.byCampaign)}
                        ${distSection('📺 매체별', r.bySource)}
                        ${r.note ? `<div style="margin-top:12px;padding:10px 12px;background:var(--c-surface-alt);border-radius:8px;font-size:12px;color:var(--c-text-2);line-height:1.5">${escapeHtml(r.note)}</div>` : ''}
                        <div style="display:flex;gap:8px;margin-top:14px">
                          <button onclick="openAdReportSubmitModal('${escapeHtml(p.id || '')}')" style="padding:8px 14px;background:var(--c-primary-bg);color:var(--c-primary);border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🔄 리포트 다시 제출</button>

                        </div>
                        <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--c-border)">
                          <div style="font-size:13px;font-weight:800;color:var(--c-text);margin-bottom:8px">🌐 GA 유입 출처 (UTM)</div>
                          ${renderGaSection()}
                        </div>
                      </div>
                    </section>`;
                })()}
                ${donutHtml}
                ${linksHtml}
                ${retroHtml}
                ${historyHtml}
                ${actionsHtml}
                ${relHtml}
              </div>

              <aside class="toc">
                <div class="toc-title">목차</div>
                <ul>
                  <li><a href="#kpi" data-toc><span class="num">01</span>핵심 지표</a></li>
                  ${showStorySection ? '<li><a href="#story" data-toc><span class="num">02</span>이야기</a></li>' : ''}
                  <li><a href="#budget" data-toc><span class="num">${showStorySection ? '03' : '02'}</span>예산</a></li>
                  <li><a href="#ad-efficiency" data-toc><span class="num">${showStorySection ? '04' : '03'}</span>광고 효율</a></li>
                  ${(p.nextActions && p.nextActions.length) ? `<li><a href="#next" data-toc><span class="num">${showStorySection ? '05' : '04'}</span>다음 액션</a></li>` : ''}
                  ${relList.length ? `<li><a href="#related" data-toc><span class="num">${showStorySection ? '06' : '05'}</span>관련 프로젝트</a></li>` : ''}
                </ul>
                <div class="toc-timeline">
                  <div class="toc-title">📅 진행 타임라인</div>
                  ${timelineItems.length ? `
                    <div class="toc-timeline-list">
                      ${timelineItems.map((t, i, arr) => {
                        const cls = (t.date <= today) ? 'is-done' : '';
                        const isCurrent = (t.date <= today) && (i === arr.length - 1 || arr[i+1].date > today);
                        const finalCls = isCurrent && p.status !== 'done' ? 'is-now' : cls;
                        return `
                          <div class="toc-tl-item ${finalCls}">
                            <div class="toc-tl-date">${escapeHtml(t.date)}</div>
                            <div class="toc-tl-label">
                              ${t.icon ? `<span>${t.icon}</span>` : ''}<span style="flex:1;min-width:0">${escapeHtml(t.label)}</span>
                              <button onclick="editTimelineItem('${escapeHtml(p.id || '')}', ${i})" class="toc-tl-btn" title="수정">✏️</button>
                              <button onclick="removeTimelineItem('${escapeHtml(p.id || '')}', ${i})" class="toc-tl-btn" title="삭제">🗑</button>
                            </div>
                          </div>`;
                      }).join('')}
                    </div>
                  ` : '<div class="toc-tl-empty">아직 일정이 없어요</div>'}
                  <button onclick="openTimelineAddModal('${escapeHtml(p.id || '')}')" style="margin-top:12px;padding:8px 12px;background:transparent;color:var(--c-primary);border:1.5px dashed var(--c-primary);border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;width:100%">＋ 일정 추가</button>
                </div>
              </aside>
            </div>
          </div>
        </section>
      `;

      // TOC active highlight
      const tocLinks = document.querySelectorAll('.toc a[data-toc]');
      const sections = Array.from(tocLinks).map(l => document.querySelector(l.getAttribute('href')));
      function onScroll() {
        const y = window.scrollY + 140;
        let active = 0;
        sections.forEach((s, i) => { if (s && s.offsetTop <= y) active = i; });
        tocLinks.forEach((l, i) => l.classList.toggle('is-active', i === active));
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();

      // Top edit / delete
      topEdit.addEventListener('click', () => {
        location.href = 'index.html?edit=' + encodeURIComponent(p.id);
      });
      topDel.addEventListener('click', () => {
        if (!confirm(`⚠️ 경고) 정말 삭제하시겠어요?\n\n그런데 휴지통에서 찾을 수 있긴 해요 ㅎㅎ\n\n("${p.title}")`)) return;
        // 휴지통으로 이동
        try {
          const trash = JSON.parse(localStorage.getItem('b2c_trash') || '[]');
          trash.unshift({

    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
          else if (c === '"') inQuotes = false;
          else field += c;
        } else {
          if (c === '"') inQuotes = true;
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else if (c === '\r') {}
          else field += c;
        }
      }
      if (field || row.length) { row.push(field); rows.push(row); }
      return rows.filter(r => r.some(c => c));
    }

    // 헤더 라벨 정리: 멀티라인/긴 설명에서 첫 줄만 + 길이 제한
    function cleanLabel(h) {
      if (!h) return '';
      let s = h.split('\n')[0].trim();
      s = s.replace(/^\[?(선택|필수)\]?\s*/, '').replace(/\s*\([^)]*\)\s*$/, '').trim();
      if (s.length > 24) s = s.slice(0, 24) + '…';
      return s;
    }

    // 값 패턴 검사: 날짜 / 전화 / ID
    function looksLikeDate(s) {
      if (!s) return false;
      return /\d{4}[.\-/]\s*\d{1,2}[.\-/]\s*\d{1,2}/.test(s) || /(오전|오후|AM|PM)/.test(s);
    }
    function looksLikePhone(s) {
      const digits = (s || '').replace(/[^0-9]/g, '');
      return digits.length >= 10 && digits.length <= 11 && /^01/.test(digits);
    }

    // 컬럼 자동 인식: 헤더 키워드 + 값 패턴
    function detectColumns(headers, dataRows) {
      const result = { date: -1, jkId: -1, phone: -1, name: -1, categories: [] };
      const sample = dataRows.slice(0, 30);
      headers.forEach((h, idx) => {
        const head = (h || '').replace(/\s/g, '');
        if (result.date < 0 && /(제출|타임스탬프|일시|날짜|timestamp|date|submitted|등록일)/i.test(h)) result.date = idx;
        if (result.jkId < 0 && /(잡코|잡코리아|jobkorea|회원id|memberid|jkid)/i.test(head)) result.jkId = idx;
        if (result.phone < 0 && /(연락처|전화|핸드폰|휴대폰|phone|mobile|tel)/i.test(h)) result.phone = idx;
        if (result.name < 0 && /^(이름|성함|성명|name)/i.test(h)) result.name = idx;
      });
      // 헤더로 못 잡았으면 데이터 패턴으로 추정
      if (result.date < 0) {
        for (let i = 0; i < headers.length; i++) {
          const vals = sample.map(r => (r[i] || '').trim()).filter(Boolean);
          if (vals.length === 0) continue;
          const hits = vals.filter(looksLikeDate).length;
          if (hits / vals.length > 0.7) { result.date = i; break; }
        }
      }
      if (result.phone < 0) {
        for (let i = 0; i < headers.length; i++) {
          if ([result.date, result.jkId].includes(i)) continue;
          const vals = sample.map(r => (r[i] || '').trim()).filter(Boolean);
          if (vals.length === 0) continue;
          const hits = vals.filter(looksLikePhone).length;
          if (hits / vals.length > 0.7) { result.phone = i; break; }
        }
      }

      // 카테고리 컬럼: 텍스트면서 unique 값이 적은 컬럼 (직군/직무는 자유텍스트라도 OK)
      const skip = new Set([result.date, result.jkId, result.phone, result.name]);
      headers.forEach((h, idx) => {
        if (skip.has(idx)) return;
        if (/(동의|개인정보|약관|sms수신)/i.test((h || '').replace(/\s/g, ''))) return;
        const values = dataRows.map(r => (r[idx] || '').trim()).filter(Boolean);
        if (values.length < 2) return;
        if (values.length / dataRows.length < 0.1) return;
        const unique = new Set(values);
        const isJobHeader = /직군|직무|job|position/i.test(h || '');
        // 직군/직무 컬럼은 unique 조건 무시 (자유 텍스트도 OK), 그 외는 unique ≤ 20
        const isCategory = isJobHeader || (unique.size >= 2 && unique.size <= 20 && unique.size / values.length <= 0.5);
        if (isCategory) {
          result.categories.push({ idx, label: cleanLabel(h) || `컬럼 ${idx+1}`, uniqueCount: unique.size, fillRate: values.length / dataRows.length });
        }
      });
      // 카테고리 정렬: 응답률 높은 순
      result.categories.sort((a, b) => b.fillRate - a.fillRate);
      return result;
    }

    // 제출일시 파싱 — "2026. 5. 7. PM 12:51:01" 같은 한국 구글폼 형식 지원
    function parseSheetDate(s) {
      if (!s) return null;
      // 한국식: "2026. 5. 7. PM 12:51:01" 또는 "2026-05-07 12:51:01" 등
      const krMatch = s.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);
      if (krMatch) {
        const y = krMatch[1], m = krMatch[2].padStart(2, '0'), d = krMatch[3].padStart(2, '0');
        return `${y}-${m}-${d}`;
      }
      const isoMatch = s.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
      if (isoMatch) {
        return `${isoMatch[1]}-${isoMatch[2].padStart(2,'0')}-${isoMatch[3].padStart(2,'0')}`;
      }
      return null;
    }

    function renderSheetDashboard(rows, container, originalUrl, resumeCache, source, cacheFetchedAt, usedFallback, sheetId, containerId, projectId) {
      const headers = rows[0];
      const dataRows = rows.slice(1);
      const cols = detectColumns(headers, dataRows);

      // 1) KPI 산출
      const total = dataRows.length;
      const phoneSet = cols.phone >= 0
        ? new Set(dataRows.map(r => (r[cols.phone] || '').replace(/[^0-9]/g, '')).filter(Boolean))
        : null;
      const jkIdSet = cols.jkId >= 0
        ? new Set(dataRows.map(r => (r[cols.jkId] || '').trim().toLowerCase()).filter(Boolean))
        : null;
      const uniqueCount = phoneSet?.size ?? jkIdSet?.size ?? total;

      // 2) 날짜별 추이
      const byDate = {};
      if (cols.date >= 0) {
        dataRows.forEach(r => {
          const d = parseSheetDate(r[cols.date]);
          if (d) byDate[d] = (byDate[d] || 0) + 1;
        });
      }
      const sortedDates = Object.keys(byDate).sort();

      // 3) 카테고리별 분포
      let distributions = cols.categories.map(c => {
        const counts = {};
        dataRows.forEach(r => {
          const v = (r[c.idx] || '').trim();
          if (!v) return;
          counts[v] = (counts[v] || 0) + 1;
        });
        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        return { label: c.label, total: sorted.reduce((s, [, v]) => s + v, 0), items: sorted };
      });

      // 직무 카테고리들을 4개 직군으로 통합
      function classifyJob(s) {
        const lc = (s || '').toLowerCase().replace(/\s/g, '');
        if (/디자이너|디자인|ui|ux|영상|편집|3d|일러|모션/.test(lc)) return '디자인';
        if (/개발자|엔지니어|프론트|백엔드|qa|클라우드|보안|소프트웨어|개발|웹퍼블리셔|연구개발|데이터|ai|nc프로그래머|hw|sw/.test(lc)) return '개발';
        if (/pm|po|pl|기획자|기획|컨설턴트|ceo|coo|cto|cio|사업전략|경영|전략|마케팅|md|브랜드|광고|홍보/.test(lc)) return '기획';
        if (/영업|세일즈|sales|cs|cx|고객/.test(lc)) return '영업';
        if (/인사|hr|hrd|채용|교육|총무|재무|회계|세무|법무|구매|scm|물류|총무/.test(lc)) return '경영지원';
        return '기타';
      }
      function isJobLikeColumn(d) {
        // 헤더가 직군/직무면 무조건 통과
        if (/직군|직무|job|position/i.test(d.label || '')) return true;
        const text = d.items.map(([l]) => l).join(' ').toLowerCase();
        const matches = (text.match(/디자이너|개발자|엔지니어|기획|pm|pl|po|마케팅|영업|인사/g) || []).length;
        return matches >= 2;
      }
      const jobCols = distributions.filter(isJobLikeColumn);
      let jobGroupAggregate = null;
      if (jobCols.length >= 1) {
        const groups = { '개발': {}, '디자인': {}, '기획': {}, '영업': {}, '경영지원': {}, '기타': {} };
        const groupTotals = { '개발': 0, '디자인': 0, '기획': 0, '영업': 0, '경영지원': 0, '기타': 0 };
        jobCols.forEach(d => {
          d.items.forEach(([label, count]) => {
            const g = classifyJob(label);
            groups[g][label] = (groups[g][label] || 0) + count;
            groupTotals[g] += count;
          });
        });
        const grandTotal = Object.values(groupTotals).reduce((a, b) => a + b, 0);
        jobGroupAggregate = {
          total: grandTotal,
          groups: ['개발', '디자인', '기획', '영업', '경영지원', '기타'].map(name => ({
            name,
            count: groupTotals[name],
            pct: grandTotal > 0 ? (groupTotals[name] / grandTotal) * 100 : 0,
            items: Object.entries(groups[name]).sort((a, b) => b[1] - a[1])
          })).filter(g => g.count > 0).sort((a, b) => b.count - a.count)
        };
        // 직무 카테고리는 일반 분포 카드에서 제외
        distributions = distributions.filter(d => !isJobLikeColumn(d));
      }

      // 4) 이력서 업데이트 (메타베이스 캐시)
      const resumeUpdated = resumeCache?.resumeUpdated;
      const resumeBase = resumeCache?.totalIds ?? jkIdSet?.size;
      const resumeRate = (resumeUpdated != null && resumeBase) ? ((resumeUpdated / resumeBase) * 100).toFixed(1) : null;

      // ── 렌더 ──
      const sourceLabel = source === 'live'
        ? '🔄 실시간'
        : `📦 캐시 ${cacheFetchedAt ? cacheFetchedAt.slice(5,10).replace('-','/') + ' ' + cacheFetchedAt.slice(11,16) : ''}`;
      const fallbackBanner = '';
      // 최종본 잠금 상태 확인
      const lockKey = 'b2c_dashboard_locked_' + (projectId || 'default');
      const isLocked = !!localStorage.getItem(lockKey);
      const lockedAt = isLocked ? localStorage.getItem(lockKey) : null;

      const lockedBadge = isLocked ? `
        <div style="padding:10px 14px;background:var(--c-text);color:#fff;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px">
          🔒 최종본 잠금 (${escapeHtml(lockedAt ? lockedAt.slice(0,10) : '')}) — 데이터 업데이트 종료됨
        </div>` : '';

      const head = `
        ${fallbackBanner}
        ${lockedBadge}
        <div class="analysis-head">
          <div class="analysis-head-title">📋 ${escapeHtml(total.toLocaleString() + '행')} · ${escapeHtml(headers.length + '개 컬럼')} · ${sourceLabel}${resumeCache?.lastUpdated ? ` · 이력서 ${escapeHtml(resumeCache.lastUpdated)}` : ''}</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            ${isLocked ? `
              <button class="analysis-head-link" style="background:var(--c-surface-deep);color:var(--c-text-3);border:none;cursor:pointer;font-family:inherit" onclick="unlockDashboard('${escapeHtml(projectId || '')}')">🔓 잠금 해제</button>
            ` : `
              <button class="analysis-head-link" style="background:var(--c-warning-bg);color:#B57F00;border:none;cursor:pointer;font-family:inherit" onclick="updateSheetCache('${escapeHtml(sheetId)}','${escapeHtml(originalUrl).replace(/'/g,"\\'")}','${escapeHtml(containerId)}','${escapeHtml(projectId || '')}')">🔄 업데이트</button>
              <button class="analysis-head-link" style="background:var(--c-text);color:#fff;border:none;cursor:pointer;font-family:inherit" onclick="lockDashboard('${escapeHtml(projectId || '')}')">🔒 업데이트 종료</button>
            `}

      // 중복 제외 카운트 — 우선순위: 잡코리아ID > 연락처
      const dedupSet = jkIdSet || phoneSet;
      const dedupBy = jkIdSet ? '잡코리아ID' : (phoneSet ? '연락처' : null);
      const dupCount = dedupSet ? (total - dedupSet.size) : 0;

      const kpis = [
        {
          label: '총 신청',
          value: total.toLocaleString(),
          sub: dedupSet ? `중복 제외 ${dedupSet.size.toLocaleString()}명 (${dedupBy} 기준, 중복 ${dupCount}건)` : '시트 행 기준',
          flavor: 'primary'
        },
        ...(resumeUpdated != null
          ? [{ label: '이력서 업데이트', value: resumeUpdated.toLocaleString(), sub: resumeRate ? `매칭 ${resumeBase}명 중 ${resumeRate}%` : '메타베이스 매칭', flavor: 'success' }]
          : [])

        <div class="auto-kpi-grid">
          ${kpis.map(k => `
            <div class="auto-kpi">
              <div class="lbl">${escapeHtml(k.label)}</div>
              <div class="val ${escapeHtml(k.flavor)}">${escapeHtml(k.value)}</div>
              <div class="sub">${escapeHtml(k.sub || '')}</div>
            </div>
          `).join('')}
        </div>`;

      // 일별 추이 막대 차트 (스파이크 감지 + 사유 입력)
      let trendHtml = '';
      if (sortedDates.length >= 1) {
        const max = Math.max(...sortedDates.map(d => byDate[d]));
        const peakDate = sortedDates.find(d => byDate[d] === max);
        const peakLabel = peakDate ? peakDate.slice(5).replace('-', '/') : '';
        // 스파이크 감지: 하루 100명 이상이면 사유 입력 받기
        const reasons = JSON.parse(localStorage.getItem('b2c_spike_reasons_' + (projectId || 'default')) || '{}');
        const bars = sortedDates.map((d, i) => {
          const count = byDate[d];
          const pct = max > 0 ? (count / max) * 100 : 0;
          const isMax = count === max;
          const isSpike = count >= 100;
          const reason = reasons[d];
          const dayLabel = d.slice(5).replace('-', '/');
          const dow = ['일','월','화','수','목','금','토'][new Date(d).getDay()];
          let reasonHtml = '';
          if (reason) {
            reasonHtml = `<div class="trend-bar-reason is-set" data-date="${d}" data-count="${count}" title="클릭으로 변경">💡 ${escapeHtml(reason)}</div>`;
          } else if (isSpike) {
            reasonHtml = `<div class="trend-bar-reason is-ask" data-date="${d}" data-count="${count}">❓ 왜 튀었지?</div>`;
          }
          return `
            <div class="trend-bar-col">
              <div class="trend-bar-val ${isMax ? 'is-max' : ''}">${count.toLocaleString()}</div>
              <div class="trend-bar-track">
                <div class="trend-bar-fill ${isMax ? 'is-max' : ''}" style="height:${pct}%"></div>
              </div>
              <div class="trend-bar-label">${dayLabel}<br><span class="dow">${dow}</span></div>
              ${reasonHtml}
            </div>`;
        }).join('');
        trendHtml = `
          <div class="trend-card">
            <div class="dist-card-title">📈 일별 신청 추이
              <span class="total">${sortedDates.length}일 · 누적 ${total.toLocaleString()}명${peakDate ? ` · 피크 ${peakLabel} ${max.toLocaleString()}명` : ''}</span>
            </div>
            <div class="trend-bars">${bars}</div>
          </div>`;
      }

      // 직군 통합 카드 (4개 직군 + 토글 세부)
      let jobGroupHtml = '';
      if (jobGroupAggregate && jobGroupAggregate.groups.length) {
        const total = jobGroupAggregate.total;
        const colorMap = { '개발': 'dev', '디자인': 'design', '기획': 'plan', '영업': 'plan', '경영지원': 'etc', '기타': 'etc' };
        const iconMap = { '개발': '💻', '디자인': '🎨', '기획': '📋', '영업': '🤝', '경영지원': '🏢', '기타': '🏷️' };
        const rows = jobGroupAggregate.groups.map((g, i) => {
          const subMax = g.items[0]?.[1] || 1;
          const colorCls = colorMap[g.name] || 'etc';
          const detailRows = g.items.map(([label, count]) => {
            const pct = ((count / g.count) * 100).toFixed(1);
            const barPct = (count / subMax) * 100;
            return `
              <div class="jobgroup-detail-row">
                <span class="lbl" title="${escapeHtml(label)}">${escapeHtml(label)}</span>
                <div class="bar-wrap"><div class="bar ${colorCls}" style="width:${barPct.toFixed(1)}%"></div></div>
                <span class="cnt">${count.toLocaleString()}<span class="pct">${pct}%</span></span>
              </div>`;
          }).join('');
          return `
            <div class="jobgroup-item" data-idx="${i}">
              <div class="jobgroup-item-head" onclick="this.parentNode.classList.toggle('is-open')">
                <div class="jobgroup-icon">${iconMap[g.name] || '🏷️'}</div>
                <div class="jobgroup-name">${escapeHtml(g.name)}</div>
                <div class="jobgroup-bar-wrap"><div class="jobgroup-bar ${colorMap[g.name]}" style="width:${g.pct.toFixed(1)}%"></div></div>
                <div class="jobgroup-count">${g.count.toLocaleString()}<span class="pct">${g.pct.toFixed(1)}%</span></div>
                <div class="jobgroup-arrow">▶</div>
              </div>
              <div class="jobgroup-detail">
                <div class="jobgroup-detail-list">${detailRows}</div>
              </div>
            </div>`;
        }).join('');
        jobGroupHtml = `
          <div class="jobgroup-card">
            <div class="dist-card-title">👥 직군 분포 <span class="total">총 ${total.toLocaleString()}명 · 클릭하면 세부 직무 ↓</span></div>
            <div class="jobgroup-list">${rows}</div>
          </div>`;
      }

      // 카테고리 분포 카드들
      const distHtml = distributions.length ? `
        <div class="dist-grid">
          ${distributions.map(d => `
            <div class="dist-card">
              <div class="dist-card-title">📊 ${escapeHtml(d.label)} <span class="total">${d.items.length}개 항목</span></div>
              <div class="dist-list">
                ${d.items.slice(0, 8).map(([label, count]) => {
                  const pct = ((count / d.total) * 100).toFixed(1);
                  return `
                    <div class="dist-row">
                      <div class="dist-row-label" title="${escapeHtml(label)}">${escapeHtml(label)}</div>
                      <div class="dist-row-bar-wrap"><div class="dist-row-bar" style="width:${pct}%"></div></div>
                      <div class="dist-row-val">${count}<span class="pct">${pct}%</span></div>
                    </div>`;
                }).join('')}
              </div>
            </div>
          `).join('')}
        </div>` : '';

      // 원본 시트 미리보기는 개인정보 보호로 제거 (다운로드 차단과 동일 정책)
      const rawHtml = '';

      container.innerHTML = head + kpiHtml + trendHtml + jobGroupHtml + distHtml + rawHtml;

      // 스파이크 사유 클릭 → 모달
      container.querySelectorAll('.trend-bar-reason').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          openSpikeReasonModal(el.dataset.date, parseInt(el.dataset.count), projectId);
        });
      });

      // 다운로드 시스템에 신청자 분석 섹션 등록
      window._dashboardData = { rows, headers, total, byDate, sortedDates, jobGroupAggregate, distributions };
      registerApplicantSections({ rows, headers, total, byDate, sortedDates, jobGroupAggregate, distributions });
    }

        });

    // EDA 품의 추가 (예산품의 / 구매품의 다중)
    window.requestBudgetSync = function(projectId) {
      const input = document.getElementById('budgetEdiaInput');

      const ediaRef = input?.value.trim() || '';
      const itemType = typeSel?.value || 'budget';

      }
      const isUrl = /^https?:\/\//i.test(ediaRef);
      let ediaUrl = '', ediaNumber = '';
      if (isUrl) {
        ediaUrl = ediaRef;
        const m = ediaRef.match(/(\d{4,15})(?!.*\d{4,15})/);
        ediaNumber = m ? m[1] : '';
      } else {
        ediaNumber = ediaRef.replace(/\D/g, '');
        if (ediaNumber) {
          ediaUrl = itemType === 'concur'
            ? `https://us2.concursolutions.com/nui/invoice/list/myinvoices?subView=MYINVOICES`
            : `https://eda.jobkorea.co.kr/approval/${ediaNumber}`;
        }
      }

      const budgetKey = 'b2c_budget_' + projectId;
      let budget = null;
      try { budget = JSON.parse(localStorage.getItem(budgetKey) || 'null'); } catch(e) {}
      // 마이그레이션
      if (budget && !budget.list) {
        if (budget.ediaNumber || budget.amount) budget = { list: [{ ...budget, type: 'budget' }] };
        else budget = { list: [] };
      }
      if (!budget) budget = { list: [] };

      // 새 항목 추가 (placeholder)
      budget.list.push({
        type: itemType,
        ediaNumber, url: ediaUrl,
        title: '(매니저가 EDA에서 가져올 예정)',

      });

      const requestMsg = `${title} ${typeKr} 연동해줘\n- 타입: ${typeKr} (${itemType})\n- 시스템: ${sourceSystem}\n- 참조: ${ediaRef}\n- 번호: ${ediaNumber || '(추출 실패 — 직접 확인)'}\n- URL: ${ediaUrl}\n- 프로젝트 ID: ${projectId}\n\n→ ${sourceSystem} 열어서 정보 가져와 \`b2c_budget_${projectId}\` localStorage의 .list 배열의 마지막 항목(또는 번호 매칭) 갱신해주세요. 형식:\n\`\`\`json\n{ "type":"${itemType}","ediaNumber":"...","title":"...","amount":12000000,"status":"approved|pending|rejected","approvedAt":"2026-04-21","url":"...","items":[{"name":"...","amount":...,"note":"..."}] }\n\`\`\``;

      try {
        fetch(SLACK_WEBHOOK_DDANNA, {
          method: 'POST', mode: 'no-cors',
          body: JSON.stringify({
            text: `<@U09UQNGH6DC> 💰 *${typeKr} 연동 요청*\n` +
                  `• 프로젝트: ${title}\n` +
                  `• 시스템: ${sourceSystem}\n` +
                  `• 참조: \`${ediaRef}\`\n` +
                  `• 번호: ${ediaNumber || '(없음)'}\n` +
                  `• URL: ${ediaUrl}\n` +
                  `• 시간: ${new Date().toLocaleString('ko-KR')}\n\n` +
                  `요청 문구:\n\`\`\`${requestMsg}\`\`\``
          })
        }).catch(()=>{});

      showToast(`<span class="ok">✓</span>${typeKr} 추가됨! 정보 제출 모달 띄울게요...`);

      const newIdx = budget.list.length - 1;

    // 텍스트에서 EDA/컨커 정보 자체 파싱 (한국어 + 영어 키워드 지원)
    function parseEdaText(text) {
      const result = { items: [] };
      const rmComma = s => parseInt((s||'').replace(/[,원\s$₩KRWUSD]/gi, '')) || 0;
      // 번호 (EDA 품의번호 / 컨커 Invoice Number)
      const m1 = text.match(/(?:품의\s*번호|문서\s*번호|invoice\s*(?:number|id|no)?|송장\s*번호)[:\s#]*([A-Z0-9\-]+)/i);
      if (m1) result.ediaNumber = m1[1].trim();
      // 제목 (EDA 제목 / 컨커 Vendor / Description)
      const m2 = text.match(/(?:제목|title|description|vendor|공급업체|업체명)[:\s]*([^\n]+)/i);
      if (m2) result.title = m2[1].trim();
      // 총 금액 (EDA 총금액 / 컨커 Total / Invoice Total / Amount)
      const m3 = text.match(/(?:총\s*금액|총액|합계|총\s*예산|invoice\s*total|total\s*amount|grand\s*total|amount)[:\s]*[$₩]?([0-9,]+)\s*(?:원|krw|usd)?/i);
      if (m3) result.amount = rmComma(m3[1]);
      // 결재 상태
      if (/결재\s*완료|승인\s*완료|approved|paid|complete/i.test(text)) result.status = 'approved';
      else if (/반려|rejected|denied/i.test(text)) result.status = 'rejected';
      else if (/대기|pending|결재중|submitted|open|in\s*review/i.test(text)) result.status = 'pending';
      // 결재일 / 송장일 / 승인일
      const m4 = text.match(/(?:결재일|승인일|invoice\s*date|approved\s*on|payment\s*date)[:\s]*(\d{4}[-./]\d{1,2}[-./]\d{1,2})/i);
      if (m4) result.approvedAt = m4[1].replace(/[./]/g, '-');
      // 세부 항목 (한 줄에 "이름 ... 금액원" 또는 "이름 ... $금액" 형식)
      const lines = text.split('\n');
      lines.forEach(line => {
        // 한국어 형식: "이름 12,345원"
        let m = line.match(/^[\s\-•·*]*(.+?)\s+([0-9,]{4,})\s*원/);
        // 영어 형식: "이름  $12,345" 또는 "이름  KRW 12,345"
        if (!m) m = line.match(/^[\s\-•·*]*(.+?)\s+[$₩]\s*([0-9,]{4,})/);
        if (!m) m = line.match(/^[\s\-•·*]*(.+?)\s+(?:KRW|USD)\s+([0-9,]{4,})/i);
        if (m && !/총\s*금액|총액|합계|총\s*예산|품의|제목|결재|invoice\s*total|grand\s*total|amount\s*due|subtotal|tax|vat/i.test(m[1])) {
          const name = m[1].trim();
          const amount = rmComma(m[2]);
          if (name && amount > 0 && name.length < 60) {
            result.items.push({ name, amount, note: '' });
          }
        }
      });
      return result;
    }

          try {

    function parseAdReportText(text) {
      const r = {};
      const rmComma = s => parseInt((s||'').replace(/[,원\s%]/g, '')) || 0;
      const rmCommaFloat = s => parseFloat((s||'').replace(/[,원\s%]/g, '')) || 0;
      const m1 = text.match(/(?:광고비|집행|총\s*비용|spent|cost|total)[:\s]*([0-9,]+)\s*원?/i);
      if (m1) r.totalSpent = rmComma(m1[1]);
      const m2 = text.match(/(?:노출|impressions?)[:\s]*([0-9,]+)/i);
      if (m2) r.impressions = rmComma(m2[1]);
      const m3 = text.match(/(?:클릭|clicks?)[:\s]*([0-9,]+)/i);
      if (m3) r.clicks = rmComma(m3[1]);
      const m4 = text.match(/CTR[:\s]*([0-9.,]+)\s*%?/i);
      if (m4) r.ctr = rmCommaFloat(m4[1]);
      const m5 = text.match(/CPC[:\s]*([0-9,]+)\s*원?/i);
      if (m5) r.cpc = rmComma(m5[1]);
      const m6 = text.match(/(?:전환|conversions?)[:\s]*([0-9,]+)/i);
      if (m6) r.conversions = rmComma(m6[1]);
      const m7 = text.match(/CPA[:\s]*([0-9,]+)\s*원?/i);
      if (m7) r.cpa = rmComma(m7[1]);
      // 캠페인/소재별 (한 줄 "이름 N원 X.X%")
      r.byCampaign = [];
      text.split('\n').forEach(line => {
        const m = line.match(/^[\s\-•·*]*(.+?)\s+([0-9,]{4,})\s*원\s*([0-9.]+)\s*%/);
        if (m) {
          r.byCampaign.push({ name: m[1].trim(), spent: rmComma(m[2]), share: rmCommaFloat(m[3]) });
        }
      });
      return r;
    }

    // 🚀 KPI 데이터팀 자료 자동 갱신 + 카드값 비교 모달
    window.refreshKpiDataUrl = async function(projectId, kpiIdx, kpiLabel) {
      const key = `b2c_data_url_${projectId}_kpi_${kpiIdx}`;
      const url = localStorage.getItem(key);
      if (!url) { showToast('<span class="ok">⚠️</span>자료 URL이 없어용. 먼저 입력!'); return; }
      const sheetMatch = url.match(/\/spreadsheets\/d\/([^\/]+)/);
      if (!sheetMatch) {
        showToast('<span class="ok">⚠️</span>구글 시트가 아니라 자동 분석 불가 — 새 창으로 열어드릴게용');
        window.open(url, '_blank');
        return;
      }
      const sheetId = sheetMatch[1];
      const gidMatch = url.match(/[#&?]gid=(\d+)/);
      const gid = gidMatch ? gidMatch[1] : '0';
      showToast('<span class="ok">⏳</span>데이터팀 자료 가져오는 중...');
      const apiBase = location.protocol === 'file:' ? 'https://b2c-dashboard-sigma.vercel.app' : '';
      try {
        const r = await fetch(apiBase + '/api/fetch-sheet', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sheetUrl: url, sheetId, gid })
        });
        const data = await r.json();
        if (!data.ok) { showToast(`<span class="ok">⚠️</span>${data.error || 'fetch 실패'}`); return; }
        // 카드 KPI 값
        const project = window.getProject ? window.getProject(projectId) : null;
        const kpi = (project?.kpis || [])[kpiIdx];
        const cardValueRaw = kpi?.value || '—';
        // KPI별 매칭 결과 (이력서 KPI는 b2c_resume_stats_에서 추가 비교)
        let liveValue = null;
        const isResumeKpi = /이력서|업데이트|resume/i.test(kpiLabel || '');
        if (isResumeKpi) {
          try {
            const stats = JSON.parse(localStorage.getItem('b2c_resume_stats_' + projectId) || 'null');
            if (stats?.resumeUpdated != null) liveValue = stats.resumeUpdated;
          } catch(e) {}
          if (liveValue == null && window.RESUME_CACHES?.[projectId]?.resumeUpdated != null) {
            liveValue = window.RESUME_CACHES[projectId].resumeUpdated;
          }
        }
        // 시트에서 KPI 라벨 키워드 일치하는 셀 옆 숫자 추출
        const labelKeywords = (kpiLabel || '').split(/[\s\/,]+/).filter(s => s.length >= 2);
        const candidates = [];
        const seen = new Set();
        data.rows.forEach((row, rIdx) => {
          if (!row) return;
          row.forEach((cell, cIdx) => {
            const cellStr = String(cell || '').trim();
            if (!cellStr) return;
            if (labelKeywords.some(kw => cellStr.includes(kw))) {
              // 오른쪽 셀들에서 숫자 후보
              for (let dc = 1; dc <= 4; dc++) {
                const next = row[cIdx + dc];
                const ns = String(next || '').trim();
                if (ns && /^[\d,]+(\.\d+)?%?$/.test(ns)) {
                  const k = `${rIdx}-${cIdx + dc}`;
                  if (!seen.has(k)) {
                    seen.add(k);
                    candidates.push({ label: cellStr, value: ns, row: rIdx + 1, col: cIdx + dc + 1, axis: '오른쪽' });
                  }
                  break;
                }
              }
              // 아래 셀들에서 숫자 후보
              for (let dr = 1; dr <= 3; dr++) {
                const below = data.rows[rIdx + dr]?.[cIdx];
                const bs = String(below || '').trim();
                if (bs && /^[\d,]+(\.\d+)?%?$/.test(bs)) {
                  const k = `${rIdx + dr}-${cIdx}`;
                  if (!seen.has(k)) {
                    seen.add(k);
                    candidates.push({ label: cellStr, value: bs, row: rIdx + dr + 1, col: cIdx + 1, axis: '아래' });
                  }
                  break;
                }
              }
            }
          });
        });
        showKpiCompareModal({ projectId, kpiIdx, kpiLabel, sourceUrl: url, cardValue: cardValueRaw, liveValue, isResumeKpi, candidates, rows: data.rows });
      } catch(e) {
        showToast(`<span class="ok">⚠️</span>갱신 실패: ${e.message || '네트워크 오류'}`);
      }
    };

          <div class="reason-modal-body" style="display:flex;flex-direction:column;gap:14px">
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <div style="flex:1;min-width:160px;padding:14px;background:var(--c-primary-bg);border-radius:8px">
                <div style="font-size:11px;font-weight:800;color:var(--c-primary-deep);margin-bottom:4px">📌 카드 KPI 값</div>
                <div style="font-size:24px;font-weight:900;color:var(--c-primary-deep)">${escapeHtml(String(cardValue))}</div>
              </div>
              ${isResumeKpi && liveValue != null ? `

                  <div style="font-size:11px;font-weight:800;color:#B57F00;margin-bottom:4px">🔍 메타베이스 매칭</div>
                  <div style="font-size:24px;font-weight:900;color:#B57F00">${liveValue.toLocaleString()}명</div>

            </div>
            ${candidates.length > 0 ? `
              <div>
                <div style="font-size:12px;font-weight:800;color:var(--c-text-2);margin-bottom:8px">🔎 자료 시트에서 발견한 숫자 (KPI 라벨 키워드 일치)</div>
                <div style="overflow-x:auto">
                  <table style="width:100%;border-collapse:collapse;font-size:12px">

                      <tr>

                        ${isResumeKpi ? '<th style="text-align:right;padding:8px">vs 메타베이스</th>' : ''}

    // 공통: 줌 리포트 행에서 메트릭 추출
    function extractWebinarMetricsFromRows(rows) {
      let headerIdx = -1;
      for (let i = 0; i < Math.min(10, rows.length); i++) {
        if (rows[i] && rows[i].some(c => /unique\s*viewers?|max\s*concurrent|total\s*users/i.test(c || ''))) {
          headerIdx = i;
          break;
        }
      }
      if (headerIdx < 0 || !rows[headerIdx + 1]) return null;
      const headers = rows[headerIdx];
      const data = rows[headerIdx + 1];
      const find = pat => {
        const i = headers.findIndex(h => pat.test(h || ''));
        return i >= 0 ? data[i] : null;
      };
      const toInt = v => {
        const n = parseInt(String(v || '').replace(/[,\s]/g,''));
        return isNaN(n) ? null : n;
      };
      return {
        zoomUnique: toInt(find(/unique\s*viewers?/i)),
        zoomPeak: toInt(find(/max\s*concurrent/i)),
        totalUsers: toInt(find(/total\s*users/i)),
        duration: toInt(find(/duration/i)),
        topic: find(/topic/i),
        startTime: find(/start\s*time/i),
        autoFetchedAt: new Date().toISOString()
      };
    }

    // 🚀 줌 리포트 자동 갱신 — URL 이미 박혀 있을 때 클릭 한 번으로 fetch + 메트릭 추출
    window.refreshWebinarMetrics = async function(projectId) {
      const urlKey = 'b2c_webinar_data_url_' + projectId;
      const url = localStorage.getItem(urlKey);
      if (!url) { showToast('<span class="ok">⚠️</span>줌 리포트 URL이 없어용. 먼저 URL 입력!'); return; }
      const sheetMatch = url.match(/\/spreadsheets\/d\/([^\/]+)/);
      if (!sheetMatch) { showToast('<span class="ok">⚠️</span>구글 시트 URL이 아니에용 — 수동 입력해주세용'); return; }
      const sheetId = sheetMatch[1];
      const gidMatch = url.match(/[#&?]gid=(\d+)/);
      const gid = gidMatch ? gidMatch[1] : '0';
      showToast('<span class="ok">⏳</span>줌 리포트 가져오는 중...');
      const apiBase = location.protocol === 'file:' ? 'https://b2c-dashboard-sigma.vercel.app' : '';
      try {
        const r = await fetch(apiBase + '/api/fetch-sheet', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sheetUrl: url, sheetId, gid })
        });
        const data = await r.json();
        if (!data.ok) { showToast(`<span class="ok">⚠️</span>${data.error || 'fetch 실패'}`); return; }
        const extracted = extractWebinarMetricsFromRows(data.rows);
        if (!extracted) {
          showToast('<span class="ok">⚠️</span>줌 리포트 형식 인식 못함 (Unique Viewers/Max Concurrent 헤더 필요)');
          return;
        }
        const wmKey = 'b2c_webinar_metrics_' + projectId;
        let merged = {};
        try { merged = JSON.parse(localStorage.getItem(wmKey) || '{}'); } catch(e) {}
        ['zoomUnique','zoomPeak','totalUsers','duration','topic','startTime','autoFetchedAt'].forEach(k => {
          if (extracted[k] != null) merged[k] = extracted[k];
        });
        localStorage.setItem(wmKey, JSON.stringify(merged));
        const summary = [];
        if (extracted.zoomUnique != null) summary.push('유니크 ' + extracted.zoomUnique.toLocaleString());
        if (extracted.zoomPeak != null) summary.push('최대 동시 ' + extracted.zoomPeak.toLocaleString());
        showToast('<span class="ok">🎉</span>자동 갱신 완료 — ' + (summary.join(' · ') || '데이터 박힘'));
        setTimeout(() => location.reload(), 1000);

      const key = 'b2c_webinar_data_url_' + projectId;
      const existing = localStorage.getItem(key) || '';
      const url = prompt('📊 줌 리포트 / 데이터 자료 URL\n(구글 시트면 자동으로 메트릭 추출돼요!)\n(비우면 삭제)', existing);
      if (url == null) return;
      if (url.trim() === '') {
        localStorage.removeItem(key);
        showToast('<span class="ok">✓</span>자료 URL 삭제');
        setTimeout(() => location.reload(), 400);
        return;
      }
      if (!/^https?:\/\//.test(url.trim())) { showToast('<span class="ok">⚠️</span>http(s):// 로 시작하는 URL이어야 해용'); return; }
      const cleanUrl = url.trim();
      localStorage.setItem(key, cleanUrl);

      // 🤖 구글 시트면 자동 fetch + 자동 추출 시도
      const sheetMatch = cleanUrl.match(/\/spreadsheets\/d\/([^\/]+)/);
      if (sheetMatch) {
        showToast('<span class="ok">✨</span>줌 리포트 자동 분석 중...');
        const sheetId = sheetMatch[1];
        const gidMatch = cleanUrl.match(/[#&?]gid=(\d+)/);
        const gid = gidMatch ? gidMatch[1] : '0';
        let rows = null;
        let fetchError = null;
        // 1차: 서버사이드 /api/fetch-sheet (CORS 우회 - vercel 환경)
        try {
          const apiRes = await fetch('/api/fetch-sheet', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sheetUrl: cleanUrl, sheetId, gid })
          });
          if (apiRes.ok) {
            const data = await apiRes.json();
            if (data.ok && data.rows) rows = data.rows;
            else if (data.error) fetchError = data.error;
          }
        } catch(e) { console.warn('서버 fetch 실패:', e); }
        // 2차: 직접 fetch 폴백 (file:// 또는 서버사이드 unavailable 시)
        if (!rows) {
          try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`);
            if (res.ok) {
              const text = await res.text();
              rows = parseCSV(text);
            }
          } catch(e) { console.warn('직접 fetch 실패:', e); }
        }
        try {
          if (rows && rows.length) {
            // 헤더 행 자동 탐색 (Unique Viewers / Max Concurrent 키워드)
            let headerIdx = -1;
            for (let i = 0; i < Math.min(10, rows.length); i++) {
              if (rows[i] && rows[i].some(c => /unique\s*viewers?|max\s*concurrent|total\s*users/i.test(c))) {
                headerIdx = i;
                break;
              }
            }
            if (headerIdx >= 0 && rows[headerIdx + 1]) {
              const headers = rows[headerIdx];
              const data = rows[headerIdx + 1];
              const find = pat => {
                const i = headers.findIndex(h => pat.test(h));
                return i >= 0 ? data[i] : null;
              };
              const toInt = v => {
                const n = parseInt(String(v || '').replace(/[,\s]/g,''));
                return isNaN(n) ? null : n;
              };
              const extracted = {
                zoomUnique: toInt(find(/unique\s*viewers?/i)),
                zoomPeak: toInt(find(/max\s*concurrent/i)),
                totalUsers: toInt(find(/total\s*users/i)),
                duration: toInt(find(/duration/i)),
                topic: find(/topic/i),
                startTime: find(/start\s*time/i),
                autoFetchedAt: new Date().toISOString()
              };
              // 기존 wm과 병합 (만족도 같은 수동 입력 보존)
              const wmKey = 'b2c_webinar_metrics_' + projectId;
              let merged = {};
              try { merged = JSON.parse(localStorage.getItem(wmKey) || '{}'); } catch(e) {}
              ['zoomUnique','zoomPeak','totalUsers','duration','topic','startTime','autoFetchedAt'].forEach(k => {
                if (extracted[k] != null) merged[k] = extracted[k];
              });
              localStorage.setItem(wmKey, JSON.stringify(merged));
              const summary = [];
              if (extracted.zoomUnique != null) summary.push('유니크 ' + extracted.zoomUnique.toLocaleString());
              if (extracted.zoomPeak != null) summary.push('최대 동시 ' + extracted.zoomPeak.toLocaleString());
              showToast('<span class="ok">🎉</span>자동 추출 완료 — ' + (summary.join(' · ') || '데이터 박힘'));
              setTimeout(() => location.reload(), 1200);
              return;
            }
          }
        } catch(e) { console.warn('웨비나 자동 fetch 실패:', e); }
        // 자동 추출 실패 → 매니저 요청 폴백
      }

      // 폴백: 시트가 아니거나 자동 추출 실패 시 기존 매니저 요청 흐름

      try {

      if (bg) bg.remove();
      bg = document.createElement('div');
      bg.id = 'sheetUrlBg';

        <div class="reason-modal" onclick="event.stopPropagation()" style="max-width:560px">
          <div class="reason-modal-head">
            <div class="reason-modal-title">🔗 시트 URL 입력</div>
            <div class="reason-modal-sub">URL 넣으면 자동으로 fetch해서 즉시 갱신해드려요 ✨</div>
          </div>
          <div class="reason-modal-body" style="display:flex;flex-direction:column;gap:12px">
            <label style="font-size:12px;font-weight:700;color:var(--c-text-2)">시트 URL
              <input id="suUrl" type="url" value="${escapeHtml(currentUrl || '')}" placeholder="https://docs.google.com/spreadsheets/d/..." style="width:100%;margin-top:4px;padding:12px;border:1px solid var(--c-border);border-radius:8px;font-family:inherit;font-size:13px">
            </label>
            <div style="font-size:11px;color:var(--c-text-3);line-height:1.6">
              💡 시트 권한이 <strong>"링크 있는 모두 — 뷰어"</strong>여야 자동 fetch 돼용. 비공개라 실패하면 <a href="#" id="suFallback" style="color:var(--c-primary);text-decoration:underline">📋 복붙으로 갱신</a>
            </div>
          </div>
          <div class="reason-modal-foot">
            <button class="btn-cancel" id="suCancel">취소</button>
            <button class="dl-btn-confirm" id="suSubmit">🚀 자동 갱신</button>
          </div>
        </div>`;
      document.body.appendChild(bg);
      bg.addEventListener('click', () => bg.remove());
      bg.querySelector('#suCancel').addEventListener('click', () => bg.remove());
      bg.querySelector('#suFallback').addEventListener('click', (e) => {
        e.preventDefault();
        bg.remove();
        openSheetPasteModal(currentSheetId, currentUrl, projectId);
      });
      const submitBtn = bg.querySelector('#suSubmit');
      submitBtn.addEventListener('click', async () => {
        const url = bg.querySelector('#suUrl').value.trim();
        if (!url) { showToast('<span class="ok">⚠️</span>URL 입력해주세요'); return; }
        const sm = url.match(/spreadsheets\/d\/([\w-]+)/);
        const newSheetId = sm ? sm[1] : currentSheetId;
        const gidMatch = url.match(/[#&?]gid=(\d+)/);
        const gid = gidMatch ? gidMatch[1] : '0';
        // file:// 환경이면 vercel API 절대 URL, https면 상대 경로
        const apiBase = location.protocol === 'file:' ? 'https://b2c-dashboard-sigma.vercel.app' : '';
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ fetch 중...';
        showToast('<span class="ok">⏳</span>시트 가져오는 중...');
        try {
          const r = await fetch(apiBase + '/api/fetch-sheet', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sheetUrl: url, sheetId: newSheetId, gid })
          });
          const data = await r.json();
          if (!data.ok) {
            submitBtn.disabled = false;
            submitBtn.textContent = '🚀 자동 갱신';
            showToast(`<span class="ok">⚠️</span>${data.error || 'fetch 실패'}`);
            return;
          }
          // 인메모리 + localStorage 둘 다 갱신
          const cacheObj = { sheetId: newSheetId, sheetUrl: url, fetchedAt: data.fetchedAt, rows: data.rows };
          window.SHEET_CACHES = window.SHEET_CACHES || {};
          window.SHEET_CACHES[newSheetId] = cacheObj;
          try { localStorage.setItem('b2c_sheet_data_' + newSheetId, JSON.stringify(cacheObj)); } catch(e) {
            console.warn('[sheet] localStorage 용량 초과, 인메모리만 유지:', e.message);
          }
          // 카드 리소스 URL 갱신 (sheetId 바뀐 경우)
          if (newSheetId !== currentSheetId && projectId && window.getProject) {
            const project = window.getProject(projectId);
            if (project) {
              project.resources = (project.resources || []).map(rr =>
                /spreadsheets\/d\//.test(rr) ? url : rr
              );
              if (!project.resources.some(rr => /spreadsheets\/d\//.test(rr))) {
                project.resources.push(url);
              }
              if (window.upsertProject) window.upsertProject(project);
              else if (window.saveOverride) window.saveOverride(projectId, project);
            }
          }
          bg.remove();
          showToast(`<span class="ok">✓</span>${data.rows.length-1}행 갱신 완료!`);
          setTimeout(() => location.reload(), 600);
        } catch(e) {
          submitBtn.disabled = false;
          submitBtn.textContent = '🚀 자동 갱신';
          showToast(`<span class="ok">⚠️</span>갱신 실패: ${e.message || '네트워크 오류'}`);
        }
      });
    };

    window.registerDownloadSection = function(section) {
      // 같은 ID 있으면 교체
      const idx = window.DOWNLOAD_SECTIONS.findIndex(s => s.id === section.id);
      if (idx >= 0) window.DOWNLOAD_SECTIONS[idx] = section;
      else window.DOWNLOAD_SECTIONS.push(section);
    };

    function registerApplicantSections(d) {
      registerDownloadSection({
        id: 'applicants-summary', group: '신청자 분석', name: '총 신청 요약',
        desc: `총 ${d.total}명 · 헤더 ${d.headers.length}개`,
        getCSV: () => [['항목','값'], ['총 신청', d.total], ['컬럼 수', d.headers.length]],
        getMD: () => `## 총 신청 요약\n- 총 신청: **${d.total.toLocaleString()}명**\n- 컬럼 수: ${d.headers.length}개\n`
      });
      if (d.jobGroupAggregate) {
        registerDownloadSection({
          id: 'applicants-jobgroup', group: '신청자 분석', name: '직군 분포',
          desc: `${d.jobGroupAggregate.groups.length}개 직군 · 세부 직무 포함`,
          getCSV: () => {
            const out = [['직군','직무','인원']];
            d.jobGroupAggregate.groups.forEach(g => {
              out.push([g.name, '(전체)', g.count]);
              g.items.forEach(([l, c]) => out.push([g.name, l, c]));
            });
            return out;
          },
          getMD: () => {
            let s = '## 직군 분포\n| 직군 | 인원 | 비율 |\n|---|---|---|\n';
            d.jobGroupAggregate.groups.forEach(g => s += `| ${g.name} | ${g.count}명 | ${g.pct.toFixed(1)}% |\n`);
            s += '\n### 세부 직무\n';
            d.jobGroupAggregate.groups.forEach(g => {
              if (!g.items.length) return;
              s += `\n**${g.name}** (${g.count}명)\n`;
              g.items.forEach(([l, c]) => s += `- ${l}: ${c}명\n`);
            });
            return s;
          }
        });
      }
      if (d.sortedDates.length) {
        registerDownloadSection({
          id: 'applicants-daily', group: '신청자 분석', name: '일별 신청 추이',
          desc: `${d.sortedDates.length}일 데이터`,
          getCSV: () => [['날짜','인원수'], ...d.sortedDates.map(date => [date, d.byDate[date]])],
          getMD: () => {
            let s = '## 일별 신청 추이\n| 날짜 | 인원 |\n|---|---|\n';
            d.sortedDates.forEach(date => s += `| ${date} | ${d.byDate[date]}명 |\n`);
            return s;
          }
        });
      }
      d.distributions.forEach((dist, i) => {
        registerDownloadSection({
          id: 'applicants-dist-' + i, group: '신청자 분석', name: dist.label + ' 분포',
          desc: `${dist.items.length}개 항목`,
          getCSV: () => [['항목','인원'], ...dist.items.map(([l, c]) => [l, c])],
          getMD: () => {
            let s = `## ${dist.label} 분포\n| 항목 | 인원 |\n|---|---|\n`;
            dist.items.forEach(([l, c]) => s += `| ${l} | ${c}명 |\n`);
            return s;
          }
        });
      });
      // ❗ 원본 시트는 개인정보(이름/연락처/잡코리아ID 등) 포함이라 다운로드 차단
    }

    // 프로젝트 정보 섹션 등록 (페이지 로드 시 1회)
    if (p) {
      registerDownloadSection({
        id: 'project-info', group: '프로젝트', name: '프로젝트 정보',
        desc: '제목 / 기간 / 상태 / 태그',
        getCSV: () => [
          ['항목','값'],
          ['제목', p.title || ''],
          ['카테고리', p.categoryLabel || p.category || ''],
          ['상태', p.statusLabel || p.status || ''],
          ['기간', p.period || p.date || ''],
          ['담당자', (window.MEMBERS[p.member]?.name) || ''],
          ['태그', (p.tags || []).join(', ')]
        ],
        getMD: () => {
          let s = `# ${p.title || '제목 없음'}\n\n`;
          if (p.desc) s += `> ${p.desc}\n\n`;
          s += `- **카테고리**: ${p.categoryLabel || p.category || '-'}\n`;
          s += `- **상태**: ${p.statusLabel || p.status || '-'}\n`;
          s += `- **기간**: ${p.period || p.date || '-'}\n`;
          s += `- **담당자**: ${(window.MEMBERS[p.member]?.name) || '-'}\n`;
          if (p.tags && p.tags.length) s += `- **태그**: ${p.tags.map(t => '#' + t).join(' ')}\n`;
          return s;
        }
      });
      if (p.kpis && p.kpis.length) {
        registerDownloadSection({
          id: 'project-kpi', group: '프로젝트', name: '핵심 지표 (KPI)',
          desc: `${p.kpis.length}개 지표`,
          getCSV: () => [['지표','값'], ...p.kpis.map(k => [k.label, k.value])],
          getMD: () => {
            let s = '## 핵심 지표\n| 지표 | 값 |\n|---|---|\n';
            p.kpis.forEach(k => s += `| ${k.label} | ${k.value} |\n`);
            return s;
          }
        });
      }
      if (p.timeline && p.timeline.length) {
        registerDownloadSection({
          id: 'project-timeline', group: '프로젝트', name: '진행 타임라인',
          desc: `${p.timeline.length}개 단계`,
          getCSV: () => [['날짜','항목'], ...p.timeline.map(t => [t.date, t.label])],
          getMD: () => {
            let s = '## 진행 타임라인\n';
            p.timeline.forEach(t => s += `- **${t.date}** — ${t.label}\n`);
            return s;
          }
        });
      }
      if (p.retroNote) {
        registerDownloadSection({
          id: 'project-retro', group: '프로젝트', name: '회고 메모',
          desc: '편집 가능한 회고',
          getCSV: () => [['회고'], [p.retroNote]],
          getMD: () => `## 회고 메모\n\n${p.retroNote}\n`
        });
      }
      // 추후 추가 자리 — 광고비/예산 (placeholder 등록은 비활성화)
      registerDownloadSection({
        id: 'ad-budget-placeholder', group: '예산·광고', name: '광고비 / 예산',
        desc: '곧 추가될 예정',
        disabled: true,
        getCSV: () => [['(준비중)']],
        getMD: () => '## 광고비 / 예산\n_준비중_\n'
      });
    }

    // ─────────────────────────────────────────
    // 다운로드 모달 로직
    // ─────────────────────────────────────────
    (function initDownloadModal() {
      const trigger = document.getElementById('topDownload');
      const bg = document.getElementById('dlModalBg');
      const list = document.getElementById('dlCheckList');
      const footInfo = document.getElementById('dlFootInfo');
      const cancel = document.getElementById('dlCancel');
      const confirm = document.getElementById('dlConfirm');
      const formatBtns = bg.querySelectorAll('.dl-format-btn');
      let currentFormat = 'csv';

      function renderList() {
        const grouped = {};
        window.DOWNLOAD_SECTIONS.forEach(s => {
          (grouped[s.group] = grouped[s.group] || []).push(s);
        });
        let html = '';
        Object.keys(grouped).forEach(group => {
          html += `<div class="dl-section-title" style="margin-top:12px">${escapeHtml(group)}</div>`;
          html += '<div class="dl-check-list">';
          grouped[group].forEach(s => {
            html += `
              <label class="dl-check ${s.disabled ? 'is-disabled' : ''}">
                <input type="checkbox" data-id="${escapeHtml(s.id)}" ${s.disabled ? 'disabled' : 'checked'}>
                <div class="dl-check-info">
                  <div class="dl-check-name">${escapeHtml(s.name)}</div>
                  <div class="dl-check-desc">${escapeHtml(s.desc || '')}</div>
                </div>
                ${s.disabled ? '<span class="dl-check-soon">SOON</span>' : ''}
              </label>`;
          });
          html += '</div>';
        });
        list.innerHTML = html;
        // 첫 dl-section-title 의 margin-top 제거
        const firstTitle = list.querySelector('.dl-section-title');
        if (firstTitle) firstTitle.style.marginTop = '0';
        updateFootInfo();
        list.querySelectorAll('input[type=checkbox]').forEach(cb => cb.addEventListener('change', updateFootInfo));
      }

      function updateFootInfo() {
        const checked = list.querySelectorAll('input[type=checkbox]:checked').length;
        footInfo.textContent = `${checked}개 선택됨`;
        confirm.disabled = checked === 0;
      }

      formatBtns.forEach(btn => btn.addEventListener('click', () => {
        formatBtns.forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        currentFormat = btn.dataset.fmt;
      }));

      function open() {
        renderList();
        bg.classList.add('is-open');
      }
      function close() { bg.classList.remove('is-open'); }

      trigger.addEventListener('click', open);
      cancel.addEventListener('click', close);
      bg.addEventListener('click', (e) => { if (e.target === bg) close(); });

      confirm.addEventListener('click', () => {
        const ids = [...list.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.dataset.id);
        const selected = window.DOWNLOAD_SECTIONS.filter(s => ids.includes(s.id));
        if (!selected.length) return;
        const projectName = (p?.title || 'project').replace(/[^\w가-힣]+/g, '_').slice(0, 30);
        const today = new Date().toISOString().slice(0, 10);
        if (currentFormat === 'csv') {
          // 여러 섹션을 빈 줄로 구분해서 한 CSV로
          const out = [];
          selected.forEach((s, i) => {
            if (i > 0) out.push([]);
            out.push([`# ${s.name}`]);
            const data = s.getCSV();
            data.forEach(row => out.push(row));
          });
          const csv = out.map(r => r.map(csvEscape).join(',')).join('\n');
          downloadFile(`${projectName}_${today}.csv`, csv, 'text/csv');
          showToast(`<span class="ok">✓</span>${selected.length}개 섹션 CSV 다운로드!`);
        } else {
          const md = selected.map(s => s.getMD()).join('\n\n---\n\n');
          navigator.clipboard.writeText(md).then(
            () => showToast(`<span class="ok">✓</span>${selected.length}개 섹션 마크다운 복사됨! 노션에 ㄱ`),
            () => downloadFile(`${projectName}_${today}.md`, md, 'text/markdown')
          );
        }
        close();
      });
    })();

    // 파일 다운로드 헬퍼
    function downloadFile(filename, content, mime) {
      const blob = new Blob(['﻿' + content], { type: mime + ';charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
    }
    function csvEscape(s) {
      s = String(s == null ? '' : s);
      if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    }
    window.downloadOriginalCSV = function() {
      const d = window._dashboardData; if (!d) return;
      const csv = d.rows.map(r => r.map(csvEscape).join(',')).join('\n');
      downloadFile(`신청자_원본_${new Date().toISOString().slice(0,10)}.csv`, csv, 'text/csv');
      showToast('<span class="ok">✓</span>원본 CSV 다운로드!');
    };
    window.downloadSummaryCSV = function() {
      const d = window._dashboardData; if (!d) return;
      const lines = [];
      lines.push('# 분석 요약,' + new Date().toLocaleString('ko-KR'));
      lines.push('');
      lines.push('## KPI');
      lines.push('항목,값');
      lines.push('총 신청,' + d.total);
      if (d.jobGroupAggregate) {
        lines.push('');
        lines.push('## 직군 분포');
        lines.push('직군,인원수,비율(%)');
        d.jobGroupAggregate.groups.forEach(g => lines.push(`${g.name},${g.count},${g.pct.toFixed(1)}`));
        lines.push('');
        lines.push('## 직군별 세부 직무');
        lines.push('직군,직무,인원수');
        d.jobGroupAggregate.groups.forEach(g => g.items.forEach(([l, c]) => lines.push(`${g.name},${csvEscape(l)},${c}`)));
      }
      if (d.sortedDates.length) {
        lines.push('');
        lines.push('## 일별 신청 추이');
        lines.push('날짜,인원수');
        d.sortedDates.forEach(date => lines.push(`${date},${d.byDate[date]}`));
      }
      d.distributions.forEach(dist => {
        lines.push('');
        lines.push('## ' + dist.label);
        lines.push('항목,인원수');
        dist.items.forEach(([l, c]) => lines.push(`${csvEscape(l)},${c}`));
      });
      downloadFile(`분석요약_${new Date().toISOString().slice(0,10)}.csv`, lines.join('\n'), 'text/csv');
      showToast('<span class="ok">✓</span>분석 요약 CSV 다운로드!');
    };
    window.copyNotionMarkdown = function() {
      const d = window._dashboardData; if (!d) return;
      const lines = [];
      lines.push(`# 신청자 분석 (${new Date().toLocaleDateString('ko-KR')})`);
      lines.push('');
      lines.push(`**총 신청**: ${d.total.toLocaleString()}명`);
      lines.push('');
      if (d.jobGroupAggregate) {
        lines.push('## 직군 분포');
        lines.push('| 직군 | 인원 | 비율 |');
        lines.push('|---|---|---|');
        d.jobGroupAggregate.groups.forEach(g => lines.push(`| ${g.name} | ${g.count.toLocaleString()}명 | ${g.pct.toFixed(1)}% |`));
        lines.push('');
        lines.push('### 세부 직무');
        d.jobGroupAggregate.groups.forEach(g => {
          if (!g.items.length) return;
          lines.push(`**${g.name}** (${g.count}명)`);
          g.items.forEach(([l, c]) => lines.push(`- ${l}: ${c}명`));
          lines.push('');
        });
      }
      if (d.sortedDates.length) {
        lines.push('## 일별 신청 추이');
        lines.push('| 날짜 | 인원 |');
        lines.push('|---|---|');
        d.sortedDates.forEach(date => lines.push(`| ${date} | ${d.byDate[date]}명 |`));
        lines.push('');
      }
      d.distributions.forEach(dist => {
        lines.push(`## ${dist.label}`);
        lines.push('| 항목 | 인원 |');
        lines.push('|---|---|');
        dist.items.forEach(([l, c]) => lines.push(`| ${l} | ${c}명 |`));
        lines.push('');
      });
      const md = lines.join('\n');
      navigator.clipboard.writeText(md).then(
        () => showToast('<span class="ok">✓</span>노션 마크다운 복사됨! 노션에 붙여넣기 ㄱ'),
        () => { prompt('복사해서 노션에 붙여넣기:', md); }
      );
    };

    window.editRetro = function(id) {
      const block = document.getElementById('retroBlock');
      if (!block) return;
      const project = window.getProject(id);
      const current = project?.retroNote || '';
      block.innerHTML = `
        <textarea id="retroEdit" style="width:100%;min-height:160px;padding:12px;border:1px solid var(--c-border);border-radius:8px;font-family:inherit;font-size:14px;line-height:1.6;resize:vertical">${escapeHtml(current)}</textarea>
        <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
          <button class="share-btn" onclick="cancelRetro('${id}')">취소</button>
          <button class="share-btn" style="background:var(--c-primary);color:#fff;border-color:var(--c-primary)" onclick="saveRetro('${id}')">저장</button>
        </div>
      `;
      document.getElementById('retroEdit')?.focus();
    };
    window.saveRetro = function(id) {
      const newText = (document.getElementById('retroEdit')?.value || '').trim();
      const project = window.getProject(id);
      if (!project) return;
      const updated = { ...project, retroNote: newText };
      // history에도 기록
      const now = new Date();
      const history = project.history ? [...project.history] : [];
      if (project.retroNote !== newText) {
        history.push({
          date: now.toISOString().slice(0, 10),
          time: now.toTimeString().slice(0, 5),
          user: window.MEMBERS[project.member]?.name || '?',
          changes: [{ field: '회고 메모', from: project.retroNote || '(비어있음)', to: newText.slice(0, 30) + (newText.length > 30 ? '…' : '') }]
        });
        updated.history = history;
      }
      window.upsertProject(updated);
      showToast(`<span class="ok">✓</span>회고 메모 저장됐어요!`);
      // 페이지 다시 렌더 (간단히 reload)
      setTimeout(() => location.reload(), 500);
    };
    window.cancelRetro = function(id) {
      location.reload();
    };

    window.shareLink = function() {
      const url = window.location.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => {
          showToast(`<span class="ok">✓</span>링크를 복사했어요!`);
        }).catch(() => {
          prompt('링크를 복사해 주세요:', url);
        });
      } else {
        prompt('링크를 복사해 주세요:', url);
      }
    };

    function showToast(html) {
      const t = document.getElementById('toast');
      t.innerHTML = html;
      t.classList.add('is-open');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('is-open'), 2400);
    }

    // ─────────────────────────────────────────
    // 스티커 기능
    // ─────────────────────────────────────────
    (function initStickers() {
      if (!p) return;
      const STICKER_KEY = 'b2c_stickers_' + (p.id || 'default');
      const STICKERS = ['🎉','✨','🔥','💯','⭐','💫','🎊','🎯','🚀','💪','👑','🏆','🥳','🎁','❤️','💙','💛','💚','🌈','🦄','☀️','🌙','💎','✅','📌','💡','🍀','🌸'];
      const fab = document.getElementById('stickerFab');
      const palette = document.getElementById('stickerPalette');
      const grid = document.getElementById('stickerPaletteGrid');

      // 팔레트 채우기
      grid.innerHTML = STICKERS.map(emoji => `<button class="sticker-palette-item" data-emoji="${emoji}">${emoji}</button>`).join('');

      function getStickers() {
        try { return JSON.parse(localStorage.getItem(STICKER_KEY) || '[]'); } catch(e) { return []; }
      }
      function saveStickers(list) {
        localStorage.setItem(STICKER_KEY, JSON.stringify(list));
      }
      function renderStickers() {
        document.querySelectorAll('.sticker').forEach(s => s.remove());
        getStickers().forEach((s, idx) => createStickerElement(s, idx));
      }
      function createStickerElement(s, idx) {
        const el = document.createElement('div');
        el.className = 'sticker';
        el.style.left = s.x + 'px';
        el.style.top = s.y + 'px';
        el.dataset.idx = idx;
        // 이모지 텍스트 + X 버튼
        el.innerHTML = `<span style="pointer-events:none">${s.emoji}</span><button class="sticker-del" title="삭제">×</button>`;
        attachDragHandlers(el);
        // X 버튼 클릭 시 삭제
        el.querySelector('.sticker-del').addEventListener('mousedown', (e) => {
          e.stopPropagation();
        });
        el.querySelector('.sticker-del').addEventListener('click', (e) => {
          e.stopPropagation();
          e.preventDefault();
          const list = getStickers();
          list.splice(parseInt(el.dataset.idx), 1);
          saveStickers(list);
          renderStickers();
          showToast('<span class="ok">✓</span>스티커 삭제');
        });
        document.body.appendChild(el);
      }
      function attachDragHandlers(el) {
        let dragging = false, startX, startY, origX, origY, idx, moved = false;
        el.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          dragging = true; moved = false;
          startX = e.clientX; startY = e.clientY;
          origX = parseFloat(el.style.left) || 0;
          origY = parseFloat(el.style.top) || 0;
          idx = parseInt(el.dataset.idx);
          el.classList.add('is-dragging');
          e.preventDefault();
        });
        document.addEventListener('mousemove', (e) => {
          if (!dragging) return;
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
          el.style.left = (origX + dx) + 'px';
          el.style.top = (origY + dy) + 'px';
        });
        document.addEventListener('mouseup', () => {
          if (!dragging) return;
          dragging = false;
          el.classList.remove('is-dragging');
          if (moved) {
            const list = getStickers();
            if (list[idx]) {
              list[idx].x = parseFloat(el.style.left) || 0;
              list[idx].y = parseFloat(el.style.top) || 0;
              saveStickers(list);
            }
          }
        });
        // 더블클릭 = 삭제
        el.addEventListener('dblclick', () => {
          const list = getStickers();
          list.splice(parseInt(el.dataset.idx), 1);
          saveStickers(list);
          renderStickers();
          showToast('<span class="ok">✓</span>스티커 삭제했어요!');
        });
      }

      // FAB 토글
      fab.addEventListener('click', (e) => {
        e.stopPropagation();
        palette.classList.toggle('is-open');
      });
      // 외부 클릭 시 팔레트 닫기
      document.addEventListener('click', (e) => {
        if (!palette.contains(e.target) && e.target !== fab) {
          palette.classList.remove('is-open');
        }
      });
      // 스티커 선택 → 화면 중앙쯤에 배치
      grid.addEventListener('click', (e) => {
        const btn = e.target.closest('.sticker-palette-item');
        if (!btn) return;
        const emoji = btn.dataset.emoji;
        const list = getStickers();
        // 화면 중앙 기준, 약간 랜덤
        const x = window.scrollX + (window.innerWidth / 2) - 24 + (Math.random() - 0.5) * 80;
        const y = window.scrollY + (window.innerHeight / 2) - 24 + (Math.random() - 0.5) * 80;
        list.push({ emoji, x: Math.round(x), y: Math.round(y) });
        saveStickers(list);
        renderStickers();
        palette.classList.remove('is-open');
        showToast(`<span class="ok">✓</span>${emoji} 스티커 붙였어요!`);
      });

      // 초기 렌더 — 페이지 콘텐츠 그려진 후
      setTimeout(renderStickers, 200);
    })();
  </script>
