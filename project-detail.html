<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>📊 프로젝트 리포트</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Joungkyun/font-d2coding/d2coding.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
  :root {
    /* 논문 결 — 흑백 + 무채색, index.html과 동일 */
    --bg: #FCFCFA;
    --surface: #FFFFFF;
    --border: #E0DDD3;
    --text: #1A1A1A;
    --text-2: #4A4A4A;
    --text-3: #8A8A86;
    --line: #C8C4BB;
    --primary: #1A1A1A;
    --ok: #1A1A1A;
    --warn: #4A4A4A;
    --danger: #1A1A1A;
    --blue: #1A1A1A;
    --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    --serif: 'Source Serif 4', 'Noto Serif KR', Georgia, 'Times New Roman', serif;
    --mono: 'D2Coding', 'IBM Plex Mono', 'Consolas', 'Menlo', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    letter-spacing: 0;
  }
  .nav {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .nav-left { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-2);
    background: transparent;
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    transition: 0.15s;
    letter-spacing: 0;
  }
  .nav-btn:hover { background: transparent; color: var(--text); border-color: var(--text); }
  .nav-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .nav-btn.primary:hover { background: #000; color: var(--bg); }
  .nav-btn.ghost { color: var(--text-3); }
  .nav-btn-danger { color: var(--text-3); border-color: transparent; }
  .nav-btn-danger:hover { color: var(--text); border-color: var(--text); background: transparent; text-decoration: underline; text-underline-offset: 3px; }
  .container { max-width: 860px; margin: 0 auto; padding: 56px 28px 120px; }

  /* ─── Report — 카탈로그(index.html) 결 통일 ─── */
  .report { background: transparent; }

  /* Cover */
  .report-cover { padding-bottom: 36px; border-bottom: 1px solid var(--line); margin-bottom: 48px; }
  .report-cover .cover-kicker {
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    color: var(--text-3); letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 18px;
  }
  .report-cover .cover-title {
    font-family: var(--serif); font-size: 40px; font-weight: 700;
    letter-spacing: -0.02em; line-height: 1.15; color: var(--text);
    margin: 0 0 18px;
  }
  .report-cover .cover-emoji { font-size: 32px; margin-right: 10px; vertical-align: -2px; }
  .report-cover .cover-meta {
    font-family: var(--sans); font-size: 13px; color: var(--text-2);
    display: flex; flex-wrap: wrap; gap: 24px; align-items: center; letter-spacing: 0;
  }
  .report-cover .cover-meta b { color: var(--text-3); font-weight: 500; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin-right: 6px; }
  .report-cover .cover-meta .dday { font-family: var(--serif); font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0; }
  .report-cover .cover-meta .status-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border: 1px solid var(--line); border-radius: 99px;
    font-size: 11px; letter-spacing: 0.05em; color: var(--text-2);
  }
  .report-cover .cover-meta .status-badge.done { color: var(--text-3); }
  .report-cover .tags { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
  .report-cover .tag {
    font-family: var(--sans); font-size: 11px; color: var(--text-3);
    padding: 2px 8px; border: 1px solid var(--line-soft); border-radius: 99px;
    letter-spacing: 0;
  }

  /* Section */
  .report-section { margin-bottom: 56px; }
  .section-head {
    display: flex; align-items: baseline; gap: 14px;
    margin-bottom: 22px; padding-bottom: 12px; border-bottom: 1px solid var(--line-soft);
  }
  .section-head .sec-num {
    font-family: var(--sans); font-size: 11px; font-weight: 600;
    color: var(--text-3); letter-spacing: 0.12em; min-width: 28px;
  }
  .section-head .sec-title {
    font-family: var(--serif); font-size: 22px; font-weight: 700;
    color: var(--text); letter-spacing: -0.015em; margin: 0;
  }
  .section-head .sec-sub {
    font-family: var(--sans); font-size: 12px; color: var(--text-3);
    margin-left: auto; letter-spacing: 0;
  }

  /* KPI Grid */
  .kpi-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
  }
  .kpi-card {
    padding: 20px 18px; border: 1px solid var(--line-soft); border-radius: 2px;
    background: var(--surface); font-family: var(--sans);
  }
  .kpi-card .kpi-label {
    font-size: 11px; color: var(--text-3);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; font-weight: 500;
  }
  .kpi-card .kpi-value {
    font-family: var(--serif); font-size: 32px; font-weight: 700;
    color: var(--text); line-height: 1.1; letter-spacing: -0.02em;
  }
  .kpi-card .kpi-unit { font-size: 14px; color: var(--text-2); font-weight: 500; margin-left: 4px; letter-spacing: 0; }
  .kpi-card .kpi-target {
    font-size: 12px; color: var(--text-3); margin-top: 8px; letter-spacing: 0;
  }
  .kpi-card .kpi-target .pct { color: var(--text); font-weight: 600; }
  .kpi-card .kpi-bar {
    height: 3px; background: var(--bg); border: 1px solid var(--line-soft);
    border-radius: 99px; margin-top: 10px; overflow: hidden;
  }
  .kpi-card .kpi-bar > i { display: block; height: 100%; background: var(--text); }
  .kpi-card .kpi-light { font-size: 14px; margin-left: 6px; }

  /* Data Table */
  .data-table { width: 100%; border-collapse: collapse; font-family: var(--sans); font-size: 14px; }
  .data-table th, .data-table td {
    padding: 12px 4px; border-bottom: 1px solid var(--line-soft);
    text-align: left; letter-spacing: 0;
  }
  .data-table th { font-weight: 500; color: var(--text-2); width: 50%; }
  .data-table td { color: var(--text); }
  .data-table td.num { font-family: var(--serif); font-weight: 600; text-align: right; font-size: 16px; }
  .data-table tr:last-child th, .data-table tr:last-child td { border-bottom: 0; }
  .data-table .total-row { border-top: 1.5px solid var(--text); }
  .data-table .total-row th { font-weight: 700; color: var(--text); padding-top: 14px; }
  .data-table .total-row td.num { font-size: 18px; padding-top: 14px; }

  /* Bar Row (시각 막대) */
  .bar-row {
    display: grid; grid-template-columns: 110px 60px 1fr; align-items: center;
    gap: 12px; padding: 10px 0; font-family: var(--sans); font-size: 13px;
    border-bottom: 1px dashed var(--line-soft); letter-spacing: 0;
  }
  .bar-row:last-child { border-bottom: 0; }
  .bar-row .br-label { color: var(--text); font-weight: 500; }
  .bar-row .br-value { font-family: var(--serif); font-weight: 700; font-size: 15px; text-align: right; }
  .bar-row .br-bar {
    height: 6px; background: var(--bg); border: 1px solid var(--line-soft);
    border-radius: 99px; overflow: hidden;
  }
  .bar-row .br-bar > i { display: block; height: 100%; background: var(--text); }
  .bar-row.is-spike .br-value::after { content: ' 🔥'; }

  /* Trend Chart (일별 막대 + 누적 라인) */
  .trend-chart {
    margin-top: 8px;
    padding: 18px 8px 8px;
    background: var(--surface);
    border: 1px solid var(--line-soft);
    border-radius: 2px;
  }
  .trend-chart .tc-legend {
    display: flex; gap: 18px; align-items: center;
    font-family: var(--sans); font-size: 11px; color: var(--text-3);
    letter-spacing: 0.04em; padding: 0 8px 12px;
  }
  .trend-chart .tc-legend .lg-swatch {
    display: inline-block; width: 14px; height: 8px;
    background: var(--text-3); opacity: 0.32; margin-right: 6px; vertical-align: middle;
  }
  .trend-chart .tc-legend .lg-line {
    display: inline-block; width: 18px; height: 0;
    border-top: 1.5px solid var(--text); margin-right: 6px; vertical-align: middle;
  }
  .trend-chart .tc-legend .lg-line::after {
    content: ''; display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--bg); border: 1.2px solid var(--text);
    margin-left: -12px; vertical-align: middle;
  }
  .trend-chart .tc-summary {
    margin-left: auto; font-family: var(--serif); color: var(--text);
    font-weight: 700; font-size: 13px; letter-spacing: 0;
  }
  .trend-chart svg { display: block; width: 100%; height: auto; }
  .trend-chart .tc-grid { stroke: var(--line-soft); stroke-width: 0.6; }
  .trend-chart .tc-axis { fill: var(--text-3); font-family: var(--sans); font-size: 10px; letter-spacing: 0; }
  .trend-chart .tc-bar { fill: var(--text-3); opacity: 0.28; transition: opacity 0.15s; }
  .trend-chart .tc-bar.spike { fill: var(--text); opacity: 0.55; }
  .trend-chart .tc-bar:hover { opacity: 0.85; }
  .trend-chart .tc-line { fill: none; stroke: var(--text); stroke-width: 1.5; stroke-linejoin: round; stroke-linecap: round; }
  .trend-chart .tc-dot { fill: var(--bg); stroke: var(--text); stroke-width: 1.2; }
  .trend-chart .tc-dot.last { fill: var(--text); }
  .trend-chart .tc-label-val {
    font-family: var(--serif); font-size: 10px; font-weight: 600;
    fill: var(--text); letter-spacing: 0;
  }
  @media (max-width: 600px) {
    .trend-chart { padding: 14px 4px 4px; }
    .trend-chart .tc-legend { font-size: 10px; gap: 12px; padding: 0 4px 10px; }
    .trend-chart .tc-summary { font-size: 12px; }
  }

  /* Sub-block (콘텐츠 효율 내부 그룹) */
  .sub-block { margin-bottom: 22px; }
  .sub-block:last-child { margin-bottom: 0; }
  .sub-block .sb-title {
    font-family: var(--sans); font-size: 12px; font-weight: 600;
    color: var(--text-2); letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .sub-block .sb-note {
    font-family: var(--sans); font-size: 12px; color: var(--text-3);
    margin-top: 8px; font-style: italic; letter-spacing: 0;
  }

  /* Link chips */
  .link-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .link-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px; border: 1px solid var(--line); border-radius: 99px;
    font-family: var(--sans); font-size: 13px; color: var(--text);
    text-decoration: none; letter-spacing: 0; transition: 0.15s;
  }
  .link-chip:hover { border-color: var(--text); }

  /* Empty state (섹션 내부) */
  .empty-block {
    padding: 24px 20px; background: var(--surface); border: 1px dashed var(--line-soft);
    border-radius: 2px; text-align: center; font-family: var(--sans);
    font-size: 13px; color: var(--text-3); letter-spacing: 0;
  }
  .empty-block .eb-hint { font-size: 12px; margin-top: 6px; opacity: 0.8; }

  /* Refresh bar (시트 새로고침) */
  .refresh-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding: 10px 12px;
    background: var(--surface); border: 1px solid var(--line-soft);
    border-radius: 2px;
    font-family: var(--sans); font-size: 12px;
  }
  .refresh-bar .rb-meta { color: var(--text-3); letter-spacing: 0; }
  .refresh-bar .nav-btn { padding: 6px 12px; font-size: 12px; }
  .refresh-bar .nav-btn:disabled { opacity: 0.5; cursor: wait; }

  /* Memo (note) */
  .memo-block {
    padding: 24px; background: var(--surface); border: 1px solid var(--line-soft);
    border-radius: 2px; font-family: var(--serif); font-size: 15px; line-height: 1.85;
    color: var(--text); white-space: pre-wrap;
  }

  /* Footer */
  .report-foot {
    margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--line);
    font-family: var(--sans); font-size: 11px; color: var(--text-3);
    letter-spacing: 0.06em; text-align: right;
  }

  @media (max-width: 600px) {
    .container { padding: 32px 16px 80px; }
    .report-cover .cover-title { font-size: 30px; }
    .report-cover .cover-emoji { font-size: 26px; }
    .report-cover .cover-meta { gap: 14px; font-size: 12px; }
    .section-head .sec-title { font-size: 18px; }
    .kpi-card { padding: 16px 14px; }
    .kpi-card .kpi-value { font-size: 26px; }
    .data-table { font-size: 13px; }
    .data-table td.num { font-size: 14px; }
    .bar-row { grid-template-columns: 90px 50px 1fr; gap: 8px; font-size: 12px; }
  }
  .empty {
    text-align: center;
    color: var(--text-3);
    padding: 80px 20px;
    font-family: var(--serif);
    font-size: 15px;
  }
  .empty .e { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .empty a { color: var(--text); text-decoration: underline; text-underline-offset: 3px; font-weight: 600; }
  /* ─── Modal — 논문 결 ─── */
  .modal-bg { position: fixed; inset: 0; background: rgba(26,26,26,0.4); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
  .modal-bg.is-open { display: flex; }
  .modal {
    background: var(--bg);
    border: 1px solid var(--text);
    border-radius: 2px;
    padding: 36px 36px 28px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    font-family: var(--serif);
  }
  .modal h3 { font-family: var(--serif); font-size: 22px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.015em; line-height: 1.3; }
  .modal .modal-sub { font-family: var(--sans); font-size: 11px; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 24px; }
  .modal label { display: block; font-family: var(--sans); font-size: 11px; color: var(--text-3); margin: 16px 0 6px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  .modal input, .modal select, .modal textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: var(--serif);
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    letter-spacing: 0;
    line-height: 1.5;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus { outline: 1px solid var(--text); border-color: var(--text); }
  .modal textarea { resize: vertical; min-height: 80px; font-family: var(--serif); }
  .modal-actions { display: flex; gap: 8px; margin-top: 28px; justify-content: flex-end; }
  .modal-actions .nav-btn { padding: 9px 16px; font-size: 13px; }
  @media (max-width: 600px) {
    .container { padding: 32px 16px 80px; }
    .report { padding: 24px 0; font-size: 11px; line-height: 1.7; }
    .nav { padding: 14px 16px; }
    .nav-btn { font-size: 12px; padding: 6px 10px; }
    .modal { padding: 24px 20px 18px; }
    .modal h3 { font-size: 19px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a class="nav-btn" href="index.html">← 목록</a>
  </div>
  <div class="nav-left">
    <button class="nav-btn primary" id="editBtn" type="button" onclick="openMetaModal()">📝 편집</button>
    <button class="nav-btn nav-btn-danger" id="delBtn" type="button" onclick="confirmDelete()">삭제</button>
  </div>
</nav>

<div class="container">
  <div id="root" class="empty">
    <div class="e">⏳</div>
    <div>로딩 중...</div>
  </div>
</div>

<!-- META EDIT MODAL -->
<div class="modal-bg" id="metaModal" onclick="if(event.target===this)closeMetaModal()">
  <div class="modal">
    <h3>카드 편집</h3>
    <div class="modal-sub">Card Metadata</div>
    <label>이모지</label>
    <input id="me_emoji" maxlength="4" placeholder="📊">
    <label>이벤트명</label>
    <input id="me_title" placeholder="예: WORK FEST 2026">
    <label>카테고리</label>
    <input id="me_category" placeholder="페스티벌 / 컨퍼런스 / 웨비나 / 해커톤">
    <label>기간 (YYYY.MM.DD ~ YYYY.MM.DD)</label>
    <input id="me_period" placeholder="2026.06.01 ~ 2026.06.30">
    <label>상태</label>
    <select id="me_status">
      <option value="ongoing">진행중</option>
      <option value="soon">예정</option>
      <option value="done">종료</option>
      <option value="cancel">취소</option>
    </select>
    <label>신청 KPI 목표</label>
    <input id="me_kpi_signup" placeholder="예: 1,000명">
    <label>이력서 업데이트 KPI 목표</label>
    <input id="me_kpi_resume" placeholder="예: 500명">

    <label>구글 시트 URL (신청자수 자동 분석)</label>
    <input id="me_link_sheet" placeholder="https://docs.google.com/spreadsheets/d/...">
    <label>노션 페이지 URL (이벤트 메타)</label>
    <input id="me_link_notion" placeholder="https://www.notion.so/...">

    <div class="modal-actions">
      <button class="nav-btn" type="button" onclick="closeMetaModal()">취소</button>
      <button class="nav-btn primary" type="button" onclick="saveMeta()">저장</button>
    </div>
  </div>
</div>

<script src="projects-data.js"></script>
<script src="sync-client.js?v=20260512a"></script>
<script>
// ════════════════════════════════════════════════════════════
//  Project Detail — Memo Style Report (2026-05-14)
//  메모장 뷰 + 같은 페이지 모달 편집 (논문 결 통일)
// ════════════════════════════════════════════════════════════

const params = new URLSearchParams(location.search);
const projectId = params.get('id');

// ─── 모달 — 카드 메타 편집 ───
function openMetaModal() {
  const p = window.getProject(projectId);
  if (!p) { alert('프로젝트를 찾을 수 없습니다.'); return; }
  document.getElementById('me_emoji').value = p.emoji || '';
  document.getElementById('me_title').value = p.title || p.name || '';
  document.getElementById('me_category').value = p.category || '';
  document.getElementById('me_period').value = p.period || '';
  document.getElementById('me_status').value = p.status || 'ongoing';
  const kpis = (p.extKpis && p.extKpis.length) ? p.extKpis : (p.kpis || []);
  const su = kpis.find(k => /신청|응모|지원|참여|참가|등록|모집/i.test(k?.label || ''));
  const ru = kpis.find(k => /이력서|업데이트|resume|update/i.test(k?.label || ''));
  document.getElementById('me_kpi_signup').value = su?.value || '';
  document.getElementById('me_kpi_resume').value = ru?.value || '';
  document.getElementById('me_link_sheet').value = p.links?.sheet || '';
  document.getElementById('me_link_notion').value = p.links?.notion || '';
  document.getElementById('metaModal').classList.add('is-open');
}
function closeMetaModal() { document.getElementById('metaModal').classList.remove('is-open'); }
function saveMeta() {
  const p = window.getProject(projectId);
  if (!p) return;
  const next = { ...p,
    emoji: document.getElementById('me_emoji').value.trim() || p.emoji || '📊',
    title: document.getElementById('me_title').value.trim() || p.title || '',
    category: document.getElementById('me_category').value.trim(),
    period: document.getElementById('me_period').value.trim(),
    status: document.getElementById('me_status').value,
  };
  // KPI 갱신: 신청·이력서 항목 교체
  const oldKpis = (p.extKpis && p.extKpis.length) ? p.extKpis : (p.kpis || []);

// ─── 시트 새로고침 (실시간 fetch) ───
async function refreshSheet() {
  const p = window.getProject(projectId);
  if (!p) return;
  const allUrls = [...(p.resources || []), p.links?.sheet].filter(Boolean);
  const sheetUrl = allUrls.find(u => /spreadsheets\/d\//.test(u || ''));
  if (!sheetUrl) { alert('시트 URL이 등록되지 않았습니다. 우상단 편집에서 추가하세요.'); return; }
  const sid = (sheetUrl.match(/spreadsheets\/d\/([\w-]+)/) || [])[1];
  if (!sid) { alert('시트 URL 형식이 이상합니다.'); return; }
  const gid = (sheetUrl.match(/[#&?]gid=(\d+)/) || [])[1] || '0';
  const btn = document.getElementById('refreshSheetBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ fetching...'; }
  try {
    const r = await fetch('/api/fetch-sheet?t=' + Date.now(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      cache: 'no-store',
      body: JSON.stringify({ sheetUrl, sheetId: sid, gid })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!d?.rows) throw new Error(d?.error || '빈 응답');
    const payload = { sheetId: sid, sheetUrl, fetchedAt: d.fetchedAt || new Date().toISOString(), rows: d.rows };
    window.SHEET_CACHES = window.SHEET_CACHES || {};
    window.SHEET_CACHES[sid] = payload;
    try { localStorage.setItem('b2c_sheet_data_' + sid, JSON.stringify(payload)); } catch(e) {}
    render();
  } catch (e) {
    alert('시트 fetch 실패: ' + (e.message || e) + '\n\n시트 권한이 "링크 공개"인지 확인해주세요.');
    if (btn) { btn.disabled = false; btn.textContent = '🔄 시트 새로고침'; }
  }
}

}[c]));

const pad = (s, n, right) => {
  s = String(s ?? '');
  // 한글 등 글자 폭 계산
  const w = visualWidth(s);
  if (w >= n) return s;
  const sp = ' '.repeat(n - w);
  return right ? sp + s : s + sp;
};
function visualWidth(s) {
  let w = 0;
  for (const ch of String(s)) {
    const code = ch.codePointAt(0);
    // 한글(가-힣), 이모지 등은 2칸
    if (code > 0x2E80) w += 2;
    else w += 1;
  }
  return w;
}

function parseDate(s) {
  if (!s) return null;
  const m = String(s).match(/(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/);
  return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
}

}

// ─── 시트 timestamp 컬럼 → 일별/누적 자동 집계 ───
// 구글폼 응답 시트 1열은 보통 "타임스탬프"이지만, 헤더 텍스트로 찾아 우선 매칭하고
// 못 찾으면 0번 컬럼을 fallback으로 사용.
function computeDailyTrend(rows) {
  if (!rows || rows.length < 2) return null;
  const headers = rows[0] || [];
  let tsIdx = -1;
  headers.forEach((h, i) => {
    if (tsIdx < 0 && /(타임스탬프|timestamp|날짜|date|제출.*시각|응답.*시각)/i.test(String(h).replace(/\s/g, ''))) tsIdx = i;
  });
  if (tsIdx < 0) tsIdx = 0;
  const dailyMap = {};
  rows.slice(1).forEach(r => {
    const raw = String(r[tsIdx] || '').trim();
    if (!raw) return;
    // 지원 포맷: "2026. 5. 1 오전 1:04:21" / "2026-05-01 ..." / "2026/05/01 ..."
    const m = raw.match(/(\d{4})[.\-/\s]+(\d{1,2})[.\-/\s]+(\d{1,2})/);
    if (!m) return;
    const key = `${m[1]}-${String(m[2]).padStart(2, '0')}-${String(m[3]).padStart(2, '0')}`;
    dailyMap[key] = (dailyMap[key] || 0) + 1;
  });
  const dates = Object.keys(dailyMap).sort();
  if (!dates.length) return null;
  // 날짜 구멍 메우기 (시작~끝 사이 비는 날 0으로)
  const first = new Date(dates[0]);
  const last = new Date(dates[dates.length - 1]);
  const filled = [];
  let cum = 0;
  for (let t = first.getTime(); t <= last.getTime(); t += 86400000) {
    const d = new Date(t);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    const count = dailyMap[key] || 0;
    cum += count;
    filled.push({ date: key, count, cumulative: cum });
  }
  return filled;
}

// ─── SVG 콤보 차트 (일별 막대 + 누적 라인) ───
function renderTrendChart(daily) {
  if (!Array.isArray(daily) || daily.length === 0) return '';
  const W = 760, H = 280;
  const padL = 46, padR = 46, padT = 18, padB = 42;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const n = daily.length;
  const xStep = n > 1 ? innerW / (n - 1) : innerW;
  const maxDaily = Math.max(...daily.map(d => d.count || 0), 1);
  const maxCum = Math.max(...daily.map(d => d.cumulative || 0), 1);
  const niceMaxCum = (() => {
    const pow = Math.pow(10, Math.floor(Math.log10(maxCum)));
    return Math.ceil(maxCum / pow) * pow;
  })();
  const niceMaxDaily = (() => {
    const pow = Math.pow(10, Math.floor(Math.log10(maxDaily)));
    return Math.ceil(maxDaily / pow) * pow;
  })();
  const xOf = (i) => padL + i * xStep;
  const yOfCum = (v) => padT + innerH - (v / niceMaxCum) * innerH;
  const yOfDaily = (v) => padT + innerH - (v / niceMaxDaily) * innerH;

  // 막대 (일별)
  const barW = Math.max(2, Math.min(20, xStep * 0.55));
  const bars = daily.map((d, i) => {
    const x = xOf(i) - barW / 2;
    const h = innerH - (yOfDaily(d.count) - padT);
    const y = yOfDaily(d.count);
    const spike = d.count >= 500 ? ' spike' : '';
    return `<rect class="tc-bar${spike}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(h, 0).toFixed(1)}"><title>${d.date} · 일별 ${d.count.toLocaleString()}</title></rect>`;
  }).join('');

  // 누적 라인
  const linePts = daily.map((d, i) => `${xOf(i).toFixed(1)},${yOfCum(d.cumulative).toFixed(1)}`).join(' ');
  const dots = daily.map((d, i) => {
    const last = i === n - 1 ? ' last' : '';
    return `<circle class="tc-dot${last}" cx="${xOf(i).toFixed(1)}" cy="${yOfCum(d.cumulative).toFixed(1)}" r="${i === n - 1 ? 3.6 : 2.6}"><title>${d.date} · 누적 ${d.cumulative.toLocaleString()}</title></circle>`;
  }).join('');

  // 마지막 누적값 라벨
  const lastD = daily[n - 1];
  const lastLabel = `<text class="tc-label-val" x="${(xOf(n - 1) + 6).toFixed(1)}" y="${(yOfCum(lastD.cumulative) - 4).toFixed(1)}" text-anchor="start">${lastD.cumulative.toLocaleString()}</text>`;

  // 그리드 + 좌(누적) 축
  const ticks = [0, 0.25, 0.5, 0.75, 1];
  const grid = ticks.map(t => `<line class="tc-grid" x1="${padL}" x2="${W - padR}" y1="${(padT + t * innerH).toFixed(1)}" y2="${(padT + t * innerH).toFixed(1)}" />`).join('');
  const yLeft = ticks.map(t => {
    const val = Math.round(niceMaxCum * (1 - t));
    return `<text class="tc-axis" x="${padL - 8}" y="${(padT + t * innerH + 3).toFixed(1)}" text-anchor="end">${val.toLocaleString()}</text>`;
  }).join('');
  // 우(일별) 축
  const yRight = ticks.map(t => {
    const val = Math.round(niceMaxDaily * (1 - t));
    return `<text class="tc-axis" x="${W - padR + 8}" y="${(padT + t * innerH + 3).toFixed(1)}" text-anchor="start">${val.toLocaleString()}</text>`;
  }).join('');

  // X축 라벨 (적당히 간격두고)
  const xLabelStep = Math.max(1, Math.ceil(n / 9));
  const xLabels = daily.map((d, i) => {
    if (i % xLabelStep !== 0 && i !== n - 1) return '';
    const mmdd = d.date.slice(5).replace('-', '/');
    return `<text class="tc-axis" x="${xOf(i).toFixed(1)}" y="${H - padB + 18}" text-anchor="middle">${mmdd}</text>`;
  }).join('');

  // 축 캡션
  const captionL = `<text class="tc-axis" x="${padL - 8}" y="${padT - 6}" text-anchor="end">누적</text>`;
  const captionR = `<text class="tc-axis" x="${W - padR + 8}" y="${padT - 6}" text-anchor="start">일별</text>`;

  return `
    <div class="trend-chart">
      <div class="tc-legend">
        <span><span class="lg-swatch"></span>일별 신청</span>
        <span><span class="lg-line"></span>누적 신청</span>
        <span class="tc-summary">누적 ${lastD.cumulative.toLocaleString()}명 · ${lastD.date.slice(5).replace('-', '/')}</span>
      </div>
      <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" role="img" aria-label="신청자 일별 추이">
        ${grid}
        ${captionL}${captionR}
        ${yLeft}${yRight}
        ${bars}
        <polyline class="tc-line" points="${linePts}" />
        ${dots}
        ${lastLabel}
        ${xLabels}
      </svg>
    </div>
  `;
}

    if (contentEff.funnel) {
      const f = contentEff.funnel, rows = [];
      if (f.viewToStart != null) rows.push(`<tr><th>페이지 진입 → 폼 시작</th><td class="num">${f.viewToStart}%</td></tr>`);
      if (f.startToFinish != null) rows.push(`<tr><th>폼 시작 → 폼 완료</th><td class="num">${f.startToFinish}%</td></tr>`);
      if (f.overall != null) rows.push(`<tr class="total-row"><th>전체 CVR · 진입 → 완료</th><td class="num">${f.overall}%</td></tr>`);
      if (rows.length) parts.push(`<div class="sub-block"><div class="sb-title">폼 단계별 드롭률</div><table class="data-table">${rows.join('')}</table></div>`);
    }
    // 5) 콘텐츠 의도 매칭
    if (contentEff.intentMatch) {
      const im = contentEff.intentMatch;
      parts.push(`
        <div class="sub-block">
          <div class="sb-title">콘텐츠 의도 매칭 · 신청자 직무 분포</div>
          ${im.distribution ? `<div style="font-family:var(--serif);font-size:16px;color:var(--text);letter-spacing:0;padding:8px 0">${esc(im.distribution)}</div>` : ''}
          ${im.note ? `<div class="sb-note">→ ${esc(im.note)}</div>` : ''}
        </div>
      `);
    }
    return parts.length ? parts.join('') : emptyBlock('콘텐츠 효율 세부 항목 미입력');
  }

  // ─── HTML 빌드 ───
  const html = [];

  // Cover
  const coverKicker = [category, statusLabel].filter(Boolean).join(' · ');
  html.push(`
    <header class="report-cover">
      ${coverKicker ? `<div class="cover-kicker">${esc(coverKicker)}</div>` : ''}
      <h1 class="cover-title">${emoji ? `<span class="cover-emoji">${esc(emoji)}</span>` : ''}${esc(title)}</h1>
      <div class="cover-meta">
        <span><b>기간</b>${esc(periodLine)}</span>
        ${dDay ? `<span><b>D-day</b><span class="dday">${esc(dDay)}</span></span>` : ''}
        ${dayN ? `<span><b>진행</b>${esc(dayN)}</span>` : ''}
        <span class="status-badge ${statusCls}">${esc(statusLabel)}</span>
      </div>
      ${tags.length ? `<div class="tags">${tags.map(t => `<span class="tag">#${esc(t)}</span>`).join('')}</div>` : ''}
    </header>
  `);

  // 섹션 번호 동적 매김
  let secCnt = 0;
  const nx = () => String(++secCnt).padStart(2, '0');

  // 01 핵심 지표
  html.push(section(nx(), '핵심 지표', null, kpis.length ? `
    <div class="kpi-grid">
      ${kpis.map(k => {
        const target = parseTarget(k.value);
        const current = matchCurrent(k.label);
        let pct = null;
        if (target != null && current != null) pct = current / target * 100;
        const curStr = current != null ? fmt(current) : '—';
        const pctStr = pct != null ? pct.toFixed(1) + '%' : '—';
        const barW = pct != null ? Math.min(100, pct) : 0;
        return `
          <div class="kpi-card">
            <div class="kpi-label">${esc(k.label)}</div>
            <div class="kpi-value">${curStr}<span class="kpi-unit"> / ${esc(k.value)}</span></div>
            <div class="kpi-target">달성률 <span class="pct">${pctStr}</span><span class="kpi-light">${lightFor(pct)}</span></div>
            <div class="kpi-bar"><i style="width:${barW}%"></i></div>
          </div>
        `;
      }).join('')}
    </div>
  ` : emptyBlock('KPI 미설정', '우상단 편집에서 추가')));

  // 02 이력서 매칭
  html.push(section(nx(), '이력서 매칭', null, resumeStats ? `
    <table class="data-table">
      <tr><th>시트 ID 입력</th><td class="num">${fmt(resumeStats.totalIds)}</td></tr>
      <tr><th>DB 매칭</th><td class="num">${fmt(resumeStats.matched)} <span style="font-family:var(--sans);font-size:12px;color:var(--text-3);font-weight:400">(${resumeStats.matchRate ?? '—'}%)</span></td></tr>
      <tr class="total-row"><th>이력서 업데이트</th><td class="num">${fmt(resumeStats.resumeUpdated)} <span style="font-family:var(--sans);font-size:12px;color:var(--text-3);font-weight:400">(${resumeStats.updateRate ?? '—'}%)</span></td></tr>
    </table>
    ${resumeStats.byType ? `<div class="sb-note" style="margin-top:14px">소셜 ${resumeStats.byType.social || 0} · 평문 ${resumeStats.byType.plain || 0} · 이메일 ${resumeStats.byType.email || 0}</div>` : ''}
    ${resumeStats.lastUpdated ? `<div class="sb-note">매칭 일시: ${esc(resumeStats.lastUpdated)}</div>` : ''}
  ` : emptyBlock('이력서 매칭 데이터 없음', '매칭 큐 처리 후 자동 표시')));

  // 03 신청자 자동 분석
  const trendDaily = (autoDaily && autoDaily.length) ? autoDaily
                    : (sheetAnalysis?.daily?.length ? sheetAnalysis.daily.map(d => ({
                        date: d.date,
                        count: Number(d.count) || 0,
                        cumulative: Number(d.cumulative) || 0,
                      })) : null);
  // sheetAnalysis 폴백에 cumulative가 없으면 보정
  if (trendDaily && trendDaily.some(d => !d.cumulative)) {
    let cum = 0;
    trendDaily.forEach(d => { cum += (d.count || 0); d.cumulative = cum; });
  }
  const showApplicant = liveTotal != null || (trendDaily && trendDaily.length);
  const refreshBar = (p.links?.sheet || (p.resources || []).some(u => /spreadsheets\/d\//.test(u || ''))) ? `
    <div class="refresh-bar">
      <span class="rb-meta">${sheetFetchedAt ? `마지막 fetch · ${fmtDt(sheetFetchedAt)}` : '아직 fetch 전'}</span>
      <button class="nav-btn" type="button" onclick="refreshSheet()" id="refreshSheetBtn">🔄 시트 새로고침</button>
    </div>
  ` : '';
  html.push(section(nx(), '신청자 자동 분석', null, showApplicant ? `
    ${refreshBar}
    ${liveTotal != null ? `
      <table class="data-table">
        <tr><th>총 응답 (raw)</th><td class="num">${fmt(liveTotal)}</td></tr>
        ${liveUnique != null ? `<tr><th>유니크 ID (중복제외)</th><td class="num">${fmt(liveUnique)}</td></tr>` : ''}
      </table>
    ` : ''}
    ${(trendDaily && trendDaily.length) ? `
      <div class="sub-block" style="margin-top:22px">
        <div class="sb-title">일별 / 누적 추이</div>
        ${renderTrendChart(trendDaily)}
      </div>
    ` : ''}
  ` : (refreshBar + emptyBlock('신청자 시트가 연결되지 않았습니다', '시트 URL 등록 후 자동 분석'))));

  // 04 광고 효율
  html.push(section(nx(), '광고 효율', adReport ? '마크업·VAT 전' : null, adReport ? `
    <table class="data-table">
      ${adReport.spend != null ? `<tr><th>집행 (마크업·VAT 전)</th><td class="num">${fmt(adReport.spend)}원</td></tr>` : ''}
      ${adReport.impressions != null ? `<tr><th>노출</th><td class="num">${fmt(adReport.impressions)}</td></tr>` : ''}
      ${adReport.clicks != null ? `<tr><th>클릭</th><td class="num">${fmt(adReport.clicks)}</td></tr>` : ''}
      ${adReport.ctr != null ? `<tr><th>CTR</th><td class="num">${adReport.ctr}%</td></tr>` : ''}
      ${adReport.cpc != null ? `<tr><th>CPC</th><td class="num">${fmt(adReport.cpc)}원</td></tr>` : ''}
      ${adReport.cpa != null ? `<tr class="total-row"><th>CPA · 신청 단가</th><td class="num">${fmt(adReport.cpa)}원</td></tr>` : ''}
    </table>
  ` : emptyBlock('광고 리포트 없음', '커디팀에서 받은 Meta 리포트 박으면 자동 표시')));

  // 05 콘텐츠 효율
  html.push(section(nx(), '콘텐츠 효율', '콘텐츠 담당자 관점', renderContentEff()));

  // 06 예산 / 품의
  html.push(section(nx(), '예산 / 품의', null, (budget?.items?.length) ? `
    <table class="data-table">
      ${budget.items.map(it => `<tr><th>${esc(it.label || it.name || '항목')}</th><td class="num">${fmt(it.amount)}원</td></tr>`).join('')}
      <tr class="total-row"><th>합계</th><td class="num">${fmt(budget.items.reduce((s, it) => s + (Number(it.amount) || 0), 0))}원</td></tr>
    </table>
  ` : emptyBlock('예산 미입력')));

  // 07 웨비나 메트릭 (있을 때만)
  if (webinar) {
    html.push(section(nx(), '웨비나 메트릭', null, `
      <table class="data-table">
        ${webinar.zoomUnique != null ? `<tr><th>줌 유니크 참석자</th><td class="num">${fmt(webinar.zoomUnique)}</td></tr>` : ''}
        ${webinar.zoomPeak != null ? `<tr><th>최대 동시 접속</th><td class="num">${fmt(webinar.zoomPeak)}</td></tr>` : ''}
        ${webinar.satisfaction != null ? `<tr><th>만족도</th><td class="num">${webinar.satisfaction}점</td></tr>` : ''}
      </table>
    `));
  }

  // 외부 자료
  html.push(section(nx(), '외부 자료', null, links.length ? `
    <div class="link-chips">
      ${links.map(l => `<a class="link-chip" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)} ↗</a>`).join('')}
    </div>
  ` : emptyBlock('외부 자료 없음')));

  // 메모 (있을 때만)
  if (note) {
    html.push(section(nx(), '메모', null, `<div class="memo-block">${esc(note)}</div>`));
  }

  // 푸터
  html.push(`<div class="report-foot">최종 렌더 · ${new Date().toISOString().slice(0,16).replace('T', ' ')}</div>`);

  // 렌더
  root.outerHTML = `<article class="report" id="root">${html.join('')}</article>`;
}

// 데모 PROJECTS 데이터 로드 후 렌더
function tryRender() {
  // PROJECTS는 외부 스크립트로 채워질 수 있어 약간 지연
  if (typeof window.getProject === 'function') {
    render();
  } else {
    setTimeout(tryRender, 50);
  }
}
tryRender();
</script>
</body>
</html>
