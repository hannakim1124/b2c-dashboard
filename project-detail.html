<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로젝트 상세 · 인사이트전략팀</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --c-bg: #FFFFFF;
      --c-surface: #FFFFFF;
      --c-surface-alt: #F9FAFB;
      --c-surface-deep: #F2F4F6;
      --c-border: #F2F4F6;
      --c-border-strong: #E5E8EB;
      --c-text: #191F28;
      --c-text-2: #4E5968;
      --c-text-3: #8B95A1;
      --c-text-4: #B0B8C1;
      --c-primary: #3182F6;
      --c-primary-hover: #1B64DA;
      --c-primary-bg: #E8F3FF;
      --c-primary-deep: #0E4BC9;
      --c-navy: #0F1A30;
      --c-success: #00C896;
      --c-success-bg: #E5F9F4;
      --c-warning: #FFB700;
      --c-warning-bg: #FFF7E0;
      --c-danger: #F04452;
      --c-danger-bg: #FFEBEC;
      --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px; --r-pill: 999px;
      --sh-1: 0 2px 6px rgba(15,19,36,0.04);
      --sh-2: 0 8px 24px rgba(15,19,36,0.08);
      --sh-3: 0 16px 48px rgba(15,19,36,0.12);
      --nav-h: 64px;
      --tx-mono: "tnum" on, "lnum" on;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: calc(var(--nav-h) + 24px); }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--c-bg); color: var(--c-text); -webkit-font-smoothing: antialiased; line-height: 1.5; overflow-x: hidden; }
    * { max-width: 100%; box-sizing: border-box; }
    img, svg, video, table { max-width: 100%; }
    table { table-layout: auto; }
    pre, code { white-space: pre-wrap; word-break: break-all; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }
    .container { max-width: 1080px; margin: 0 auto; padding: 0 32px; }

    /* ────────────────────────────────────────────────
       Top Nav
    ──────────────────────────────────────────────── */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--nav-h); background: rgba(255,255,255,0.88); backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid var(--c-border); }
    .nav-inner { max-width: 1080px; margin: 0 auto; padding: 0 32px; height: 100%; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .nav-brand { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 800; }
    .nav-brand .logo { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, var(--c-primary) 0%, var(--c-primary-deep) 100%); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 13px; }
    .nav-brand .year { font-size: 11px; font-weight: 700; color: var(--c-text-3); background: var(--c-surface-deep); padding: 3px 8px; border-radius: 6px; margin-left: 4px; }
    .nav-actions { display: flex; align-items: center; gap: 8px; }
    .back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600; color: var(--c-text-2); padding: 8px 12px; border-radius: 8px; transition: background 0.12s, color 0.12s; }
    .back-link:hover { background: var(--c-surface-deep); color: var(--c-text); }
    .top-edit { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; background: var(--c-text); color: #fff; border-radius: 10px; font-size: 13px; font-weight: 700; border: none; transition: background 0.12s, transform 0.1s; }
    .top-edit:hover { background: var(--c-navy); }
    .top-edit:active { transform: scale(0.97); }
    .top-del { padding: 9px 12px; background: transparent; color: var(--c-text-3); border-radius: 10px; font-size: 13px; font-weight: 700; border: none; }
    .top-del:hover { background: var(--c-danger-bg); color: var(--c-danger); }

    /* ────────────────────────────────────────────────
       Hero (cover)
    ──────────────────────────────────────────────── */
    .cover {
      padding: calc(var(--nav-h) + 32px) 0 0;
      position: relative; overflow: hidden;
    }
    .cover-inner {
      position: relative;
      min-height: 380px;
      border-radius: var(--r-xl);
      padding: 40px 40px 32px;
      display: flex; flex-direction: column; justify-content: space-between;
      overflow: hidden;
      background: linear-gradient(135deg, #5A9BFF 0%, #3182F6 50%, #1B64DA 100%);
    }
    .cover-inner::before {
      content: ''; position: absolute; inset: 0;
      background-size: 200% 200%;
      animation: bgShift 8s ease-in-out infinite;
      opacity: 0.95;
    }
    @keyframes bgShift {
      0%, 100% { background-position: 0% 0%; }
      50%      { background-position: 100% 100%; }
    }
    .cover-inner > * { position: relative; z-index: 2; }

    .cv-hanna   { background: linear-gradient(135deg, #BCD8FF 0%, #7EAFFF 50%, #3182F6 100%); }
    .cv-minji   { background: linear-gradient(135deg, #B5F0DC 0%, #5FE0BD 50%, #00C896 100%); }
    .cv-jihoon  { background: linear-gradient(135deg, #FFCEC6 0%, #FFA89E 50%, #FF7B72 100%); }
    .cv-suyoung { background: linear-gradient(135deg, #DFC4FF 0%, #C9A2FF 50%, #B981F5 100%); }
    .cv-taeho   { background: linear-gradient(135deg, #FFE5A8 0%, #FFD566 50%, #FFB700 100%); }

    .cover-emoji {
      position: absolute; right: -40px; bottom: -40px;
      font-size: 320px; opacity: 0.35;
      line-height: 1; transform: rotate(-8deg);
      filter: drop-shadow(0 12px 36px rgba(0,0,0,0.2));
      pointer-events: none;
    }
    .cv-pattern {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.18) 1px, transparent 0);
      background-size: 20px 20px;
      pointer-events: none;
    }

    .breadcrumb { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 600; }
    .breadcrumb a:hover { color: #fff; text-decoration: underline; }
    .breadcrumb .sep { opacity: 0.6; }

    .cover-tag {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: var(--r-pill);
      margin-top: 20px; margin-bottom: 20px;
      background: rgba(255,255,255,0.96); color: var(--c-text);
      backdrop-filter: blur(8px);
      align-self: flex-start;
    }
    .cover-countdown {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 700; padding: 6px 14px; border-radius: var(--r-pill);
      margin-left: 8px; margin-top: 20px; margin-bottom: 20px;
      background: rgba(0,0,0,0.32); color: #fff;
      backdrop-filter: blur(8px);
      align-self: flex-start;
    }
    .cover-countdown strong { font-feature-settings: var(--tx-mono); font-weight: 900; }
    .cover-tag.live { color: var(--c-danger); }
    .cover-tag.live .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--c-danger); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

    .cover-cat {
      font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.85);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px;
    }
    .cover-title {
      font-size: 48px; font-weight: 900; letter-spacing: -0.04em; line-height: 1.05;
      color: #fff; margin-bottom: 16px; max-width: 680px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .cover-desc {
      font-size: 18px; color: rgba(255,255,255,0.92); font-weight: 500;
      line-height: 1.6; max-width: 640px;
    }

    .cover-meta {
      display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .meta-author { display: inline-flex; align-items: center; gap: 12px; }
    .meta-author .av {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff;
      background: rgba(255,255,255,0.95); color: var(--c-text);
      border: 2px solid rgba(255,255,255,0.6);
    }
    .meta-author .name { font-size: 15px; font-weight: 800; color: #fff; }
    .meta-author .role { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 600; }
    .meta-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.3); }
    .meta-row { display: flex; flex-direction: column; gap: 2px; }
    .meta-row .lbl { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .meta-row .val { font-size: 14px; color: #fff; font-weight: 700; font-feature-settings: var(--tx-mono); }

    /* ────────────────────────────────────────────────
       Body Layout
    ──────────────────────────────────────────────── */
    .body-wrap { padding: 48px 0 64px; }
    .body-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 48px;
    }
    .body-main { min-width: 0; max-width: 100%; }

    .toc {
      position: sticky; top: calc(var(--nav-h) + 24px);
      align-self: start;
    }
    .toc-title { font-size: 11px; font-weight: 800; color: var(--c-text-3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; }
    .toc ul { list-style: none; display: flex; flex-direction: column; gap: 2px; }
    .toc a {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 8px;
      font-size: 13px; color: var(--c-text-3); font-weight: 600;
      transition: background 0.12s, color 0.12s;
    }
    .toc a:hover { background: var(--c-surface-deep); color: var(--c-text); }
    .toc a.is-active { background: var(--c-primary-bg); color: var(--c-primary); }
    .toc a .num { font-size: 10px; font-weight: 700; opacity: 0.55; min-width: 16px; }

    /* TOC 아래 미니 타임라인 */
    .toc-timeline { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--c-border); }
    .toc-timeline-list { display: flex; flex-direction: column; gap: 0; padding-left: 14px; position: relative; }
    .toc-timeline-list::before { content: ''; position: absolute; left: 4px; top: 6px; bottom: 6px; width: 2px; background: var(--c-border-strong); border-radius: 2px; }
    .toc-tl-item { position: relative; padding: 4px 0 12px; }
    .toc-tl-item:last-child { padding-bottom: 0; }
    .toc-tl-item::before {
      content: ''; position: absolute; left: -14px; top: 5px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #fff; border: 2px solid var(--c-border-strong);
    }
    .toc-tl-item.is-done::before { border-color: var(--c-success); background: var(--c-success); }
    .toc-tl-item.is-now::before { border-color: var(--c-primary); background: var(--c-primary); box-shadow: 0 0 0 3px rgba(49,130,246,0.18); animation: pulse 1.5s infinite; }
    .toc-tl-date { font-size: 10px; color: var(--c-text-3); font-weight: 700; font-feature-settings: var(--tx-mono); margin-bottom: 1px; }
    .toc-tl-item.is-now .toc-tl-date { color: var(--c-primary); }
    .toc-tl-label { font-size: 12px; color: var(--c-text-2); font-weight: 600; line-height: 1.3; display: flex; align-items: center; gap: 4px; }
    .toc-tl-empty { font-size: 11px; color: var(--c-text-3); padding: 6px 0; }
    .toc-tl-btn {
      background: transparent; border: none; cursor: pointer;
      font-size: 11px; opacity: 0; transition: opacity 0.15s;
      padding: 2px 4px; border-radius: 4px; flex-shrink: 0;
    }
    .toc-tl-item:hover .toc-tl-btn { opacity: 0.6; }
    .toc-tl-btn:hover { opacity: 1 !important; background: var(--c-surface-deep); }

    /* ────────────────────────────────────────────────
       Section
    ──────────────────────────────────────────────── */
    .section { padding-bottom: 56px; }
    .section + .section { padding-top: 8px; border-top: 1px solid var(--c-border); padding-top: 56px; }
    .sec-eyebrow { display: inline-block; font-size: 11px; font-weight: 800; color: var(--c-primary); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .sec-title { font-size: 28px; font-weight: 900; letter-spacing: -0.025em; margin-bottom: 24px; line-height: 1.2; }

    /* Sheet auto-render */
    .sheet-card { background: var(--c-surface); }
    .sheet-loading, .sheet-empty {
      padding: 32px; text-align: center;
      color: var(--c-text-3); font-size: 14px;
    }
    .sheet-summary {
      padding: 12px 16px; background: var(--c-surface-deep);
      font-size: 12px; color: var(--c-text-2); font-weight: 600;
    }
    .sheet-summary strong { color: var(--c-primary); font-feature-settings: var(--tx-mono); }
    .sheet-table-wrap { overflow-x: auto; max-height: 400px; overflow-y: auto; }
    .sheet-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .sheet-table th, .sheet-table td {
      padding: 8px 12px; text-align: left;
      border-bottom: 1px solid var(--c-border);
      white-space: nowrap; max-width: 200px;
      overflow: hidden; text-overflow: ellipsis;
    }
    .sheet-table th {
      background: var(--c-surface-deep);
      font-weight: 700; font-size: 11px;
      color: var(--c-text-2); position: sticky; top: 0;
    }
    .sheet-table tbody tr:hover { background: var(--c-surface-alt); }

    /* History */
    .history-list { display: flex; flex-direction: column; gap: 12px; }
    .history-item {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--r-lg); padding: 16px;
    }
    .history-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--c-border); }
    .history-date { font-size: 13px; font-weight: 700; color: var(--c-text); font-feature-settings: var(--tx-mono); }
    .history-user {
      font-size: 11px; padding: 3px 8px;
      background: var(--c-primary-bg); color: var(--c-primary);
      border-radius: 6px; font-weight: 700;
    }
    .history-changes { display: flex; flex-direction: column; gap: 6px; }
    .history-change { font-size: 13px; color: var(--c-text-2); line-height: 1.5; }
    .history-change strong { color: var(--c-text); }
    .history-change .from { color: var(--c-text-3); text-decoration: line-through; margin: 0 4px; }
    .history-change .arrow { color: var(--c-text-3); margin: 0 4px; }
    .history-change .to { color: var(--c-primary); font-weight: 700; }

    /* Retro memo */
    .retro-block {
      background: #FFFBF0; border: 1px solid #FFE4A8;
      border-radius: var(--r-lg); padding: 24px;
      font-size: 15px; color: var(--c-text-2); line-height: 1.7;
      white-space: pre-wrap;
    }
    /* Tags - cover 우측 상단 */
    .cover-tags {
      position: absolute; top: 24px; right: 24px;
      display: flex; flex-wrap: wrap; gap: 6px;
      max-width: 50%; justify-content: flex-end;
      z-index: 3;
    }
    .cover-tag-chip {
      display: inline-block; padding: 4px 10px;
      background: rgba(255,255,255,0.22); color: #fff;
      backdrop-filter: blur(8px);
      border-radius: 12px; font-size: 11px; font-weight: 700;
      letter-spacing: -0.01em;
    }
    /* Share button */
    .share-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; background: var(--c-surface-deep);
      border: 1px solid var(--c-border); border-radius: 8px;
      font-size: 13px; font-weight: 600; color: var(--c-text-2);
      cursor: pointer; font-family: inherit;
      transition: all 0.12s;
    }
    .share-btn:hover { background: var(--c-primary-bg); border-color: var(--c-primary); color: var(--c-primary); }

    /* Link embed (YouTube etc.) */
    .link-embed { background: #000; border-radius: var(--r-lg); overflow: hidden; }
    .link-embed-head { padding: 12px 16px; background: var(--c-text); color: #fff; font-size: 13px; font-weight: 700; }
    .link-embed-frame { position: relative; padding-bottom: 56.25%; height: 0; }
    .link-embed-frame iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .link-embed-link { display: block; padding: 10px 16px; background: var(--c-surface-deep); color: var(--c-primary); font-size: 12px; font-weight: 600; text-align: center; }

    /* External links — small card grid */
    .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .link-card {
      position: relative; display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; background: var(--c-surface);
      border: 1px solid var(--c-border); border-radius: var(--r-md);
      transition: all 0.12s; cursor: pointer;
    }
    .link-card:hover { background: var(--c-primary-bg); border-color: var(--c-primary); transform: translateY(-1px); }
    .link-card:hover .link-card-edit { opacity: 1; }
    .link-card-ic { font-size: 22px; flex-shrink: 0; }
    .link-card-info { flex: 1; min-width: 0; }
    .link-card-label { font-size: 13px; font-weight: 700; color: var(--c-text); margin-bottom: 2px; }
    .link-card-url { font-size: 11px; color: var(--c-text-3); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .link-card-arrow { color: var(--c-text-4); font-size: 14px; flex-shrink: 0; }
    .link-card-edit {
      position: absolute; top: 6px; right: 6px;
      width: 24px; height: 24px; border-radius: 6px;
      background: var(--c-surface-deep); color: var(--c-text-2);
      border: none; cursor: pointer; font-size: 11px;
      opacity: 0; transition: all 0.12s;
      display: flex; align-items: center; justify-content: center;
    }
    .link-card-edit:hover { background: var(--c-primary); color: #fff; opacity: 1; }
    .link-card-untagged .link-card-edit { opacity: 1; background: var(--c-warning-bg); color: #B57F00; }
    .link-card-add {
      border: 2px dashed var(--c-border-strong); background: transparent;
      color: var(--c-text-3); font-family: inherit; cursor: pointer;
      width: 100%; text-align: left;
    }
    .link-card-add:hover { border-color: var(--c-primary); background: var(--c-primary-bg); color: var(--c-primary); transform: translateY(-1px); }
    .link-card-add .link-card-ic { font-size: 26px; opacity: 0.7; }
    .link-card-add:hover .link-card-ic { opacity: 1; }
    .link-card-add .link-card-label { color: inherit; }
    .link-card-add .link-card-url { color: inherit; opacity: 0.6; }

    /* Auto-analysis dashboard for sheet */
    .analysis-block { display: flex; flex-direction: column; gap: 20px; }
    .analysis-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; background: var(--c-surface-alt);
      border-radius: var(--r-md);
    }
    .analysis-head-title { font-size: 13px; font-weight: 700; color: var(--c-text); display: flex; align-items: center; gap: 8px; }
    .analysis-head-meta { font-size: 11px; color: var(--c-text-3); font-weight: 600; font-feature-settings: var(--tx-mono); }
    .analysis-head-link {
      font-size: 12px; font-weight: 600; color: var(--c-primary);
      padding: 6px 12px; background: var(--c-primary-bg); border-radius: 8px;
    }
    .analysis-head-link:hover { background: var(--c-primary); color: #fff; }

    /* Auto KPI grid (smaller than main kpi) */
    .auto-kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .auto-kpi {
      padding: 18px 20px; background: var(--c-surface);
      border: 1px solid var(--c-border); border-radius: var(--r-md);
    }
    .auto-kpi .lbl { font-size: 11px; color: var(--c-text-3); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.02em; }
    .auto-kpi .val { font-size: 24px; font-weight: 900; color: var(--c-text); letter-spacing: -0.02em; font-feature-settings: var(--tx-mono); line-height: 1.1; }
    .auto-kpi .val.primary { color: var(--c-primary); }
    .auto-kpi .val.success { color: var(--c-success); }
    .auto-kpi .sub { font-size: 11px; color: var(--c-text-3); font-weight: 600; margin-top: 4px; font-feature-settings: var(--tx-mono); }

    /* Distribution bar list */
    .dist-card {
      padding: 24px; background: var(--c-surface);
      border: 1px solid var(--c-border); border-radius: var(--r-md);
    }
    .dist-card-title { font-size: 14px; font-weight: 800; color: var(--c-text); margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
    .dist-card-title .total { font-size: 11px; color: var(--c-text-3); font-weight: 600; margin-left: auto; font-feature-settings: var(--tx-mono); }
    .dist-list { display: flex; flex-direction: column; gap: 10px; }
    .dist-row { display: grid; grid-template-columns: 100px 1fr 60px; gap: 12px; align-items: center; }
    .dist-row-label { font-size: 13px; font-weight: 600; color: var(--c-text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dist-row-bar-wrap { height: 8px; background: var(--c-surface-deep); border-radius: 4px; overflow: hidden; }
    .dist-row-bar { height: 100%; background: var(--c-primary); border-radius: 4px; transition: width 0.4s ease; }
    .dist-row-val { font-size: 12px; font-weight: 700; color: var(--c-text); text-align: right; font-feature-settings: var(--tx-mono); }

    /* Daily trend bar chart */

    /* Spike reason modal */
    .reason-modal-bg {
      position: fixed; inset: 0; z-index: 400;

    }

    .reason-modal {

    .reason-modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }

    .reason-modal-foot { padding: 16px 28px 24px; border-top: 1px solid var(--c-border); display: flex; gap: 8px; justify-content: flex-end; }
    .reason-modal-foot .btn-clear { padding: 10px 14px; background: var(--c-danger-bg); color: var(--c-danger); border: none; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; margin-right: auto; }
    .reason-modal-foot .btn-cancel { padding: 10px 16px; background: var(--c-surface-deep); color: var(--c-text-2); border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }

    /* Distribution grid (multiple categorical columns side-by-side) */
    .dist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }

    /* 💰 예산 / 품의 섹션 (다중 품의) */
    .budget-card {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--r-md); padding: 24px;
    }
    .budget-totals {

      gap: 12px; margin-bottom: 18px;
    }
    .budget-totals .budget-mini { padding: 16px 18px; }

    .budget-totals .budget-mini .val { font-size: 20px; }
    .budget-list { display: flex; flex-direction: column; gap: 12px; }
    .budget-row {
      border: 1px solid var(--c-border); border-radius: var(--r-md);
      padding: 16px 18px; transition: border-color 0.15s;
    }
    .budget-row:hover { border-color: var(--c-border-strong); }
    .budget-row-head {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }

    .budget-link-row {

      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));

    }
    .budget-mini { padding: 14px 16px; background: var(--c-surface-alt); border-radius: var(--r-md); }

    .budget-mini .val { font-size: 18px; font-weight: 800; color: var(--c-text); font-feature-settings: var(--tx-mono); }

    .budget-meta {

      background: var(--c-surface-alt); border-radius: var(--r-md); margin-bottom: 14px;
      font-size: 12px;
    }
    .budget-meta .item { display: flex; flex-direction: column; gap: 2px; }
    .budget-meta .lbl { color: var(--c-text-3); font-weight: 700; font-size: 11px; }
    .budget-meta .val { color: var(--c-text); font-weight: 700; }
    .budget-status-pill {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 800;
    }
    .budget-status-pill.approved { background: var(--c-success-bg); color: #008B6A; }

    .budget-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }

    /* 📈 광고 효율 섹션 */

      border-radius: var(--r-md); padding: 18px 20px;
    }

      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px; margin-bottom: 14px;

    .ad-kpi {
      padding: 14px 16px; background: var(--c-surface-alt);

    }

    .ad-kpi .val { font-size: 20px; font-weight: 900; color: var(--c-text); font-feature-settings: var(--tx-mono); line-height: 1.1; }
    .ad-kpi .val.primary { color: var(--c-primary); }
    .ad-kpi .val.success { color: var(--c-success); }

    .ad-kpi .val.danger { color: var(--c-danger); }

    /* Job group card (4 직군 통합) — 컴팩트 */

    .jobgroup-detail {

      cursor: pointer; transition: all 0.12s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .dl-format-btn:hover { background: var(--c-primary-bg); border-color: var(--c-primary); }
    .dl-format-btn.is-active { background: var(--c-primary-bg); border-color: var(--c-primary); color: var(--c-primary); }
    .dl-modal-foot {
      padding: 16px 28px 24px; border-top: 1px solid var(--c-border);
      display: flex; gap: 8px; justify-content: flex-end; align-items: center;
    }
    .dl-foot-info { font-size: 11px; color: var(--c-text-3); margin-right: auto; }
    .dl-btn-cancel {
      padding: 10px 16px; background: var(--c-surface-deep);
      color: var(--c-text-2); border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .dl-btn-confirm {
      padding: 10px 18px; background: var(--c-text); color: #fff;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .dl-btn-confirm:hover { background: var(--c-navy); }
    .dl-btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Original sheet collapsed details */
    .sheet-details {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--r-md); overflow: hidden;
    }
    .sheet-details summary {
      padding: 12px 16px; cursor: pointer;
      font-size: 12px; font-weight: 700; color: var(--c-text-2);
      list-style: none; display: flex; align-items: center; gap: 8px;
    }
    .sheet-details summary::-webkit-details-marker { display: none; }
    .sheet-details summary::before { content: '▸'; transition: transform 0.2s; font-size: 10px; }
    .sheet-details[open] summary::before { transform: rotate(90deg); }
    .sheet-details summary:hover { background: var(--c-surface-alt); }
    .sheet-details[open] summary { border-bottom: 1px solid var(--c-border); }

    /* Donut chart - 직군 분포 */
    .donut-section {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--r-lg); padding: 32px;
      display: grid; grid-template-columns: 240px 1fr; gap: 32px; align-items: center;
    }
    @media (max-width: 600px) { .donut-section { grid-template-columns: 1fr; } }
    .donut-wrap { position: relative; width: 220px; height: 220px; margin: 0 auto; }
    .donut-circle { width: 100%; height: 100%; border-radius: 50%; }
    .donut-hole {
      position: absolute; inset: 36px;
      background: var(--c-surface); border-radius: 50%;
      box-shadow: inset 0 0 0 1px var(--c-border);
    }
    .donut-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; pointer-events: none;
    }
    .donut-total { font-size: 32px; font-weight: 900; color: var(--c-text); letter-spacing: -0.03em; }
    .donut-total-label { font-size: 11px; color: var(--c-text-3); font-weight: 700; margin-top: 2px; }
    .donut-legend { display: flex; flex-direction: column; gap: 10px; }
    .donut-item { display: grid; grid-template-columns: 16px 1fr auto auto; gap: 12px; align-items: center; padding: 10px 14px; border-radius: 8px; transition: background 0.15s; }
    .donut-item:hover { background: var(--c-surface-deep); }
    .donut-dot { width: 14px; height: 14px; border-radius: 4px; }
    .donut-label { font-size: 14px; font-weight: 600; color: var(--c-text); }
    .donut-count { font-size: 14px; font-weight: 700; color: var(--c-text-2); font-feature-settings: var(--tx-mono); }
    .donut-pct { font-size: 13px; color: var(--c-text-3); font-weight: 600; min-width: 48px; text-align: right; }

    /* KPI grid - 큰 숫자 강조 (개수에 따라 자동 조정) */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    .kpi-card {
      background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--r-lg);
      padding: 24px;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--sh-2); border-color: transparent; }
    .kpi-card { position: relative; }
    .kpi-card .lbl { font-size: 12px; color: var(--c-text-3); font-weight: 600; margin-bottom: 8px; letter-spacing: 0.02em; display: flex; align-items: center; gap: 8px; }
    /* KPI 신호등 — 점 3개 (빨/초/파 위치 고정), 현재 단계 1개만 색 켜짐 */
    .kpi-light {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 5px;
      background: rgba(0,0,0,0.04);
      border-radius: 999px;
      flex-shrink: 0;
    }
    .kpi-light .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,0.12);
      transition: all .25s ease;
    }
    /* 1번째 점: 빨강 (<50%일 때만 켜짐) */
    .kpi-light.red .dot:nth-child(1) {
      background: #F04452;
      box-shadow: 0 0 8px rgba(240,68,82,0.65);
      animation: kpi-pulse 0.9s infinite;
    }
    /* 2번째 점: 초록 (50-100%일 때만 켜짐) */
    .kpi-light.green .dot:nth-child(2) {
      background: #00C896;
      box-shadow: 0 0 8px rgba(0,200,150,0.65);
    }
    /* 3번째 점: 파랑 (>100%일 때만 켜짐) */
    .kpi-light.blue .dot:nth-child(3) {
      background: #3182F6;
      box-shadow: 0 0 8px rgba(49,130,246,0.65), 0 0 14px rgba(49,130,246,0.35);
      animation: kpi-pulse 1.6s infinite;
    }
    @keyframes kpi-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.85); }
    }
    .kpi-light-tip {
      font-size: 11px; font-weight: 700;
      margin-left: auto;
    }
    .kpi-light-tip.red { color: var(--c-danger); }
    .kpi-light-tip.green { color: var(--c-success); }
    .kpi-light-tip.blue { color: #3182F6; }
    .kpi-card .val { font-size: 32px; font-weight: 900; letter-spacing: -0.025em; color: var(--c-text); font-feature-settings: var(--tx-mono); line-height: 1.1; }
    .kpi-card .val.success { color: var(--c-success); }
    .kpi-card .val.warning { color: var(--c-warning); }
    .kpi-card .val.danger { color: var(--c-danger); }
    /* KPI 진행률 */
    .kpi-progress { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--c-border); }
    .kpi-progress-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    .kpi-progress-current { font-size: 14px; font-weight: 800; color: var(--c-text); font-feature-settings: var(--tx-mono); }
    .kpi-progress-current .of { color: var(--c-text-3); font-weight: 600; font-size: 12px; margin-left: 2px; }
    .kpi-progress-pct { font-size: 14px; font-weight: 800; font-feature-settings: var(--tx-mono); }
    .kpi-progress-pct.under { color: var(--c-warning); }
    .kpi-progress-pct.near { color: var(--c-primary); }
    .kpi-progress-pct.done { color: var(--c-success); }
    .kpi-progress-bar {
      height: 8px; background: var(--c-surface-deep); border-radius: 4px; overflow: hidden;
    }
    .kpi-progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .kpi-progress-fill.under { background: linear-gradient(90deg, #FFB700 0%, #F5A623 100%); }
    .kpi-progress-fill.near { background: linear-gradient(90deg, #5A9BFF 0%, #3182F6 100%); }
    .kpi-progress-fill.done { background: linear-gradient(90deg, #2DDDB0 0%, #00C896 100%); }
    .kpi-fetch-btn {
      width: 100%; padding: 10px 14px;
      background: var(--c-primary-bg); color: var(--c-primary);
      border: 1px dashed var(--c-primary); border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.12s;
    }
    .kpi-fetch-btn:hover { background: var(--c-primary); color: #fff; }
    .kpi-fetch-hint { font-size: 11px; color: var(--c-text-3); text-align: center; margin-top: 6px; line-height: 1.4; }

    /* Story */
    .story p { font-size: 17px; color: var(--c-text-2); line-height: 1.8; }
    .story p + p { margin-top: 18px; }
    .story strong { color: var(--c-text); font-weight: 700; }

    /* Quote block */
    .quote-block {
      margin: 36px 0 0;
      padding: 32px 36px;
      background: var(--c-surface-alt);
      border-left: 4px solid var(--c-primary);
      border-radius: 0 var(--r-md) var(--r-md) 0;
      position: relative;
    }
    .quote-block::before {
      content: '"';
      position: absolute; top: -8px; left: 16px;
      font-size: 88px; color: var(--c-primary);
      font-weight: 900; line-height: 1; opacity: 0.18;
    }
    .quote-text { font-size: 19px; color: var(--c-text); font-weight: 600; line-height: 1.55; letter-spacing: -0.015em; }
    .quote-who { font-size: 13px; color: var(--c-text-3); font-weight: 600; margin-top: 12px; }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 0; position: relative; padding-left: 28px; }
    .timeline::before { content: ''; position: absolute; left: 9px; top: 14px; bottom: 14px; width: 2px; background: var(--c-border-strong); border-radius: 2px; }
    .tl-item { position: relative; padding: 4px 0 28px; }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-item::before {
      content: ''; position: absolute; left: -28px; top: 8px;
      width: 20px; height: 20px; border-radius: 50%;
      background: #fff; border: 3px solid var(--c-border-strong);
      transition: all 0.2s;
    }
    .tl-item.is-done::before { border-color: var(--c-success); background: var(--c-success); }
    .tl-item.is-now::before { border-color: var(--c-primary); background: var(--c-primary); box-shadow: 0 0 0 5px rgba(49,130,246,0.18); animation: pulse 1.5s infinite; }
    .tl-date { font-size: 12px; color: var(--c-text-3); font-weight: 700; letter-spacing: 0.04em; margin-bottom: 4px; font-feature-settings: var(--tx-mono); }
    .tl-item.is-now .tl-date { color: var(--c-primary); }
    .tl-label { font-size: 16px; color: var(--c-text); font-weight: 700; }

    /* Next actions */
    .actions {
      background: linear-gradient(135deg, var(--c-primary) 0%, var(--c-primary-deep) 100%);
      color: #fff;
      border-radius: var(--r-xl); padding: 40px;
      position: relative; overflow: hidden;
    }
    .actions::before {
      content: ''; position: absolute; right: -60px; top: -60px;
      width: 240px; height: 240px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .actions::after {
      content: ''; position: absolute; right: 40px; bottom: -40px;
      width: 140px; height: 140px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .actions-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.85; margin-bottom: 12px; position: relative; z-index: 2; }
    .actions h3 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 24px; position: relative; z-index: 2; }
    .actions ul { list-style: none; display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 2; }
    .actions li {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 15px; font-weight: 600;
    }
    .actions li::before {
      content: '▸'; color: rgba(255,255,255,0.7); flex-shrink: 0;
      font-weight: 800;
    }

    /* Related */
    .rel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .rel-card {
      background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--r-lg);
      padding: 22px 22px 18px;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      cursor: pointer; display: flex; flex-direction: column; gap: 12px;
      min-height: 160px;
    }
    .rel-card:hover { transform: translateY(-2px); box-shadow: var(--sh-2); border-color: transparent; }
    .rel-card-cat { font-size: 11px; font-weight: 700; color: var(--c-text-3); letter-spacing: 0.06em; text-transform: uppercase; }
    .rel-card-title { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.35; flex: 1; }
    .rel-card-foot { display: flex; align-items: center; gap: 8px; padding-top: 14px; border-top: 1px solid var(--c-border); margin-top: auto; }
    .rel-card-foot .av { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; }
    .rel-card-foot .name { font-size: 12px; font-weight: 700; }
    .rel-card-foot .meta { margin-left: auto; font-size: 11px; color: var(--c-text-3); font-weight: 500; font-feature-settings: var(--tx-mono); }

    /* avatars */
    .av-hanna   { background: linear-gradient(135deg, #5A9BFF 0%, #3182F6 100%); }
    .av-minji   { background: linear-gradient(135deg, #2DDDB0 0%, #00C896 100%); }
    .av-jihoon  { background: linear-gradient(135deg, #FFA89E 0%, #FF7B72 100%); }
    .av-suyoung { background: linear-gradient(135deg, #D2A8FF 0%, #B981F5 100%); }
    .av-taeho   { background: linear-gradient(135deg, #FFD566 0%, #FFB700 100%); }
    .meta-author .av-hanna,
    .meta-author .av-minji,
    .meta-author .av-jihoon,
    .meta-author .av-suyoung,
    .meta-author .av-taeho { color: var(--c-text); background: rgba(255,255,255,0.95); }

    /* Not found */
    .not-found { padding: 120px 32px; text-align: center; min-height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .not-found .e { font-size: 56px; margin-bottom: 16px; }
    .not-found h2 { font-size: 26px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
    .not-found p { font-size: 14px; color: var(--c-text-3); margin-bottom: 28px; }
    .not-found a { display: inline-block; padding: 12px 24px; background: var(--c-primary); color: #fff; border-radius: 10px; font-weight: 700; font-size: 14px; }

    /* Footer */
    footer { padding: 40px 0; border-top: 1px solid var(--c-border); font-size: 12px; color: var(--c-text-3); font-weight: 500; }
    footer .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    footer a { color: var(--c-primary); font-weight: 600; }

    /* Sticker FAB & palette */
    .sticker-fab {
      position: fixed; right: 28px; bottom: 28px; z-index: 200;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--c-text); color: #fff;
      border: none; font-size: 22px; cursor: pointer;
      box-shadow: var(--sh-3);
      transition: transform 0.18s, background 0.15s;
    }
    .sticker-fab:hover { background: var(--c-primary); transform: scale(1.05); }
    .sticker-fab:active { transform: scale(0.94); }
    .sticker-palette {
      position: fixed; right: 28px; bottom: 96px; z-index: 200;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--r-lg); padding: 14px;
      box-shadow: var(--sh-3);
      display: none; max-width: 320px;
    }
    .sticker-palette.is-open { display: block; }
    .sticker-palette-title { font-size: 11px; font-weight: 700; color: var(--c-text-3); margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
    .sticker-palette-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .sticker-palette-item {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer; border-radius: 8px;
      transition: background 0.12s, transform 0.1s;
      background: transparent; border: none;
    }
    .sticker-palette-item:hover { background: var(--c-surface-deep); transform: scale(1.15); }
    .sticker-palette-hint { font-size: 11px; color: var(--c-text-3); margin-top: 8px; text-align: center; }
    .sticker {
      position: absolute; font-size: 48px; user-select: none;
      cursor: grab; line-height: 1; z-index: 50;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.18));
      transition: transform 0.1s;
    }
    .sticker:hover { transform: scale(1.1); }
    .sticker:hover .sticker-del { opacity: 1; transform: scale(1); }
    .sticker.is-dragging { cursor: grabbing; transform: scale(1.15); z-index: 100; }
    .sticker-del {
      position: absolute; top: -6px; right: -6px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--c-danger); color: #fff;
      border: 2px solid #fff;
      font-size: 11px; font-weight: 900; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.8);
      transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .sticker-del:hover { background: #C8313A; transform: scale(1.15) !important; }
    body { position: relative; }

    /* Toast */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--c-text); color: #fff; padding: 12px 20px; border-radius: var(--r-md); font-size: 13px; font-weight: 600; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; box-shadow: var(--sh-2); }
    .toast.is-open { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast .ok { color: var(--c-success); margin-right: 6px; font-weight: 800; }

    /* Responsive */
    @media (max-width: 1024px) {
      .body-grid { grid-template-columns: 1fr; gap: 32px; }
      .toc { display: none; }
      .cover-title { font-size: 48px; }
      .rel-grid { grid-template-columns: repeat(2, 1fr); }
      .cover-emoji { font-size: 220px; }
    }
    @media (max-width: 640px) {
      .container { padding: 0 20px; }
      .cover-inner { padding: 36px 28px; min-height: 380px; }
      .cover-title { font-size: 34px; }
      .cover-desc { font-size: 15px; }
      .cover-emoji { font-size: 160px; right: -20px; bottom: -20px; }
      .kpi-grid, .rel-grid { grid-template-columns: 1fr; }
      .kpi-card .val { font-size: 26px; }
      .sec-title { font-size: 22px; }
      .quote-block { padding: 24px 20px; }
      .quote-text { font-size: 16px; }
      .actions { padding: 28px 24px; }
      .actions h3 { font-size: 20px; }
    }
  </style>
</head>

  <script>
    // 마이그레이션: 커리어 컨퍼런스 날짜 강제 수정 (매번 실행 — 5/7 흔적 모두 제거)
    (function migrateCareerConfDate() {
      try {
        const id = 'user-1778136263589';
        function fixCard(p) {
          if (!p) return false;
          let changed = false;
          if (p.date !== '2026-03-26') { p.date = '2026-03-26'; changed = true; }
          if (p.period !== '2026.03.04 — 2026.03.26') { p.period = '2026.03.04 — 2026.03.26'; changed = true; }
          if (p.desc && /5월\s*0?7|05\.07/.test(p.desc)) {
            p.desc = p.desc.replace(/5월\s*0?7일/g, '3월 26일').replace(/05\.07/g, '03.26');
            changed = true;
          }
          if (p.categoryLabel && /5월\s*0?7|05\.07/.test(p.categoryLabel)) {
            p.categoryLabel = p.categoryLabel.replace(/5월\s*0?7일/g, '3월 26일').replace(/05\.07/g, '03.26');
            changed = true;
          }
          if (Array.isArray(p.timeline)) {
            const end = p.timeline.find(t => /모집\s*마감/.test(t.label || ''));
            if (end && end.date !== '2026.03.26') { end.date = '2026.03.26'; changed = true; }
            const start = p.timeline.find(t => /모집\s*시작/.test(t.label || ''));
            if (start && start.date !== '2026.03.04') { start.date = '2026.03.04'; changed = true; }
          }
          return changed;
        }
        const list = JSON.parse(localStorage.getItem('b2c_user_projects') || '[]');
        const p = list.find(x => x.id === id);
        if (p && fixCard(p)) {
          localStorage.setItem('b2c_user_projects', JSON.stringify(list));
          console.log('✓ 커리어 컨퍼런스 날짜 강제 갱신');
        }
        const ov = JSON.parse(localStorage.getItem('b2c_overrides') || '{}');
        if (ov[id] && fixCard(ov[id])) {
          localStorage.setItem('b2c_overrides', JSON.stringify(ov));
          console.log('✓ override 날짜 강제 갱신');
        }
      } catch(e) { console.warn('migrate err', e); }
    })();
  </script>
  <script>
    function escapeHtml(s) {
      return (s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const p = id ? window.getProject(id) : null;
    const main = document.getElementById('main');
    const topEdit = document.getElementById('topEdit');
    const topDel = document.getElementById('topDel');

    if (!p) {
      main.innerHTML = `
        <div class="not-found">
          <div class="e">🤷</div>
          <h2>프로젝트를 찾을 수 없어요</h2>
          <p>잘못된 링크이거나 삭제된 프로젝트일 수 있어요.</p>
          <a href="index.html">목록으로 돌아가기</a>
        </div>`;
      topEdit.style.display = 'none';
    } else {
      const m = window.MEMBERS[p.member] || { name: '게스트', avatar: '?', role: '', cls: 'hanna' };
      const tagInner = p.status === 'live'
        ? `<span class="pulse"></span>${escapeHtml(p.statusLabel || 'LIVE')}`
        : escapeHtml(p.statusLabel || ({ ongoing:'진행중', soon:'예정', done:'완료' }[p.status] || ''));

      // 모집 N일차 / D-day 카운트다운 계산 (period에서 시작/종료일 추출)
      function parseDateStr(s) {
        if (!s) return null;
        const m = String(s).match(/(\d{4})[.\-/\s]+(\d{1,2})[.\-/\s]+(\d{1,2})/);
        if (!m) return null;
        return new Date(`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}T00:00:00`);
      }
      let countdownInfo = '';
      const periodStr = p.period || '';
      const periodMatch = periodStr.match(/(\d{4}[.\-/]\s*\d{1,2}[.\-/]\s*\d{1,2})\s*[—~\-–]\s*(\d{4}[.\-/]\s*\d{1,2}[.\-/]\s*\d{1,2})/);
      if (periodMatch) {
        const startDate = parseDateStr(periodMatch[1]);
        const endDate = parseDateStr(periodMatch[2]);
        if (startDate && endDate) {
          const today = new Date(); today.setHours(0,0,0,0);
          const dayMs = 24*60*60*1000;
          const totalDays = Math.round((endDate - startDate) / dayMs) + 1;
          if (today < startDate) {
            const dDay = Math.ceil((startDate - today) / dayMs);
            countdownInfo = `<span class="cover-countdown">⏳ D-${dDay} · 모집 시작 전</span>`;
          } else if (today > endDate) {
            countdownInfo = `<span class="cover-countdown">🏁 모집 종료 (${totalDays}일간 진행)</span>`;
          } else {
            const dayN = Math.round((today - startDate) / dayMs) + 1;
            const dEnd = Math.round((endDate - today) / dayMs);
            countdownInfo = `<span class="cover-countdown">📅 모집 <strong>${dayN}일차</strong> / 총 ${totalDays}일 · D-${dEnd}</span>`;
          }
        }
      }

      // 빈 KPI ("—" / 공백 / undefined) 자동 제외
      const rawKpis = (p.extKpis && p.extKpis.length) ? p.extKpis : (p.kpis || []);
      const kpis = rawKpis.filter(k => {
        if (!k) return false;
        const lbl = (k.label || '').trim();
        const val = (k.value || '').trim();
        return lbl && val && lbl !== '—' && val !== '—';
      });

      // KPI 자동 진행률 — 시트 데이터에서 현재값 매칭 (카드 본인의 sheetId만)
      const allUrls = [...(p.resources || []), p.links?.sheet, p.links?.notion].filter(Boolean);
      const sheetUrl = allUrls.find(u => /spreadsheets\/d\//.test(u || ''));
      let liveSheetTotal = null, liveSheetUnique = null;
      if (sheetUrl) {
        const sidMatch = sheetUrl.match(/spreadsheets\/d\/([\w-]+)/);
        if (sidMatch) {
          const c = window.SHEET_CACHES && window.SHEET_CACHES[sidMatch[1]];
          if (c?.rows && c.rows.length > 1) {
            liveSheetTotal = c.rows.length - 1;
            // ID 컬럼 자동 인식
            const headers = c.rows[0];
            let idIdx = -1;
            headers.forEach((h, i) => {
              if (idIdx < 0 && /(잡코|jobkorea|회원id|memberid)/i.test((h || '').replace(/\s/g,''))) idIdx = i;
            });
            if (idIdx >= 0) {
              const ids = c.rows.slice(1).map(r => (r[idIdx] || '').trim().toLowerCase()).filter(Boolean);
              liveSheetUnique = new Set(ids).size;
            }
          }
        }
      }
      const liveResume = (window.RESUME_CACHES && window.RESUME_CACHES[p.id])?.resumeUpdated ?? null;

      function parseTargetNumber(value) {
        if (value == null) return null;
        const m = String(value).match(/[\d,]+/);
        return m ? parseInt(m[0].replace(/,/g, '')) : null;
      }
      function matchCurrentValue(label) {
        const l = (label || '').toLowerCase();
        if (/이력서|업데이트|resume|update/.test(l)) return liveResume;
        if (/유니크|unique|중복.*제외|dedup/.test(l)) return liveSheetUnique ?? liveSheetTotal;
        if (/신청|응모|register|지원|참여|참가/.test(l)) return liveSheetTotal;
        return null;
      }

      // 시간 진행률 (period 기준 — 신호등 페이스 비교용)
      let timeProgress = null;
      if (periodMatch) {
        const sd = parseDateStr(periodMatch[1]);
        const ed = parseDateStr(periodMatch[2]);
        if (sd && ed) {
          const td = new Date(); td.setHours(0,0,0,0);
          if (td <= sd) timeProgress = 0;
          else if (td >= ed) timeProgress = 1;
          else timeProgress = (td - sd) / (ed - sd);
        }
      }
      function calcTrafficLight(current, target) {
        if (current == null || target == null || target === 0) return null;
        const actual = current / target;
        const pctLabel = (actual * 100).toFixed(0) + '%';
        // >100%: 파랑 (초과 달성)
        if (actual > 1) return { color: 'blue', label: `초과 ${pctLabel}` };
        // 50-100%: 초록 (달성권)
        if (actual >= 0.5) return { color: 'green', label: `달성 ${pctLabel}` };
        // <50%: 빨강 (미달)
        return { color: 'red', label: `미달 ${pctLabel}` };
      }

      const kpiHtml = kpis.map((k, kpiIdx) => {
        const target = parseTargetNumber(k.value);
        const current = matchCurrentValue(k.label);
        const isResumeKpi = /이력서|업데이트|resume/i.test(k.label);
        const light = calcTrafficLight(current, target);
        // 각 KPI별 데이터팀 자료 URL
        let dataUrl = '';
        try { dataUrl = localStorage.getItem(`b2c_data_url_${p.id}_kpi_${kpiIdx}`) || ''; } catch(e) {}
        let progressHtml = '';
        if (target != null && current != null) {
          const pct = (current / target) * 100;
          const cls = pct >= 100 ? 'done' : pct >= 70 ? 'near' : 'under';
          const barWidth = Math.min(100, pct);
          progressHtml = `
            <div class="kpi-progress">
              <div class="kpi-progress-row">
                <div class="kpi-progress-current">${current.toLocaleString()}<span class="of">/ ${target.toLocaleString()}</span></div>
                <div class="kpi-progress-pct ${cls}">${pct.toFixed(1)}%</div>
              </div>
              <div class="kpi-progress-bar">
                <div class="kpi-progress-fill ${cls}" style="width:${barWidth.toFixed(1)}%"></div>
              </div>
              ${(() => {
                // 신청자 KPI는 시트 자동 분석되니까 데이터팀 URL 버튼 숨김
                const isApplicantKpi = /신청|응모|register|참여|참가/i.test(k.label || '');
                const showResumeBtn = isResumeKpi && liveSheetUnique != null;
                const showDataUrlBtn = !isApplicantKpi;
                if (!showResumeBtn && !showDataUrlBtn) return '';
                return `
                  <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
                    ${showResumeBtn ? `<button class="kpi-fetch-btn" style="flex:1;min-width:180px" onclick="requestResumeUpdate('${escapeHtml(p.id || '')}')">🔍 메타베이스 다시 매칭</button>` : ''}
                    ${showDataUrlBtn ? `<button class="kpi-fetch-btn" style="flex:1;min-width:140px;background:var(--c-warning-bg);color:#B57F00;border-color:#B57F00" onclick="attachKpiDataUrl('${escapeHtml(p.id || '')}', ${kpiIdx}, '${escapeHtml((k.label || '').replace(/'/g,"\\'"))}')">📊 데이터팀 자료${dataUrl ? ' ✓' : ' URL'}</button>` : ''}
                  </div>
                  ${dataUrl ? `<div style="margin-top:6px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--c-text-3);justify-content:center;flex-wrap:wrap">
                    <a href="${escapeHtml(dataUrl)}" target="_blank" rel="noopener" style="color:var(--c-primary);font-weight:600">📎 ${escapeHtml(dataUrl.replace(/^https?:\/\//,'').slice(0,40))}…</a>
                    <button onclick="refreshKpiDataUrl('${escapeHtml(p.id || '')}', ${kpiIdx}, '${escapeHtml((k.label || '').replace(/'/g,"\\'"))}')" style="padding:4px 10px;background:var(--c-warning-bg);color:#B57F00;border:1px solid var(--c-warning);border-radius:6px;font-size:10px;font-weight:800;cursor:pointer;font-family:inherit">🚀 자동 갱신 + 비교</button>
                  </div>` : ''}`;
              })()}
            </div>`;
        } else if (isResumeKpi && target != null) {
          // 이력서 KPI — 회원ID 있는지에 따라 분기
          if (liveSheetUnique != null && liveSheetUnique > 0) {
            progressHtml = `
              <div class="kpi-progress">
                <button class="kpi-fetch-btn" onclick="requestResumeUpdate('${escapeHtml(p.id || '')}')">🔍 메타베이스 매칭 시작 (회원ID ${liveSheetUnique}명)</button>
                <div class="kpi-fetch-hint">시트의 회원ID로 잡코리아 DB 매칭 → 결과 자동 박힘</div>
              </div>`;
          } else if (liveSheetTotal != null) {
            progressHtml = `
              <div class="kpi-progress">
                <div style="padding:10px 12px;background:var(--c-warning-bg);color:#8B5A00;border-radius:8px;font-size:11px;font-weight:600;line-height:1.5">
                  ⚠️ 시트에 <strong>회원ID 컬럼</strong>이 없어요. 회원ID 컬럼 추가하면 자동 매칭 가능
                </div>
              </div>`;
          } else {
            progressHtml = `
              <div class="kpi-progress">
                <div style="padding:10px 12px;background:var(--c-warning-bg);color:#8B5A00;border-radius:8px;font-size:11px;font-weight:600;line-height:1.5">
                  ⓘ 시트 데이터 연결 후 회원ID로 자동 매칭됩니다
                </div>
              </div>`;
          }
        }
        return `
          <div class="kpi-card">
            <div class="lbl">
              ${light ? `<span class="kpi-light ${light.color}" title="${light.label}"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>` : ''}
              <span>${escapeHtml(k.label)}</span>
              ${light ? `<span class="kpi-light-tip ${light.color}">${escapeHtml(light.label)}</span>` : ''}
            </div>
            <div class="val ${escapeHtml(k.flavor || '')}">${escapeHtml(k.value)}</div>
            ${progressHtml}
          </div>`;
      }).join('');

      // story 텍스트 정리 — default 자동생성 텍스트는 빈 처리
      let storyText = (p.story || '').trim();
      if (storyText === '사용자가 직접 추가한 프로젝트예요. 상세 내용을 채워보세요.') storyText = '';
      const storyHtml = storyText.split(/\n\n+/).filter(Boolean)
        .map(t => `<p>${escapeHtml(t)}</p>`).join('');
      const showStorySection = storyHtml.length > 0;

      const today = new Date().toISOString().slice(0, 10).replace(/-/g, '.');
      // default '등록 (방금)' 텍스트 제외
      let timelineItems = (p.timeline || []).filter(t => !/등록\s*\(방금\)/.test(t.label || ''));
      // 모집 시작/마감 자동 보강 + period 변경 시 자동 동기화
      if (periodMatch) {
        const fmt = (s) => s.replace(/\s+/g, '').replace(/[\-/]/g, '.');
        const startDate = fmt(periodMatch[1]);
        const endDate = fmt(periodMatch[2]);
        let needsSave = false;
        // 모집 시작
        const startItem = timelineItems.find(t => /모집\s*시작/.test(t.label || ''));
        if (!startItem) {
          timelineItems.push({ date: startDate, label: '모집 시작', icon: '🎬' });
          needsSave = true;
        } else if (startItem.date !== startDate) {
          startItem.date = startDate;
          startItem.icon = startItem.icon || '🎬';
          needsSave = true;
        }
        // 모집 마감
        const endItem = timelineItems.find(t => /모집\s*마감/.test(t.label || ''));
        if (!endItem) {
          timelineItems.push({ date: endDate, label: '모집 마감', icon: '🏁' });
          needsSave = true;
        } else if (endItem.date !== endDate) {
          endItem.date = endDate;
          endItem.icon = endItem.icon || '🏁';
          needsSave = true;
        }
        if (needsSave) {
          setTimeout(() => {
            const project = window.getProject ? window.getProject(p.id) : null;
            if (project) {
              const updated = { ...project, timeline: timelineItems };
              if (window.upsertProject) window.upsertProject(updated);
            }
          }, 100);
        }
      }
      // 타임라인 항목 정렬 (날짜순)
      timelineItems.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      const tlHtml = (timelineItems.length ? timelineItems.map((t, i, arr) => {
        const cls = (t.date <= today) ? 'is-done' : '';
        const isCurrent = (t.date <= today) && (i === arr.length - 1 || arr[i+1].date > today);
        const icon = t.icon || '';
        return `
          <div class="tl-item ${isCurrent && p.status !== 'done' ? 'is-now' : cls}">
            <div class="tl-date">${escapeHtml(t.date)}</div>
            <div class="tl-label" style="display:flex;align-items:center;gap:4px">
              ${icon ? `<span>${icon}</span>` : ''}<span>${escapeHtml(t.label)}</span>
              <button onclick="editTimelineItem('${escapeHtml(p.id || '')}', ${i})" style="margin-left:auto;background:transparent;border:none;color:var(--c-text-4);cursor:pointer;font-size:13px;opacity:0.5;padding:2px 6px;border-radius:4px" title="수정" onmouseover="this.style.opacity='1';this.style.background='var(--c-surface-deep)'" onmouseout="this.style.opacity='0.5';this.style.background='transparent'">✏️</button>
              <button onclick="removeTimelineItem('${escapeHtml(p.id || '')}', ${i})" style="background:transparent;border:none;color:var(--c-text-4);cursor:pointer;font-size:13px;opacity:0.5;padding:2px 6px;border-radius:4px" title="삭제" onmouseover="this.style.opacity='1';this.style.background='var(--c-danger-bg)';this.style.color='var(--c-danger)'" onmouseout="this.style.opacity='0.5';this.style.background='transparent';this.style.color='var(--c-text-4)'">🗑</button>
            </div>
          </div>`;
      }).join('') : '<div style="color:var(--c-text-3);font-size:13px;margin-bottom:14px">타임라인이 아직 등록되지 않았어요. 아래 + 일정 추가로 채워보세요.</div>')
      + `<button onclick="openTimelineAddModal('${escapeHtml(p.id || '')}')" style="margin-top:10px;padding:10px 16px;background:transparent;color:var(--c-primary);border:2px dashed var(--c-primary);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;max-width:280px">＋ 일정 추가</button>`;

      const quoteHtml = '';

      // 회고 메모 섹션 (인라인 편집 가능)
      const retroHtml = `
        <section class="section" id="retro">
          <span class="sec-eyebrow">Retrospective</span>
          <h2 class="sec-title">📓 회고 메모 <button class="share-btn" onclick="editRetro('${id}')" style="font-size:12px;padding:4px 10px;margin-left:8px">✏️ 편집</button></h2>
          <div class="retro-block" id="retroBlock">${
            p.retroNote
              ? escapeHtml(p.retroNote).replace(/\n/g, '<br>')
              : '<span style="color:var(--c-text-3)">아직 회고가 없어요. ✏️ 편집 버튼으로 작성해 보세요.</span>'
          }</div>
        </section>`;

      // 수정 기록 섹션
      const historyHtml = (p.history && p.history.length) ? `
        <section class="section" id="history">
          <span class="sec-eyebrow">Edit History</span>
          <h2 class="sec-title">🕐 수정 기록</h2>
          <div class="history-list">
            ${p.history.slice().reverse().map(h => `
              <div class="history-item">
                <div class="history-head">
                  <span class="history-date">${escapeHtml(h.date)} ${escapeHtml(h.time || '')}</span>
                  <span class="history-user">${escapeHtml(h.user)}</span>
                </div>
                <div class="history-changes">
                  ${(h.changes || []).map(c => `
                    <div class="history-change">
                      <strong>${escapeHtml(c.field)}</strong>:
                      <span class="from">${escapeHtml(String(c.from || '(없음)'))}</span>
                      <span class="arrow">→</span>
                      <span class="to">${escapeHtml(String(c.to || ''))}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </section>` : '';

      // 태그 — cover 우측 상단으로 이동 (메인 영역 안 차지)
      const tagsHtml = '';
      const coverTagsHtml = (p.tags && p.tags.length) ? `
        <div class="cover-tags">
          ${p.tags.map(t => `<span class="cover-tag-chip">#${escapeHtml(t)}</span>`).join('')}
        </div>` : '';

      // 직군 분포 도넛 차트
      let donutHtml = '';
      if (p.jobGroupStats && Object.keys(p.jobGroupStats).length > 0) {
        const colors = {
          'AI·개발·데이터': '#3182F6',
          '디자인': '#00C896',
          '기획·전략': '#F5A623',
          '그 외': '#BCC4CC'
        };
        const entries = Object.entries(p.jobGroupStats).filter(([, v]) => v > 0);
        const total = entries.reduce((s, [, v]) => s + v, 0);
        let cum = 0;
        const segs = entries.map(([label, count]) => {
          const pct = (count / total) * 100;
          const start = cum;
          cum += pct;
          return `${colors[label] || '#BCC4CC'} ${start.toFixed(2)}% ${cum.toFixed(2)}%`;
        }).join(', ');
        const legend = entries.map(([label, count]) => {
          const pct = ((count / total) * 100).toFixed(1);
          return `
            <div class="donut-item">
              <div class="donut-dot" style="background: ${colors[label] || '#BCC4CC'}"></div>
              <div class="donut-label">${escapeHtml(label)}</div>
              <div class="donut-count">${count.toLocaleString()}명</div>
              <div class="donut-pct">${pct}%</div>
            </div>
          `;
        }).join('');
        donutHtml = `

      // 외부 자료 링크 섹션 — URL 자동 분류
      function detectLinkType(url) {
        if (/notion\.so|notion\.site/i.test(url)) return { type: 'notion', icon: '📝', label: '노션 페이지' };
        if (/docs\.google\.com\/spreadsheets/i.test(url)) return { type: 'sheet', icon: '📊', label: '구글 시트' };
        if (/docs\.google\.com\/document/i.test(url)) return { type: 'doc', icon: '📄', label: '구글 문서' };
        if (/docs\.google\.com\/presentation/i.test(url)) return { type: 'slides', icon: '🎤', label: '구글 슬라이드' };
        if (/(youtube\.com\/watch|youtu\.be\/)/i.test(url)) return { type: 'youtube', icon: '📺', label: '유튜브 영상' };
        if (/vimeo\.com/i.test(url)) return { type: 'vimeo', icon: '🎥', label: '비메오 영상' };
        if (/drive\.google\.com/i.test(url)) {
          if (/\.pdf|view\?usp/i.test(url)) return { type: 'drive-file', icon: '📋', label: '구글 드라이브 파일' };
          return { type: 'drive', icon: '📁', label: '구글 드라이브' };
        }
        if (/\.pdf(\?|$)/i.test(url)) return { type: 'pdf', icon: '📋', label: 'PDF' };
        if (/figma\.com/i.test(url)) return { type: 'figma', icon: '🎨', label: '피그마' };
        if (/instagram\.com/i.test(url)) return { type: 'instagram', icon: '📸', label: '인스타그램' };
        if (/linkedin\.com/i.test(url)) return { type: 'linkedin', icon: '💼', label: '링크드인' };
        if (/blog\.naver\.com/i.test(url)) return { type: 'blog', icon: '📰', label: '네이버 블로그' };
        return { type: 'link', icon: '🔗', label: '외부 링크' };
      }
      function getYoutubeId(url) {
        const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
        return m ? m[1] : null;
      }
      function getDriveFileId(url) {
        const m = url.match(/\/file\/d\/([\w-]+)/) || url.match(/[?&]id=([\w-]+)/);
        return m ? m[1] : null;
      }
      // resources 배열 또는 기존 links 객체에서 URL 모음
      const linkUrls = (p.resources && p.resources.length)

      const linkItems = linkUrls

      // 시트는 자동 분석 섹션으로 분리, 나머지는 작은 링크 카드 그리드
      const sheetItems = linkItems.filter(l => l.type === 'sheet' && /spreadsheets\/d\/([\w-]+)/.test(l.url));
      const otherLinks = linkItems.filter(l => !(l.type === 'sheet' && /spreadsheets\/d\/([\w-]+)/.test(l.url)));

      const sheetAnalysisHtml = sheetItems.map(l => {

      // 사용자가 박은 링크 라벨 가져오기 (URL별로 매핑)

      // 외부 자료 카드 그리드 — 마지막에 "+ 추가" 버튼 카드 항상 표시

      const relList = (p.related || []).map(rid => window.getProject(rid)).filter(Boolean).slice(0, 3);

      document.title = `${p.title} · 인사이트전략팀`;

                  <div class="kpi-grid">${kpiHtml}</div>
                </section>

                ${(() => {

                  const isWebinar = /웨비나|webinar|컨퍼런스|conference/i.test((p.category || '') + ' ' + (p.categoryLabel || '') + ' ' + (p.title || ''));
                  if (!isWebinar) return '';
                  const wKey = 'b2c_webinar_metrics_' + (p.id || 'default');
                  let wm = null;
                  try { wm = JSON.parse(localStorage.getItem(wKey) || 'null'); } catch(e) {}
                  wm = wm || {};
                  // 인메모리 WEBINAR_METRICS prefill — 본인 카드 ID만 (카드별 격리)

                        ${zoomUrl ? `

                            <button onclick="refreshWebinarMetrics('${escapeHtml(p.id || '')}')" style="padding:6px 12px;background:var(--c-warning-bg);color:#B57F00;border:1px solid var(--c-warning);border-radius:6px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit">🚀 자동 갱신</button>
                            <button onclick="attachWebinarDataUrl('${escapeHtml(p.id || '')}')" style="padding:6px 10px;background:var(--c-surface-deep);color:var(--c-text-2);border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">✏️ 수정</button>

                        `}
                      </div>
                    </section>`;
                })()}

                ${showStorySection ? `
                <section class="section" id="story">
                  <span class="sec-eyebrow">Story</span>
                  <h2 class="sec-title">프로젝트 이야기</h2>
                  <div class="story">${storyHtml}</div>
                  ${quoteHtml}

                ${tagsHtml}
                ${sheetAnalysisHtml}
                ${(() => {
                  // 💰 예산 / 품의 섹션 (다중 품의 지원: 예산품의 + 구매품의들)
                  const budgetKey = 'b2c_budget_' + (p.id || 'default');
                  let budget = null;
                  try { budget = JSON.parse(localStorage.getItem(budgetKey) || 'null'); } catch(e) {}
                  // 단일 객체 → 다중 배열 자동 마이그레이션
                  if (budget && !budget.items_list && !budget.list) {

                      budget = { list: [{ ...budget, type: 'budget', addedAt: budget.requestedAt || new Date().toISOString() }] };

                  // BUDGETS 자동 prefill 제거 — 정확한 정보는 한나 선배님이 EDA에서 직접 제공해야 함

                  const list = budget.list || [];
                  // 세전(VAT 제외) 환산: 광고비 + 컨커일 때만 ÷1.1 (송장 VAT 포함을 세전으로)

                  // 잔여 = 세전 예산 - 세전 환산 실사용

                  }).join('');

                  return `
                    <section class="section" id="budget">

                      <div class="budget-card">

                        ${list.length ? `<div class="budget-list">${rowsHtml}</div>` : ''}

                          <div style="font-size:13px;font-weight:700;color:var(--c-text)">+ 품의 추가</div>
                          <div class="budget-add-controls">
                            <select id="budgetTypeSelect" onchange="
                              const v = this.value;
                              const inp = document.getElementById('budgetEdiaInput');
                              const btn = document.getElementById('budgetAddBtn');
                              if (v === 'manual') {
                                inp.style.display = 'none';
                                btn.textContent = '✏️ 직접 입력 추가';
                              } else {
                                inp.style.display = '';
                                inp.placeholder = v === 'budget' ? '품의번호 또는 EDA URL' : '컨커 송장번호 또는 SAP Concur URL';

                              }
                            ">
                              <option value="budget">📘 예산품의 (EDA)</option>
                              <option value="concur">💳 실사용 (컨커/SAP)</option>

                })()}
                ${(() => {
                  // 📈 광고 효율 섹션 — 광고 리포트 데이터만 (신청자/이력서는 다른 섹션)
                  const adKey = 'b2c_ad_report_' + (p.id || 'default');
                  let adReport = null;
                  try { adReport = JSON.parse(localStorage.getItem(adKey) || 'null'); } catch(e) {}
                  let gaSheetUrl = '';
                  try { gaSheetUrl = localStorage.getItem('b2c_ga_sheet_' + p.id) || ''; } catch(e) {}
                  // GA 섹션 렌더 함수 (재사용)
                  function renderGaSection() {
                    if (!gaSheetUrl) {
                      return `
                        <div class="ad-ga-input-row">
                          <input type="text" id="adGaInput" placeholder="GA UTM 시트 URL (링크 있는 모두 권한)">
                          <button onclick="saveGaSheet('${escapeHtml(p.id || '')}')">🔗 연결</button>
                        </div>
                        <div style="font-size:11px;color:var(--c-text-3);margin-top:6px">시트 URL 입력 → 자동 fetch → UTM 분석 (링크 있는 모두 권한 필요)</div>`;
                    }
                    const gm = gaSheetUrl.match(/spreadsheets\/d\/([\w-]+)/);
                    const gaSid = gm ? gm[1] : null;
                    const gaCache = gaSid && window.SHEET_CACHES?.[gaSid];
                    if (!gaCache?.rows || gaCache.rows.length < 2) {
                      // 캐시 없음 → 매니저 요청 자동 + 안내
                      return `
                        <div style="padding:12px 14px;background:var(--c-warning-bg);color:#8B5A00;border-radius:8px;font-size:12px;font-weight:600;line-height:1.6">

                          <a href="${escapeHtml(gaSheetUrl)}" target="_blank" rel="noopener" style="color:var(--c-primary);font-weight:700;word-break:break-all">${escapeHtml(gaSheetUrl)}</a>
                        </div>
                        <div style="display:flex;gap:8px;margin-top:8px">
                          <button onclick="fetchGaSheet('${escapeHtml(p.id || '')}')" style="flex:1;padding:8px 12px;background:var(--c-primary);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🚀 자동 fetch + 분석</button>
                          <button onclick="if(confirm('GA 연결 해제?')){localStorage.removeItem('b2c_ga_sheet_${escapeHtml(p.id || '')}');location.reload();}" style="padding:8px 12px;background:transparent;color:var(--c-text-3);border:1px solid var(--c-border);border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">연결 해제</button>
                        </div>`;
                    }
                    // 캐시 있음 → UTM 자동 분석 (헤더 행 자동 탐지)
                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(20, gaCache.rows.length); i++) {
                      const row = gaCache.rows[i];
                      const text = (row || []).join(' ').toLowerCase();
                      if (/세션|사용자|source|medium|campaign|user|session|소스|매체|캠페인|출처/i.test(text)) {
                        headerRowIdx = i;
                        break;
                      }
                    }
                    const headers = gaCache.rows[headerRowIdx] || [];
                    const dataRows = gaCache.rows.slice(headerRowIdx + 1).filter(r => {
                      if (!r.some(c => (c || '').trim())) return false;
                      // "총 합계" 행 제외
                      const txt = r.join(' ').toLowerCase();
                      return !/총\s*합계|grand\s*total/i.test(txt);
                    });
                    const findCol = (re) => headers.findIndex(h => re.test((h||'').toLowerCase().replace(/\s/g,'')));
                    // 한국어 GA: "세션 소스/매체"는 source/medium 통합 컬럼 → source로 처리
                    let srcIdx = findCol(/utm_?source|source|출처|소스|소스\/매체|소스매체/);
                    let medIdx = findCol(/utm_?medium|medium|매체$/);
                    let campIdx = findCol(/utm_?campaign|campaign|캠페인/);
                    const sessIdx = findCol(/sessions?|세션수|세션$/);
                    const userIdx = findCol(/users?|사용자|유저|활성사용자/);
                    const valIdx = sessIdx >= 0 ? sessIdx : userIdx;
                    // medium이 source와 같으면 (통합 컬럼이면) medium 안 쓰기
                    if (srcIdx === medIdx) medIdx = -1;
                    function aggregate(idx) {
                      if (idx < 0) return [];
                      const cnt = {};
                      dataRows.forEach(r => {
                        const k = (r[idx] || '').trim();
                        if (!k) return;
                        const v = valIdx >= 0 ? (parseInt((r[valIdx]||'').replace(/[^0-9]/g,''))||1) : 1;
                        cnt[k] = (cnt[k] || 0) + v;
                      });
                      const total = Object.values(cnt).reduce((a,b)=>a+b,0);
                      return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(([n,v]) => ({name:n, val:v, pct: total>0?(v/total)*100:0}));
                    }
                    const dist = (title, list) => list.length ? `
                      <div style="margin-top:12px">
                        <div style="font-size:11px;font-weight:800;color:var(--c-text-2);margin-bottom:6px">${title}</div>
                        <div class="ad-source-list">
                          ${list.slice(0, 8).map(item => `
                            <div class="ad-source-row">
                              <span class="lbl" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</span>
