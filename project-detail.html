<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>📊 프로젝트 리포트</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Joungkyun/font-d2coding/d2coding.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
  :root {
    /* 논문 결 — 흑백 + 무채색, index.html과 동일 */
    --bg: #FCFCFA;
    --surface: #FFFFFF;
    --border: #E0DDD3;
    --text: #1A1A1A;
    --text-2: #4A4A4A;
    --text-3: #8A8A86;
    --line: #C8C4BB;
    --primary: #1A1A1A;
    --ok: #1A1A1A;
    --warn: #4A4A4A;
    --danger: #1A1A1A;
    --blue: #1A1A1A;
    --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    --serif: 'Source Serif 4', 'Noto Serif KR', Georgia, 'Times New Roman', serif;
    --mono: 'D2Coding', 'IBM Plex Mono', 'Consolas', 'Menlo', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    letter-spacing: 0;
  }
  .nav {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .nav-left { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-2);
    background: transparent;
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    transition: 0.15s;
    letter-spacing: 0;
  }
  .nav-btn:hover { background: transparent; color: var(--text); border-color: var(--text); }
  .nav-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .nav-btn.primary:hover { background: #000; color: var(--bg); }
  .nav-btn.ghost { color: var(--text-3); }
  .nav-btn-danger { color: var(--text-3); border-color: transparent; }
  .nav-btn-danger:hover { color: var(--text); border-color: var(--text); background: transparent; text-decoration: underline; text-underline-offset: 3px; }
  .container { max-width: 760px; margin: 0 auto; padding: 64px 28px 120px; }
  .report {
    background: transparent;
    border: 0;
    border-top: 1px solid var(--text);
    border-bottom: 1px solid var(--text);
    border-radius: 0;
    padding: 36px 0;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre;
    overflow-x: auto;
    box-shadow: none;
    letter-spacing: 0;
  }
  .report .h1 { font-family: var(--serif); font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -0.015em; line-height: 1.25; }
  .report .sec { font-family: var(--sans); color: var(--text-3); font-weight: 500; margin-top: 8px; letter-spacing: 0.08em; text-transform: uppercase; font-size: 11px; }
  .report .bar { color: var(--border); user-select: none; }
  .report .muted { color: var(--text-3); }
  .report .ok { color: var(--text); font-weight: 600; }
  .report .warn { color: var(--text-2); font-weight: 500; font-style: italic; }
  .report .danger { color: var(--text); font-weight: 600; text-decoration: underline; text-underline-offset: 3px; }
  .report .blue { color: var(--text); font-weight: 600; }
  .report .b { font-weight: 600; }
  .report a { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
  .report a:hover { color: #000; }
  .empty {
    text-align: center;
    color: var(--text-3);
    padding: 80px 20px;
    font-family: var(--serif);
    font-size: 15px;
  }
  .empty .e { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .empty a { color: var(--text); text-decoration: underline; text-underline-offset: 3px; font-weight: 600; }
  /* ─── Modal — 논문 결 ─── */
  .modal-bg { position: fixed; inset: 0; background: rgba(26,26,26,0.4); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
  .modal-bg.is-open { display: flex; }
  .modal {
    background: var(--bg);
    border: 1px solid var(--text);
    border-radius: 2px;
    padding: 36px 36px 28px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    font-family: var(--serif);
  }
  .modal h3 { font-family: var(--serif); font-size: 22px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.015em; line-height: 1.3; }
  .modal .modal-sub { font-family: var(--sans); font-size: 11px; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 24px; }
  .modal label { display: block; font-family: var(--sans); font-size: 11px; color: var(--text-3); margin: 16px 0 6px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  .modal input, .modal select, .modal textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: var(--serif);
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    letter-spacing: 0;
    line-height: 1.5;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus { outline: 1px solid var(--text); border-color: var(--text); }
  .modal textarea { resize: vertical; min-height: 80px; font-family: var(--serif); }
  .modal-actions { display: flex; gap: 8px; margin-top: 28px; justify-content: flex-end; }
  .modal-actions .nav-btn { padding: 9px 16px; font-size: 13px; }
  @media (max-width: 600px) {
    .container { padding: 32px 16px 80px; }
    .report { padding: 24px 0; font-size: 11px; line-height: 1.7; }
    .nav { padding: 14px 16px; }
    .nav-btn { font-size: 12px; padding: 6px 10px; }
    .modal { padding: 24px 20px 18px; }
    .modal h3 { font-size: 19px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a class="nav-btn" href="index.html">← 목록</a>
  </div>
  <div class="nav-left">
    <button class="nav-btn primary" id="editBtn" type="button" onclick="openMetaModal()">📝 편집</button>
    <button class="nav-btn nav-btn-danger" id="delBtn" type="button" onclick="confirmDelete()">삭제</button>
  </div>
</nav>

<div class="container">
  <div id="root" class="empty">
    <div class="e">⏳</div>
    <div>로딩 중...</div>
  </div>
</div>

<!-- META EDIT MODAL -->
<div class="modal-bg" id="metaModal" onclick="if(event.target===this)closeMetaModal()">
  <div class="modal">
    <h3>카드 편집</h3>
    <div class="modal-sub">Card Metadata</div>
    <label>이모지</label>
    <input id="me_emoji" maxlength="4" placeholder="📊">
    <label>이벤트명</label>
    <input id="me_title" placeholder="예: WORK FEST 2026">
    <label>카테고리</label>
    <input id="me_category" placeholder="페스티벌 / 컨퍼런스 / 웨비나 / 해커톤">
    <label>기간 (YYYY.MM.DD ~ YYYY.MM.DD)</label>
    <input id="me_period" placeholder="2026.06.01 ~ 2026.06.30">
    <label>상태</label>
    <select id="me_status">
      <option value="ongoing">진행중</option>
      <option value="soon">예정</option>
      <option value="done">종료</option>
      <option value="cancel">취소</option>
    </select>
    <label>신청 KPI 목표</label>
    <input id="me_kpi_signup" placeholder="예: 1,000명">
    <label>이력서 업데이트 KPI 목표</label>
    <input id="me_kpi_resume" placeholder="예: 500명">
    <div class="modal-actions">
      <button class="nav-btn" type="button" onclick="closeMetaModal()">취소</button>
      <button class="nav-btn primary" type="button" onclick="saveMeta()">저장</button>
    </div>
  </div>
</div>

<script src="projects-data.js"></script>
<script src="sync-client.js?v=20260512a"></script>
<script>
// ════════════════════════════════════════════════════════════
//  Project Detail — Memo Style Report (2026-05-14)
//  메모장 뷰 + 같은 페이지 모달 편집 (논문 결 통일)
// ════════════════════════════════════════════════════════════

const params = new URLSearchParams(location.search);
const projectId = params.get('id');

// ─── 모달 — 카드 메타 편집 ───
function openMetaModal() {
  const p = window.getProject(projectId);
  if (!p) { alert('프로젝트를 찾을 수 없습니다.'); return; }
  document.getElementById('me_emoji').value = p.emoji || '';
  document.getElementById('me_title').value = p.title || p.name || '';
  document.getElementById('me_category').value = p.category || '';
  document.getElementById('me_period').value = p.period || '';
  document.getElementById('me_status').value = p.status || 'ongoing';
  const kpis = (p.extKpis && p.extKpis.length) ? p.extKpis : (p.kpis || []);
  const su = kpis.find(k => /신청|응모|지원|참여|참가|등록|모집/i.test(k?.label || ''));
  const ru = kpis.find(k => /이력서|업데이트|resume|update/i.test(k?.label || ''));
  document.getElementById('me_kpi_signup').value = su?.value || '';
  document.getElementById('me_kpi_resume').value = ru?.value || '';
  document.getElementById('metaModal').classList.add('is-open');
}
function closeMetaModal() { document.getElementById('metaModal').classList.remove('is-open'); }
function saveMeta() {
  const p = window.getProject(projectId);
  if (!p) return;
  const next = { ...p,
    emoji: document.getElementById('me_emoji').value.trim() || p.emoji || '📊',
    title: document.getElementById('me_title').value.trim() || p.title || '',
    category: document.getElementById('me_category').value.trim(),
    period: document.getElementById('me_period').value.trim(),
    status: document.getElementById('me_status').value,
  };
  // KPI 갱신: 신청·이력서 항목 교체
  const oldKpis = (p.extKpis && p.extKpis.length) ? p.extKpis : (p.kpis || []);
  const kept = oldKpis.filter(k => !/(신청|응모|지원|참여|참가|등록|모집|이력서|업데이트|resume|update)/i.test(k?.label || ''));
  const sv = document.getElementById('me_kpi_signup').value.trim();
  const rv = document.getElementById('me_kpi_resume').value.trim();
  if (sv) kept.push({ label: '신청자', value: sv });
  if (rv) kept.push({ label: '이력서 업데이트', value: rv });
  next.kpis = kept;
  if (next.extKpis) next.extKpis = kept;
  window.upsertProject(next);
  closeMetaModal();
  render();
}
// ESC 닫기
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMetaModal(); });

// ─── 카드 삭제 ───
function confirmDelete() {
  const p = window.getProject(projectId);
  const title = p?.title || p?.name || '이 카드';
  if (!confirm(`"${title}" 카드를 삭제할까요?\n\n삭제 후엔 목록의 우하단 휴지통에서만 복구 가능합니다.`)) return;
  window.deleteProject(projectId);
  location.href = 'index.html';
}

// ─── 유틸 ───
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
}[c]));
const fmt = (n) => (n == null || Number.isNaN(n)) ? '—' : Number(n).toLocaleString();
const pad = (s, n, right) => {
  s = String(s ?? '');
  // 한글 등 글자 폭 계산
  const w = visualWidth(s);
  if (w >= n) return s;
  const sp = ' '.repeat(n - w);
  return right ? sp + s : s + sp;
};
function visualWidth(s) {
  let w = 0;
  for (const ch of String(s)) {
    const code = ch.codePointAt(0);
    // 한글(가-힣), 이모지 등은 2칸
    if (code > 0x2E80) w += 2;
    else w += 1;
  }
  return w;
}

function parseTarget(v) {
  if (v == null) return null;
  const m = String(v).match(/[\d,]+/);
  return m ? parseInt(m[0].replace(/,/g,''), 10) : null;
}
function parseDate(s) {
  if (!s) return null;
  const m = String(s).match(/(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/);
  return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
}
function getJSON(key) {
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; }
}

// ─── 메인 ───
function render() {
  const root = document.getElementById('root');
  if (!projectId) {
    root.innerHTML = `<div class="empty"><div class="e">❓</div>프로젝트 ID가 없습니다. <a href="index.html">목록으로</a></div>`;
    return;
  }
  const p = window.getProject(projectId);
  if (!p) {
    root.innerHTML = `<div class="empty"><div class="e">❓</div>프로젝트를 찾을 수 없습니다.<br><a href="index.html">목록으로</a></div>`;
    return;
  }
  document.title = `📊 ${p.title || p.name || '프로젝트'}`;

  const lines = [];
  const W = 56; // 가로 박스 폭

  // ─── 헤더 ───
  const title = p.title || p.name || '(제목 없음)';
  const emoji = p.emoji || '📊';
  const periodMatch = String(p.period || '').match(/(\d{4}[.\-/]\d{1,2}[.\-/]\d{1,2}).*?(\d{4}[.\-/]\d{1,2}[.\-/]\d{1,2})/);
  let periodLine = p.period || '(기간 미정)';
  let dDay = '';
  let dayN = '';
  if (periodMatch) {
    const sd = parseDate(periodMatch[1]);
    const ed = parseDate(periodMatch[2]);
    const td = new Date(); td.setHours(0,0,0,0);
    if (sd && ed) {
      const totalDays = Math.round((ed - sd) / 86400000) + 1;
      const dN = Math.round((td - sd) / 86400000) + 1;
      const dE = Math.round((ed - td) / 86400000);
      if (td < sd) dDay = `D${dE > 0 ? '-' : '+'}${Math.abs(dE)}`;
      else if (td > ed) dDay = `종료 (${Math.abs(dE)}일 전)`;
      else { dDay = `D-${dE}`; dayN = `모집 ${dN}일차 / 총 ${totalDays}일`; }
    }
  }
  const statusBadge = (p.status === 'done') ? '✅ 종료' : '🟢 진행 중';

  lines.push(`<span class="bar">${'═'.repeat(W)}</span>`);
  lines.push(`<span class="h1">${emoji}  ${esc(title)}</span>`);
  lines.push(`<span class="muted">기간:</span> ${esc(periodLine)}`);
  if (dDay) lines.push(`<span class="muted">D-day:</span> <span class="b">${dDay}</span>${dayN ? `  <span class="muted">· ${dayN}</span>` : ''}`);
  lines.push(`<span class="muted">상태:</span> ${statusBadge}`);
  if (p.tags && p.tags.length) {
    lines.push(`<span class="muted">태그:</span> ${p.tags.map(t => `#${esc(t)}`).join(' ')}`);
  }
  lines.push(`<span class="bar">${'═'.repeat(W)}</span>`);
  lines.push('');

  // ─── 핵심 KPI ───
  const rawKpis = (p.extKpis && p.extKpis.length) ? p.extKpis : (p.kpis || []);
  const kpis = Array.isArray(rawKpis) ? rawKpis.filter(k => {
    if (!k) return false;
    const l = (k.label || '').trim(), v = (k.value || '').trim();
    return l && v && l !== '—' && v !== '—';
  }) : [];

  // 시트 자동 매칭
  const allUrls = [...(p.resources || []), p.links?.sheet, p.links?.notion].filter(Boolean);
  const sheetUrl = allUrls.find(u => /spreadsheets\/d\//.test(u || ''));
  let liveTotal = null, liveUnique = null, sheetFetchedAt = null;
  if (sheetUrl) {
    const sid = (sheetUrl.match(/spreadsheets\/d\/([\w-]+)/) || [])[1];
    if (sid) {
      const c = (window.SHEET_CACHES && window.SHEET_CACHES[sid]) || getJSON('b2c_sheet_data_' + sid);
      if (c?.fetchedAt) sheetFetchedAt = c.fetchedAt;
      if (c?.rows && c.rows.length > 1) {
        liveTotal = c.rows.length - 1;
        const headers = c.rows[0] || [];
        let idIdx = -1;
        headers.forEach((h, i) => {
          if (idIdx < 0 && /(잡코|jobkorea|회원id|memberid)/i.test(String(h).replace(/\s/g,''))) idIdx = i;
        });
        if (idIdx >= 0) {
          const ids = c.rows.slice(1).map(r => (r[idIdx] || '').trim().toLowerCase()).filter(Boolean);
          liveUnique = new Set(ids).size;
        }
      }
    }
  }
  // 이력서 매칭
  const resumeStats = getJSON('b2c_resume_stats_' + projectId);
  const liveResume = resumeStats?.resumeUpdated ?? null;

  function matchCurrent(label) {
    const l = (label || '').toLowerCase();
    if (/이력서|업데이트|resume|update/.test(l)) return liveResume;
    if (/유니크|unique|중복.*제외|dedup/.test(l)) return liveUnique ?? liveTotal;
    if (/신청|응모|register|지원|참여|참가/.test(l)) return liveTotal;
    return null;
  }

  lines.push(`<span class="sec">[ 핵심 KPI ]</span>`);
  lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
  if (kpis.length) {
    lines.push(`  ${pad('지표', 16)}${pad('목표', 12, true)}${pad('실적', 12, true)}${pad('달성률', 10, true)}`);
    kpis.forEach(k => {
      const target = parseTarget(k.value);
      const current = matchCurrent(k.label);
      let pctStr = '—', lightCls = 'muted', light = '·';
      if (target != null && current != null) {
        const pct = current / target * 100;
        pctStr = pct.toFixed(1) + '%';
        if (pct >= 100) { lightCls = 'blue'; light = '✅'; }
        else if (pct >= 70) { lightCls = 'ok'; light = '🟢'; }
        else if (pct >= 40) { lightCls = 'warn'; light = '🟡'; }
        else { lightCls = 'danger'; light = '🔴'; }
      }
      const curStr = current != null ? fmt(current) : '—';
      lines.push(`  ${pad(esc(k.label), 16)}${pad(esc(k.value), 12, true)}${pad(curStr, 12, true)}<span class="${lightCls}">${pad(pctStr, 8, true)} ${light}</span>`);
    });
  } else {
    lines.push(`  <span class="muted">(KPI 미설정)</span>`);
  }
  lines.push('');

  // ─── 이력서 매칭 ───
  if (resumeStats) {
    lines.push(`<span class="sec">[ 이력서 매칭 ]</span>`);
    lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
    const r = resumeStats;
    lines.push(`  ${pad('시트 ID 입력', 18)}${pad(fmt(r.totalIds), 10, true)}`);
    lines.push(`  ${pad('DB 매칭', 18)}${pad(fmt(r.matched), 10, true)}   ${pad('(' + (r.matchRate ?? '—') + '%)', 10)}`);
    lines.push(`  ${pad('이력서 업데이트', 18)}${pad(fmt(r.resumeUpdated), 10, true)}   ${pad('(' + (r.updateRate ?? '—') + '%)', 10)}`);
    if (r.byType) {
      lines.push(`  <span class="muted">└ 소셜 ${r.byType.social || 0} · 평문 ${r.byType.plain || 0} · 이메일 ${r.byType.email || 0}</span>`);
    }
    if (r.lastUpdated) lines.push(`  <span class="muted">└ 매칭 일시: ${r.lastUpdated}</span>`);
    lines.push('');
  }

  // ─── 신청자 자동 분석 (시트) ───
  const sheetAnalysis = getJSON('b2c_sheet_analysis_' + projectId);
  if (liveTotal != null || sheetAnalysis) {
    lines.push(`<span class="sec">[ 신청자 자동 분석 ]</span>`);
    lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
    if (liveTotal != null) {
      lines.push(`  ${pad('총 응답 (raw)', 18)}${pad(fmt(liveTotal), 10, true)}`);
      if (liveUnique != null) lines.push(`  ${pad('유니크 ID', 18)}${pad(fmt(liveUnique), 10, true)}`);
    }
    if (sheetFetchedAt) {
      const d = new Date(sheetFetchedAt);
      lines.push(`  <span class="muted">└ 마지막 fetch: ${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</span>`);
    }
    if (sheetAnalysis?.daily && Array.isArray(sheetAnalysis.daily)) {
      lines.push('');
      lines.push(`  <span class="muted">일별 추이</span>`);
      const max = Math.max(...sheetAnalysis.daily.map(d => d.count || 0), 1);
      sheetAnalysis.daily.forEach(d => {
        const barLen = Math.round((d.count / max) * 20);
        const bar = '█'.repeat(barLen);
        const spike = d.count >= 500 ? ' 🔥' : '';
        lines.push(`  ${pad(d.date, 8)}<span class="blue">${pad(bar, 22)}</span>${pad(fmt(d.count), 6, true)}${spike}`);
      });
    }
    lines.push('');
  }

  // ─── 광고 효율 ───
  const adReport = getJSON('b2c_ad_report_' + projectId);
  if (adReport) {
    lines.push(`<span class="sec">[ 광고 효율 ]</span>`);
    lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
    if (adReport.spend != null) lines.push(`  ${pad('집행', 16)}${pad(fmt(adReport.spend) + '원', 16, true)}`);
    if (adReport.impressions != null) lines.push(`  ${pad('노출', 16)}${pad(fmt(adReport.impressions), 16, true)}`);
    if (adReport.clicks != null) lines.push(`  ${pad('클릭', 16)}${pad(fmt(adReport.clicks), 16, true)}`);
    if (adReport.ctr != null) lines.push(`  ${pad('CTR', 16)}${pad(adReport.ctr + '%', 16, true)}`);
    if (adReport.cpc != null) lines.push(`  ${pad('CPC', 16)}${pad(fmt(adReport.cpc) + '원', 16, true)}`);
    if (adReport.cpa != null) lines.push(`  ${pad('CPA (신청 단가)', 16)}${pad(fmt(adReport.cpa) + '원', 16, true)}`);
    lines.push('');
  }

  // ─── 예산 ───
  const budget = getJSON('b2c_budget_' + projectId);
  if (budget) {
    lines.push(`<span class="sec">[ 예산 / 품의 ]</span>`);
    lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
    if (budget.items && Array.isArray(budget.items)) {
      budget.items.forEach(it => {
        lines.push(`  ${pad(esc(it.label || it.name || '항목'), 22)}${pad(fmt(it.amount) + '원', 14, true)}`);
      });
      const total = budget.items.reduce((s, it) => s + (Number(it.amount) || 0), 0);
      lines.push(`  <span class="bar">${'─'.repeat(36)}</span>`);
      lines.push(`  ${pad('합계', 22)}<span class="b">${pad(fmt(total) + '원', 14, true)}</span>`);
    }
    lines.push('');
  }

  // ─── 웨비나 메트릭 ───
  const webinar = getJSON('b2c_webinar_metrics_' + projectId);
  if (webinar) {
    lines.push(`<span class="sec">[ 웨비나 메트릭 ]</span>`);
    lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
    if (webinar.zoomUnique != null) lines.push(`  ${pad('줌 유니크 참석자', 18)}${pad(fmt(webinar.zoomUnique), 10, true)}`);
    if (webinar.zoomPeak != null)   lines.push(`  ${pad('최대 동시 접속', 18)}${pad(fmt(webinar.zoomPeak), 10, true)}`);
    if (webinar.satisfaction != null) lines.push(`  ${pad('만족도', 18)}${pad(webinar.satisfaction + '점', 10, true)}`);
    lines.push('');
  }

  // ─── 외부 자료 링크 (라벨 칩만, URL 노출 X) ───
  const links = [];
  if (p.links) {
    if (p.links.notion) links.push({ label: '노션', url: p.links.notion });
    if (p.links.sheet) links.push({ label: '시트', url: p.links.sheet });
    if (p.links.figma) links.push({ label: '피그마', url: p.links.figma });
  }
  (p.resources || []).forEach((url, i) => {
    if (url) links.push({ label: `자료 ${i+1}`, url });
  });
  if (links.length) {
    lines.push(`<span class="sec">[ 외부 자료 ]</span>`);
    lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
    const chips = links.map(l => `<a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)} ↗</a>`).join('  ·  ');
    lines.push(`  ${chips}`);
    lines.push('');
  }

  // ─── 메모 ───
  const note = p.note || p.description || '';
  if (note.trim()) {
    lines.push(`<span class="sec">[ 메모 ]</span>`);
    lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
    note.split('\n').forEach(l => lines.push(`  ${esc(l)}`));
    lines.push('');
  }

  // ─── 푸터 ───
  lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
  lines.push(`<span class="muted">  ${new Date().toISOString().slice(0,16).replace('T', ' ')}</span>`);

  // 렌더
  root.outerHTML = `<div class="report" id="root">${lines.join('\n')}</div>`;
}

// 데모 PROJECTS 데이터 로드 후 렌더
function tryRender() {
  // PROJECTS는 외부 스크립트로 채워질 수 있어 약간 지연
  if (typeof window.getProject === 'function') {
    render();
  } else {
    setTimeout(tryRender, 50);
  }
}
tryRender();
</script>
</body>
</html>
