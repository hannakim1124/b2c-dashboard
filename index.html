<style>
  :root {
    --bg: #f5f6f7;
    --surface: #ffffff;
    --border: #e5e8eb;
    --text: #191f28;
    --text-2: #4e5968;
    --text-3: #8b95a1;
    --line: #d0d7e0;
    --primary: #3182f6;
    --primary-dim: #e8f3ff;
    --ok: #00b956;
    --warn: #f59e0b;
    --danger: #f04452;
    --blue: #3182f6;
    --mono: 'D2Coding', 'Cascadia Code', 'Consolas', 'Menlo', 'Pretendard Mono', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .brand { font-weight: 700; font-size: 14px; color: var(--text); }
  .brand .muted { color: var(--text-3); font-weight: 400; }
  .nav-actions { display: flex; gap: 8px; }
  .nav-btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-2);
    background: transparent;
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.15s;
  }
  .nav-btn:hover { background: var(--bg); color: var(--text); }
  .nav-btn.primary { background: var(--text); color: #fff; border-color: var(--text); }

  .head-meta .warn { color: var(--warn); font-weight: 700; }
  .head-meta .danger { color: var(--danger); font-weight: 700; }
  .head-right { display: flex; gap: 6px; align-items: center; }
  .icon-btn {
    background: transparent;
    border: none;
    color: var(--text-3);
    font-size: 14px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    font-family: var(--mono);
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .toggle { font-size: 11px; color: var(--text-3); }
  .card-body {
    display: none;
    padding: 20px 24px 24px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    white-space: pre;
    overflow-x: auto;

  .card-body .h1 { font-size: 14px; font-weight: 700; }
  .card-body .sec { color: var(--text-2); font-weight: 700; }
  .card-body .bar { color: var(--line); user-select: none; }
  .card-body .muted { color: var(--text-3); }
  .card-body .ok { color: var(--ok); font-weight: 700; }
  .card-body .warn { color: var(--warn); font-weight: 700; }
  .card-body .danger { color: var(--danger); font-weight: 700; }
  .card-body .blue { color: var(--blue); font-weight: 700; }
  .card-body .b { font-weight: 700; }
  .card-body a { color: var(--primary); text-decoration: underline; }
  .card-body a:hover { color: #1b64da; }
  .empty {
    text-align: center;
    color: var(--text-3);
    padding: 60px 20px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .empty .e { font-size: 32px; margin-bottom: 12px; }
  /* 모달 */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 20px 20px;
    overflow-y: auto;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    max-width: 560px;
    width: 100%;
    padding: 28px;
  }
  .modal h3 { margin: 0 0 18px; font-size: 16px; font-family: var(--mono); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 700; color: var(--text-2); margin-bottom: 6px; font-family: var(--mono); }
  .field input, .field textarea, .field select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    font-family: var(--mono); font-size: 13px;
    background: var(--surface); color: var(--text);

  .field input:focus, .field textarea:focus { outline: none; border-color: var(--primary); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi-row { display: grid; grid-template-columns: 1fr 1fr 30px; gap: 6px; margin-bottom: 6px; align-items: center; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; }
  .modal-actions .nav-btn { padding: 9px 18px; font-size: 13px; }
  @media (max-width: 600px) {
    .container { padding: 16px 10px 60px; }

    .brand { font-size: 12px; }
    .nav-btn { font-size: 11px; padding: 6px 10px; }
    .modal { padding: 20px 16px; }

<script>
// ════════════════════════════════════════════════════════════
//  B2C Dashboard v3 — Single-page Memo-style
//  2026-05-12
// ════════════════════════════════════════════════════════════

// ─── 카드 저장소 (단일 사용자) ───
const KEY_CARDS = 'b2c_v3_cards';
function loadMyCards() {
  try { return JSON.parse(localStorage.getItem(KEY_CARDS) || '[]'); }
  catch(e) { return []; }
}
function saveMyCards(list) {
  localStorage.setItem(KEY_CARDS, JSON.stringify(list));
}

// ─── 유틸 ───
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
}[c]));
const fmt = (n) => (n == null || Number.isNaN(n)) ? '—' : Number(n).toLocaleString();
function visualWidth(s) {
  let w = 0;
  for (const ch of String(s)) {
    const code = ch.codePointAt(0);
    if (code > 0x2E80) w += 2;
    else w += 1;
  }
  return w;
}
function pad(s, n, right) {
  s = String(s ?? '');
  const w = visualWidth(s);
  if (w >= n) return s;
  const sp = ' '.repeat(n - w);
  return right ? sp + s : s + sp;
}
function parseTarget(v) {
  if (v == null) return null;
  const m = String(v).match(/[\d,]+/);
  return m ? parseInt(m[0].replace(/,/g,''), 10) : null;
}
function parseDate(s) {
  if (!s) return null;
  const m = String(s).match(/(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/);
  return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
}
function getJSON(key) {
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; }
}

// ─── 시트 자동 분석 ───
function analyzeSheet(rows) {
  if (!rows || rows.length < 2) return { total: 0, unique: null, daily: [], columns: {} };
  const headers = rows[0] || [];
  const data = rows.slice(1);
  const out = { total: data.length, unique: null, daily: [], columns: {} };

  // ID 컬럼 자동 인식 → unique 카운트
  let idIdx = -1;
  headers.forEach((h, i) => {
    if (idIdx < 0 && /(잡코|jobkorea|회원id|memberid)/i.test(String(h).replace(/\s/g, ''))) idIdx = i;
  });
  if (idIdx >= 0) {
    const ids = data.map(r => (r[idIdx] || '').trim().toLowerCase()).filter(Boolean);
    out.unique = new Set(ids).size;
  }

  // 타임스탬프 컬럼 → 일별 분포
  let tsIdx = -1;
  headers.forEach((h, i) => {
    if (tsIdx < 0 && /(타임|timestamp|날짜|date)/i.test(String(h).replace(/\s/g, ''))) tsIdx = i;
  });
  if (tsIdx < 0 && headers.length > 0) tsIdx = 0; // 폴백: 첫 컬럼
  if (tsIdx >= 0) {
    const byDay = {};
    data.forEach(r => {
      const ts = (r[tsIdx] || '').trim();
      let mo, da;
      let m = ts.match(/(\d{4})[.\-/]\s*(\d{1,2})[.\-/]\s*(\d{1,2})/);
      if (m) { mo = +m[2]; da = +m[3]; }
      else {
        m = ts.match(/(\d{1,2})\/(\d{1,2})/);
        if (m) { mo = +m[1]; da = +m[2]; }
      }
      if (mo && da) {
        const k = `${mo}/${da}`;
        byDay[k] = (byDay[k] || 0) + 1;
      }
    });
    const keys = Object.keys(byDay);
    if (keys.length > 1) {
      out.daily = keys.sort((a, b) => {
        const [am, ad] = a.split('/').map(Number);
        const [bm, bd] = b.split('/').map(Number);
        return am * 100 + ad - (bm * 100 + bd);
      }).map(k => ({ date: k, count: byDay[k] }));
    }
  }

  // 카테고리 컬럼 자동 분석 (값 종류 2~30개, 헤더 한글 우선)
  headers.forEach((h, idx) => {
    if (idx === tsIdx || idx === idIdx) return;
    const headerStr = String(h || '').trim();
    if (!headerStr || headerStr.length > 60) return;
    // 성함·핸드폰·이메일 등 PII는 스킵
    if (/(성함|이름|핸드폰|전화|이메일|email|phone)/i.test(headerStr.replace(/\s/g, ''))) return;
    const vals = data.map(r => (r[idx] || '').trim()).filter(Boolean);
    if (vals.length < 2) return;
    const counts = {};
    vals.forEach(v => { counts[v] = (counts[v] || 0) + 1; });
    const types = Object.keys(counts).length;
    if (types >= 2 && types <= 30) {
      // 헤더 라벨 정제 (긴 설명 자르기)
      const shortHead = headerStr.split(/\n|\(|\*/)[0].trim().slice(0, 40);
      out.columns[shortHead] = counts;
    }
  });

  return out;
}

// ─── 분석 진행 토스트 ───
function showToast(msg, persist) {
  let t = document.getElementById('__toast__');
  if (!t) {
    t = document.createElement('div');
    t.id = '__toast__';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#191f28;color:#fff;padding:12px 22px;border-radius:8px;font-family:var(--mono,monospace);font-size:13px;font-weight:700;z-index:2000;box-shadow:0 10px 30px rgba(0,0,0,0.2);transition:opacity 0.25s;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  if (!persist) {
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2400);
  }
}
function hideToast() {
  const t = document.getElementById('__toast__');
  if (t) t.style.opacity = '0';
}

// ─── 시트 자동 fetch ───
async function fetchSheetAuto(url, opts) {
  if (!url) return null;
  const m = url.match(/spreadsheets\/d\/([\w-]+)/);
  if (!m) return null;
  const sheetId = m[1];
  const gidMatch = url.match(/[?&#]gid=(\d+)/);
  const gid = gidMatch ? gidMatch[1] : '0';
  try {
    const r = await fetch('/api/fetch-sheet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sheetUrl: url, sheetId, gid })
    });
    const data = await r.json();
    if (!r.ok) {
      if (opts?.verbose) alert('서버 응답 오류: ' + r.status);
      return null;
    }
    if (data && data.ok === false) {
      if (opts?.verbose) alert(data.error || '시트 fetch 실패');
      return null;
    }
    if (!data || !data.rows) {
      if (opts?.verbose) alert('빈 응답: 시트가 비었거나 형식 이상');
      return null;
    }
    const cache = { rows: data.rows, fetchedAt: new Date().toISOString() };
    localStorage.setItem('b2c_sheet_data_' + sheetId, JSON.stringify(cache));
    window.SHEET_CACHES = window.SHEET_CACHES || {};
    window.SHEET_CACHES[sheetId] = cache;
    return cache;
  } catch(e) {
    console.error('fetch sheet failed', e);
    if (opts?.verbose) alert('시트 fetch 실패: ' + e.message);
    return null;
  }
}

window.requestMatch = async function(id) {
  const p = getAllCards().find(c => c.id === id);
  if (!p) return;
  const urls = [...(p.resources || []), p.links?.sheet].filter(Boolean);
  const sheetUrl = urls.find(u => /spreadsheets\/d\//.test(u || ''));
  if (!sheetUrl) { alert('시트 URL이 없습니다. 편집에서 추가해주세요.'); return; }
  if (!confirm('이력서 매칭을 요청하시겠어요?\n결과는 운영자가 처리 후 1일 내 자동 반영됩니다.')) return;
  showToast('🔄 매칭 신청 중...', true);
  try {
    const r = await fetch('/api/match-queue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        projectId: p.id,
        sheetUrl,
        period: p.period || '',
        kpiLabel: '이력서 업데이트',
        title: p.title || p.name || p.id,
        requestedBy: 'dashboard-user'
      })
    });
    const data = await r.json();
    hideToast();
    if (r.ok && data.ok) {
      showToast(`✅ 매칭 신청 접수됨 — 1일 내 결과 자동 반영 (대기: ${data.pendingCount || 1}건)`);
      // 슬랙으로 한나님께 알림 발송 (fire-and-forget)
      fetch('/api/notify-slack', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text: `🔔 *새 매칭 요청* <@U09UQNGH6DC>\n\n• 프로젝트: *${p.title || p.name || p.id}*\n• 시트: ${sheetUrl}\n• 기간: ${p.period || '(미정)'}\n• 큐 대기: ${data.pendingCount || 1}건\n\n👉 한나 님이 사내망에서 claude에게 *"큐 비워줘"* 한 마디 → 자동 처리됩니다.`
        })
      }).catch(() => { /* 알림 실패해도 큐 등록은 성공이라 무시 */ });
    } else {
      showToast('⚠️ 신청 실패: ' + (data.error || r.status));
    }
  } catch(e) {
    hideToast();
    showToast('⚠️ 신청 실패: ' + e.message);
  }
};

window.refreshCard = async function(id) {
  const p = getAllCards().find(c => c.id === id);
  if (!p) return;
  const urls = [...(p.resources || []), p.links?.sheet].filter(Boolean);
  const sheetUrl = urls.find(u => /spreadsheets\/d\//.test(u || ''));
  if (!sheetUrl) { alert('이 카드에 시트 URL이 없습니다. 편집에서 추가해주세요.'); return; }
  showToast('🔄 시트 분석 중...', true);
  const c = await fetchSheetAuto(sheetUrl, { verbose: true });
  hideToast();
  if (c) showToast('✅ 분석 완료 — ' + (c.rows?.length - 1 || 0) + '건');
  else showToast('⚠️ 분석 실패');
  render();
  const el = document.querySelector(`.card[data-id="${id}"]`);
  if (el) el.classList.add('open');
};

// ─── 카드 데이터 수집 (사용자별 격리) ───
function getAllCards() {
  return loadMyCards();
}

// 첫 진입 시 옛 데이터 마이그레이션 (사용자별 키가 비어있을 때만)
function migrateLegacyIfNeeded() {
  if (localStorage.getItem(KEY_CARDS) !== null) return; // 이미 한 번 처리됨 (빈 배열도 처리된 것으로 간주)
  const legacy = [];
  const seen = new Set();
  try {
    const users = JSON.parse(localStorage.getItem('b2c_user_projects') || '[]');
    users.forEach(p => { if (p && p.id && !seen.has(p.id)) { legacy.push(p); seen.add(p.id); } });
  } catch(e) {}
  if (window.PROJECTS) {
    const overrides = (window.getOverrides && window.getOverrides()) || {};
    const deleted = (window.getDeletedIds && window.getDeletedIds()) || [];
    Object.keys(window.PROJECTS).forEach(id => {
      if (deleted.includes(id) || seen.has(id)) return;
      legacy.push(overrides[id] || window.PROJECTS[id]);
      seen.add(id);
    });
  }
  saveMyCards(legacy);
  if (legacy.length) {
    setTimeout(() => showToast(`✅ 기존 카드 ${legacy.length}개 마이그레이션 완료`), 500);
  }
}

// ─── 상태 자동 보정 (기간 지나면 done) ───
function getEffectiveStatus(p) {
  const m = String(p.period || '').match(/(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})\s*[~—–-]\s*(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/);
  if (m) {
    const end = new Date(+m[4], +m[5]-1, +m[6]);
    const today = new Date(); today.setHours(0,0,0,0);
    if (end < today) return 'done';
    if (new Date(+m[1], +m[2]-1, +m[3]) > today) return 'soon';
    return 'ongoing';
  }
  return p.status || 'ongoing';
}

// ─── 카드 한 줄 요약 ───
function cardSummary(p) {
  const st = getEffectiveStatus(p);
  const stBadge = st === 'done' ? '<span class="muted">✅ 종료</span>' : st === 'soon' ? '<span class="warn">📅 예정</span>' : '<span class="ok">🟢 진행 중</span>';

  // D-day
  let dDay = '';
  const m = String(p.period || '').match(/(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})\s*[~—–-]\s*(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/);
  if (m) {
    const today = new Date(); today.setHours(0,0,0,0);
    const end = new Date(+m[4], +m[5]-1, +m[6]);
    const dE = Math.round((end - today) / 86400000);
    if (st === 'ongoing' && dE >= 0) dDay = `D-${dE}`;
    else if (st === 'soon') dDay = `D-${Math.round((new Date(+m[1], +m[2]-1, +m[3]) - today) / 86400000)}`;
  }

  // KPI 첫 1~2개 요약
  const kpis = (p.extKpis && p.extKpis.length ? p.extKpis : p.kpis || []).filter(k => k && k.label && k.value);
  const kpiSummary = kpis.slice(0, 2).map(k => `${esc(k.label)} ${esc(k.value)}`).join(' · ');

  const parts = [stBadge];
  if (dDay) parts.push(`<span class="b">${dDay}</span>`);
  if (kpiSummary) parts.push(kpiSummary);
  return parts.join(' · ');
}

// ─── 자동 CTO 코멘트 휴리스틱 ───
function generateInsights(p, ana, r, kpis, dDay) {
  const out = [];

  // ① KPI 달성률 인사이트
  if (kpis.length && ana) {
    const exceeded = [];
    const underperf = [];
    kpis.forEach(k => {
      const target = parseTarget(k.value);
      const l = (k.label || '').toLowerCase();
      let current = null;
      if (/이력서|업데이트/.test(l)) current = r?.resumeUpdated;
      else if (/신청|응모|지원|참여|참가/.test(l)) current = ana?.unique ?? ana?.total;
      if (target != null && current != null) {
        const pct = current / target * 100;
        if (pct >= 100) exceeded.push({ label: k.label, pct });
        else if (pct < 70) underperf.push({ label: k.label, pct });
      }
    });
    if (exceeded.length && /D-\d+/.test(dDay || '')) {
      out.push(`KPI ${exceeded.length}개 모두 ${dDay} 시점에 이미 초과 달성. 광고/홍보 예산 일부는 다른 캠페인(신규 회원 유입 등)으로 재배분 검토 가능합니다.`);
    } else if (exceeded.length) {
      out.push(`KPI ${exceeded.length}개 초과 달성 (${exceeded.map(e => e.label + ' ' + e.pct.toFixed(0) + '%').join(', ')}).`);
    }
    if (underperf.length) {
      out.push(`주의: ${underperf.map(u => u.label + ' ' + u.pct.toFixed(0) + '%').join(', ')} — 남은 기간 가속 필요.`);
    }
  }

  // ② 이력서 전환율 인사이트 (데브콘 벤치마크 ~52%)
  if (r?.resumeUpdated && r?.matched) {
    const updateRate = r.resumeUpdated / r.matched * 100;
    if (updateRate >= 70) {
      out.push(`이력서 업데이트 전환율 ${updateRate.toFixed(1)}%는 데브콘(약 52%) 대비 매우 높은 수준. 이벤트 컨셉이 실제 행동으로 잘 연결되고 있습니다.`);
    } else if (updateRate >= 50) {
      out.push(`이력서 업데이트 전환율 ${updateRate.toFixed(1)}% — 데브콘(약 52%)과 비슷한 수준.`);
    } else if (updateRate >= 30) {
      out.push(`이력서 업데이트 전환율 ${updateRate.toFixed(1)}% — 컨셉과 행동 연결 점검 필요.`);
    }
  }

  // ③ 중복 제출 인사이트
  if (ana?.total && ana?.unique) {
    const dups = ana.total - ana.unique;
    if (dups >= 30) {
      out.push(`중복 제출 ${dups}건 (${(dups / ana.total * 100).toFixed(1)}%) — 폼에 중복 방지 로직 없음. 유니크 기준은 깨끗하게 정리되어 보고는 안전.`);
    } else if (dups >= 5) {
      out.push(`중복 제출 ${dups}건 — 큰 영향 없음. 유니크 기준 보고 권장.`);
    }
  }

  // ④ 미매칭 인사이트
  if (r?.byClassification?.none > 0 && ana?.unique > 0) {
    const noneCount = r.byClassification.none;
    const nonePct = noneCount / ana.unique * 100;
    if (nonePct >= 15) {
      const potential = (noneCount * 0.3).toFixed(0);
      out.push(`미매칭 ${noneCount}명 (${nonePct.toFixed(1)}%) — 잡코리아 ID 오탈자 가능. 수동 정정 시 매칭 +약 ${potential}명 추가 가능.`);
    } else if (nonePct >= 5) {
      out.push(`미매칭 ${noneCount}명 (${nonePct.toFixed(1)}%) — 정상 범위 내.`);
    }
  }

  // ⑤ 일별 추이 스파이크 인사이트
  if (ana?.daily && ana.daily.length >= 3) {
    const spikes = ana.daily.filter(d => d.count >= 500);
    if (spikes.length) {
      out.push(`일별 스파이크: ${spikes.map(s => s.date + '(' + s.count + ')').join(', ')} — 광고 ON / CRM 발송 / 공지 노출 시점 확인 권장.`);
    }
  }

  // ⑥ 신규 가입 인사이트
  if (r?.byClassification && r.matched > 0) {
    const newPct = (r.byClassification.new || 0) / r.matched * 100;
    if (newPct < 3) {
      out.push(`신규 가입자 비중 ${newPct.toFixed(1)}% — 휴면/기존 회원 활성화 중심. 신규 회원 유입은 별도 캠페인 분리가 효율적.`);
    } else if (newPct >= 20) {
      out.push(`신규 가입자 비중 ${newPct.toFixed(1)}% — 신규 유입 효과 우수.`);
    }
  }

  return out;
}

// ─── 카드 본문 (메모장 리포트 양식 — 한나님 보고서 결) ───
function cardBody(p) {
  const lines = [];
  const W = 64;
  const SEP = '═'.repeat(W);
  const SUB = '━'.repeat(W);
  const MIN = '─'.repeat(40);

  // 기간 & D-day
  const periodMatch = String(p.period || '').match(/(\d{4}[.\-/]\d{1,2}[.\-/]\d{1,2}).*?(\d{4}[.\-/]\d{1,2}[.\-/]\d{1,2})/);
  let dDay = '', dayN = '', totalDays = 0, startStr = '', endStr = '';
  if (periodMatch) {
    startStr = periodMatch[1]; endStr = periodMatch[2];
    const sd = parseDate(startStr);
    const ed = parseDate(endStr);
    const td = new Date(); td.setHours(0,0,0,0);
    if (sd && ed) {
      totalDays = Math.round((ed - sd) / 86400000) + 1;
      const dN = Math.round((td - sd) / 86400000) + 1;
      const dE = Math.round((ed - td) / 86400000);
      if (td < sd) dDay = `D-${Math.abs(dE)} (예정)`;
      else if (td > ed) dDay = `종료 (${Math.abs(dE)}일 전)`;
      else { dDay = `D-${dE} 남음`; dayN = `모집 ${dN}일차 / 총 ${totalDays}일`; }
    }
  }
  const st = getEffectiveStatus(p);

  // 데이터 수집
  const allUrls = [...(p.resources || []), p.links?.sheet, p.links?.notion].filter(Boolean);
  const sheetUrl = allUrls.find(u => /spreadsheets\/d\//.test(u || ''));
  const sheetId = sheetUrl ? (sheetUrl.match(/spreadsheets\/d\/([\w-]+)/) || [])[1] : null;
  const cache = sheetId ? ((window.SHEET_CACHES && window.SHEET_CACHES[sheetId]) || getJSON('b2c_sheet_data_' + sheetId)) : null;
  const ana = cache?.rows ? analyzeSheet(cache.rows) : null;

  const resumeStats = getJSON('b2c_resume_stats_' + p.id);
  const r = resumeStats;

  // ─── 헤더 ───
  lines.push(`<span class="bar">${SEP}</span>`);
  lines.push(`<span class="h1">  ${p.emoji || '📊'}  ${esc(p.title || p.name || '(제목 없음)')} · 신청자 분석</span>`);
  lines.push(`<span class="muted">  기간: ${esc(p.period || '(미정)')}${dDay ? `  ·  ${dDay}` : ''}</span>`);
  const nowStr = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', dateStyle: 'short', timeStyle: 'short' });
  lines.push(`<span class="muted">  데이터 기준: ${nowStr}</span>`);
  if (sheetId) lines.push(`<span class="muted">  시트: ${esc(sheetId)}</span>`);
  lines.push(`<span class="bar">${SEP}</span>`);
  lines.push('');

  // ─── ▣ 응답 요약 ───
  lines.push(`<span class="sec">▣ 응답 요약</span>`);
  if (ana) {
    lines.push(`   전체 응답:        <span class="b">${fmt(ana.total)}</span>건`);
    if (ana.unique != null) {
      lines.push(`   유니크 신청자:    <span class="b">${fmt(ana.unique)}</span>명`);
      const dups = ana.total - ana.unique;
      if (dups > 0) lines.push(`   중복 제출 제거:   ${fmt(dups)}건`);
    }
    if (r) {
      lines.push(`   잡코리아 회원 매칭: <span class="b">${fmt(r.matched)}</span>명 <span class="muted">(${r.matchRate ?? '—'}%)</span>`);
      if (r.byType) {
        lines.push(`     · 소셜 로그인 ID: ${fmt(r.byType.social || 0)}개 입력`);
        lines.push(`     · 평문/이메일 ID: ${fmt((r.byType.plain || 0) + (r.byType.email || 0))}개 입력`);
      }
      if (r.byClassification?.none != null) {
        lines.push(`   미매칭 (탈퇴/오탈자 등): ${fmt(r.byClassification.none)}명`);
      }
    } else {
      lines.push(`   <span class="muted">잡코리아 회원 매칭: 데이터를 입력해 주세요 · 카드 헤더 [📊 매칭 요청]</span>`);
    }
  } else {
    lines.push(`   <span class="muted">데이터를 입력해 주세요 · 편집에서 시트 URL을 추가하면 자동 분석됩니다</span>`);
  }
  lines.push('');

  // ─── ▣ KPI 진척도 ───
  const rawKpis = (p.extKpis && p.extKpis.length ? p.extKpis : p.kpis || []).filter(k => k && k.label && k.value && k.label !== '—' && k.value !== '—');
  function matchCurrent(label) {
    const l = (label || '').toLowerCase();
    if (/이력서|업데이트|resume|update/.test(l)) return r?.resumeUpdated ?? null;
    if (/유니크|unique|중복.*제외|dedup/.test(l)) return ana?.unique ?? ana?.total ?? null;
    if (/신청|응모|register|지원|참여|참가/.test(l)) return ana?.unique ?? ana?.total ?? null;
    return null;
  }
  lines.push(`<span class="sec">▣ KPI 진척도 (현재 vs 목표)</span>`);
  if (rawKpis.length) {
    rawKpis.forEach(k => {
      const target = parseTarget(k.value);
      const current = matchCurrent(k.label);
      if (target != null && current != null) {
        const pct = current / target * 100;
        let cls = 'muted', light = '·', tag = '';
        if (pct >= 100) { cls = 'blue'; light = '✅'; tag = '초과'; }
        else if (pct >= 70) { cls = 'ok'; light = '🟢'; tag = '안정'; }
        else if (pct >= 40) { cls = 'warn'; light = '🟡'; tag = '주의'; }
        else { cls = 'danger'; light = '🔴'; tag = '위험'; }
        lines.push(`   ${pad(esc(k.label), 18)}: <span class="b">${fmt(current)}</span> / ${esc(k.value)} → <span class="${cls}">${pct.toFixed(1)}% ${light} ${tag}</span>`);
      } else {
        lines.push(`   ${pad(esc(k.label), 18)}: <span class="muted">${esc(k.value)} (실적 데이터 없음)</span>`);
      }
    });
  } else {
    lines.push(`   <span class="muted">KPI 미설정 · 카드 편집에서 추가</span>`);
  }
  lines.push('');
  lines.push(`<span class="bar">${SUB}</span>`);
  lines.push('');

  // ─── 1) 신규가입자 수 ───
  lines.push(`<span class="sec">1) 신규가입자 수 (이벤트 기간 내 가입)</span>`);
  lines.push(`   <span class="bar">${MIN}</span>`);
  if (r?.byClassification) {
    const cls = r.byClassification;
    const totalCls = (cls.new || 0) + (cls.old || 0) + (cls.none || 0);
    lines.push(`   new  (기간 내 신규 가입): <span class="b">${fmt(cls.new || 0)}</span>명`);
    lines.push(`   old  (이전 기존 가입)   : <span class="b">${fmt(cls.old || 0)}</span>명`);
    lines.push(`   none (미매칭/탈퇴 등)   : <span class="b">${fmt(cls.none || 0)}</span>명`);
    if (totalCls > 0) {
      const pctNew = ((cls.new || 0) / totalCls * 100).toFixed(1);
      const pctOld = ((cls.old || 0) / totalCls * 100).toFixed(1);
      lines.push(`   <span class="muted">→ 신규 가입 견인 ${pctNew}% / 휴면·기존 회원 활성화 ${pctOld}%</span>`);
    }
  } else {
    lines.push(`   <span class="muted">데이터를 입력해 주세요 · [📊 매칭 요청] 처리 후 자동 표시</span>`);
  }
  lines.push('');

  // ─── 2) 이력서 업데이트 수 ───
  lines.push(`<span class="sec">2) 이력서 업데이트 수${startStr ? ` (${startStr.replace(/^\d{4}[.\-/]/, '')} ~ ${endStr.replace(/^\d{4}[.\-/]/, '')} 기준)` : ''}</span>`);
  lines.push(`   <span class="bar">${MIN}</span>`);
  if (r) {
    lines.push(`   업데이트 Y: <span class="b">${fmt(r.resumeUpdated)}</span>명`);
    if (r.matched > 0) {
      const pctM = (r.resumeUpdated / r.matched * 100).toFixed(1);
      lines.push(`     · 매칭 대비 업데이트율 : ${pctM}%`);
    }
    if (ana?.unique > 0) {
      const pctA = (r.resumeUpdated / ana.unique * 100).toFixed(1);
      lines.push(`     · 전체 신청자 대비      : ${pctA}%`);
    }
  } else {
    lines.push(`   <span class="muted">데이터를 입력해 주세요 · [📊 매칭 요청] 처리 후 자동 표시</span>`);
  }
  lines.push('');

  // ─── 3) 직군 순위 ───
  lines.push(`<span class="sec">3) 직군 순위</span>`);
  lines.push(`   <span class="bar">${MIN}</span>`);
  if (ana?.columns) {
    const cats = Object.entries(ana.columns || {});
    // 직군 관련 컬럼 우선
    const jobCols = cats.filter(([h]) => /직군|직무|직종/.test(h));
    const subCols = cats.filter(([h]) => /^[67-8]열$|세부|기타$/.test(h));
    if (jobCols.length || subCols.length) {
      jobCols.forEach(([h, counts]) => {
        const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        const totalC = entries.reduce((s, [, c]) => s + c, 0);
        lines.push(`   <span class="muted">[${esc(h)}]</span>`);
        entries.slice(0, 6).forEach(([k, c], i) => {
          const pctV = (c / totalC * 100).toFixed(1);
          lines.push(`     ${i+1}. ${pad(esc(k), 24)} ${pad(fmt(c) + '명', 10, true)} <span class="muted">(${pctV}%)</span>`);
        });
      });
      if (subCols.length) {
        const merged = {};
        subCols.forEach(([, counts]) => Object.entries(counts).forEach(([k, c]) => { merged[k] = (merged[k] || 0) + c; }));
        const entries = Object.entries(merged).sort((a, b) => b[1] - a[1]);
        if (entries.length) {
          lines.push('');
          lines.push(`   <span class="muted">[세부 직무 TOP 15]</span>`);
          entries.slice(0, 15).forEach(([k, c], i) => {
            lines.push(`     ${pad((i+1) + '.', 5)} ${pad(esc(k), 24)} ${pad(fmt(c) + '명', 10, true)}`);
          });
        }
      }
    } else {
      // 폴백: 카테고리 컬럼 전체 표시
      cats.slice(0, 3).forEach(([h, counts]) => {
        const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        const totalC = entries.reduce((s, [, c]) => s + c, 0);
        lines.push(`   <span class="muted">[${esc(h)}]</span>`);
        entries.slice(0, 6).forEach(([k, c], i) => {
          const pctV = (c / totalC * 100).toFixed(1);
          lines.push(`     ${i+1}. ${pad(esc(k), 24)} ${pad(fmt(c) + '명', 10, true)} <span class="muted">(${pctV}%)</span>`);
        });
      });
    }
  } else {
    lines.push(`   <span class="muted">데이터를 입력해 주세요 · 시트 URL 추가 후 자동 분석</span>`);
  }
  lines.push('');

  // ─── 4) 일별 추이 ───
  lines.push(`<span class="sec">4) 신청자 일자별 추이</span>`);
  lines.push(`   <span class="bar">${MIN}</span>`);
  if (ana?.daily && ana.daily.length > 0) {
    const max = Math.max(...ana.daily.map(d => d.count), 1);
    ana.daily.forEach(d => {
      const barLen = Math.max(1, Math.round((d.count / max) * 28));
      const bar = '█'.repeat(barLen);
      const spike = d.count >= 500 ? ' 🔥' : '';
      const dateLabel = d.date.split('/').map(s => String(s).padStart(2, '0')).join('/');
      lines.push(`   ${pad(dateLabel, 6)} │ ${pad(fmt(d.count), 5, true)}  <span class="blue">${bar}</span>${spike}`);
    });
  } else {
    lines.push(`   <span class="muted">데이터를 입력해 주세요 · 시트 URL 추가 후 자동 분석</span>`);
  }
  lines.push('');
  lines.push(`<span class="bar">${SUB}</span>`);
  lines.push('');


  // 광고
  const adReport = getJSON('b2c_ad_report_' + p.id);
  if (adReport) {
    lines.push(`<span class="sec">[ 광고 효율 ]</span>`);
    lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
    if (adReport.spend != null) lines.push(`  ${pad('집행', 16)}${pad(fmt(adReport.spend) + '원', 16, true)}`);
    if (adReport.impressions != null) lines.push(`  ${pad('노출', 16)}${pad(fmt(adReport.impressions), 16, true)}`);
    if (adReport.clicks != null) lines.push(`  ${pad('클릭', 16)}${pad(fmt(adReport.clicks), 16, true)}`);
    if (adReport.ctr != null) lines.push(`  ${pad('CTR', 16)}${pad(adReport.ctr + '%', 16, true)}`);
    if (adReport.cpc != null) lines.push(`  ${pad('CPC', 16)}${pad(fmt(adReport.cpc) + '원', 16, true)}`);
    if (adReport.cpa != null) lines.push(`  ${pad('CPA (신청 단가)', 16)}${pad(fmt(adReport.cpa) + '원', 16, true)}`);
    lines.push('');
  }

  // 예산
  const budget = getJSON('b2c_budget_' + p.id);
  if (budget && budget.items && Array.isArray(budget.items)) {
    lines.push(`<span class="sec">[ 예산 / 품의 ]</span>`);
    lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
    budget.items.forEach(it => {
      lines.push(`  ${pad(esc(it.label || it.name || '항목'), 22)}${pad(fmt(it.amount) + '원', 14, true)}`);
    });
    const total = budget.items.reduce((s, it) => s + (Number(it.amount) || 0), 0);
    lines.push(`  <span class="bar">${'─'.repeat(36)}</span>`);
    lines.push(`  ${pad('합계', 22)}<span class="b">${pad(fmt(total) + '원', 14, true)}</span>`);
    lines.push('');
  }

  // 메모
  const note = p.note || p.description || '';
  if (note.trim()) {
    lines.push(`<span class="sec">[ 메모 ]</span>`);
    lines.push(`<span class="bar">${'─'.repeat(W)}</span>`);
    note.split('\n').forEach(l => lines.push(`  ${esc(l)}`));
    lines.push('');
  }

  return lines.join('\n');
}

// ─── 렌더 ───
let currentFilter = 'all';
function render() {
  const cards = getAllCards();
  const filtered = cards.filter(p => {
    if (currentFilter === 'all') return true;
    return getEffectiveStatus(p) === currentFilter;
  });
  // 정렬: ongoing → soon → done
  filtered.sort((a, b) => {
    const order = { ongoing: 0, soon: 1, done: 2 };
    const ka = order[getEffectiveStatus(a)] ?? 9;
    const kb = order[getEffectiveStatus(b)] ?? 9;
    return ka - kb;
  });

  const list = $('cardList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="e">📊</div>카드가 없어요. <br><br><button class="nav-btn primary" onclick="openAddModal()">＋ 첫 카드 추가</button></div>`;
    return;
  }
  list.innerHTML = filtered.map(p => `
    <div class="card" data-id="${esc(p.id)}">
      <div class="card-head" onclick="toggleCard('${esc(p.id)}')">
        <div class="head-left">
          <span class="head-emoji">${p.emoji || '📊'}</span>
          <div class="head-main">
            <div class="head-title">${esc(p.title || p.name || '(제목 없음)')}</div>
            <div class="head-meta">${cardSummary(p)}</div>
          </div>
        </div>
        <div class="head-right">
          <button class="icon-btn" data-act="refresh" onclick="event.stopPropagation(); refreshCard('${esc(p.id)}')" title="시트 새로고침">🔄</button>
          ${p.links?.sheet || (p.resources || []).some(u => /spreadsheets\/d\//.test(u || '')) ? `<button class="icon-btn" data-act="match" onclick="event.stopPropagation(); requestMatch('${esc(p.id)}')" title="이력서 매칭 요청">📊</button>` : ''}
          <button class="icon-btn" onclick="event.stopPropagation(); editCard('${esc(p.id)}')" title="편집">📝</button>
          <button class="icon-btn" onclick="event.stopPropagation(); deleteCard('${esc(p.id)}')" title="삭제">🗑</button>
          <span class="toggle">▼</span>
        </div>
      </div>
      <div class="card-body">${cardBody(p)}</div>
    </div>
  `).join('');
}

window.toggleCard = function(id) {
  const c = document.querySelector(`.card[data-id="${id}"]`);
  if (c) c.classList.toggle('open');
};

// ─── 모달 ───
let editingId = null;

window.openAddModal = function() {
  editingId = null;
  $('modalTitle').textContent = '＋ 카드 추가';
  $('f_emoji').value = '📊';
  $('f_title').value = '';
  $('f_start').value = '';
  $('f_end').value = '';
  $('f_status').value = 'ongoing';
  if ($('f_sheet')) $('f_sheet').value = '';
  $('f_links').value = '';
  $('f_note').value = '';
  $('kpiList').innerHTML = '';
  addKpiRow();
  $('editModal').classList.add('open');
};

window.editCard = function(id) {
  const p = getAllCards().find(c => c.id === id);
  if (!p) return;
  editingId = id;
  $('modalTitle').textContent = '📝 카드 편집';
  $('f_emoji').value = p.emoji || '📊';
  $('f_title').value = p.title || p.name || '';
  const m = String(p.period || '').match(/(\d{4}[.\-/]\d{1,2}[.\-/]\d{1,2}).*?(\d{4}[.\-/]\d{1,2}[.\-/]\d{1,2})/);
  $('f_start').value = m ? m[1] : '';
  $('f_end').value = m ? m[2] : '';
  $('f_status').value = p.status || 'ongoing';
  // 링크
  if ($('f_sheet')) $('f_sheet').value = p.links?.sheet || '';
  const linkLines = [];
  if (p.links?.notion) linkLines.push(p.links.notion);
  if (p.links?.figma) linkLines.push(p.links.figma);
  (p.resources || []).forEach(url => { if (url) linkLines.push(url); });
  $('f_links').value = linkLines.join('\n');
  $('f_note').value = p.note || p.description || '';
  // KPI
  $('kpiList').innerHTML = '';
  const kpis = (p.extKpis && p.extKpis.length ? p.extKpis : p.kpis || []).filter(k => k && k.label);
  if (kpis.length === 0) addKpiRow();
  else kpis.forEach(k => addKpiRow(k.label, k.value));
  $('editModal').classList.add('open');
};

window.closeModal = function() { $('editModal').classList.remove('open'); };

window.addKpiRow = function(label, value) {
  const row = document.createElement('div');
  row.className = 'kpi-row';
  row.innerHTML = `
    <input type="text" placeholder="지표 (예: 신청자)" value="${esc(label || '')}" />
    <input type="text" placeholder="목표값 (예: 1,000명)" value="${esc(value || '')}" />
    <button class="icon-btn" type="button" onclick="this.parentNode.remove()">×</button>
  `;
  $('kpiList').appendChild(row);
};

window.saveCard = function() {
  const title = $('f_title').value.trim();
  if (!title) { alert('제목 입력 필수'); return; }
  const start = $('f_start').value.trim();
  const end = $('f_end').value.trim();
  const period = start && end ? `${start} ~ ${end}` : (start || '');

  // KPI 수집
  const kpis = [];
  $('kpiList').querySelectorAll('.kpi-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const l = inputs[0]?.value.trim();
    const v = inputs[1]?.value.trim();
    if (l && v) kpis.push({ label: l, value: v });
  });

  // 링크 파싱 — 시트 URL은 별도 필드, 기타는 textarea
  const links = {};
  const resources = [];
  const sheetVal = ($('f_sheet')?.value || '').trim();
  if (sheetVal) links.sheet = sheetVal;
  $('f_links').value.split('\n').forEach(line => {
    const url = line.trim();
    if (!/^https?:\/\//.test(url)) return;
    if (/notion\.so|notion\.com/i.test(url)) links.notion = url;
    else if (/figma\.com/i.test(url)) links.figma = url;
    else if (/spreadsheets\/d\//.test(url) && !links.sheet) links.sheet = url;
    else resources.push(url);
  });

  const card = {
    id: editingId || ('user-' + Date.now()),
    emoji: $('f_emoji').value.trim() || '📊',
    title,
    period,
    status: $('f_status').value,
    kpis,
    links,
    resources,
    note: $('f_note').value
  };

  const list = loadMyCards();
  if (editingId) {
    const idx = list.findIndex(c => c.id === editingId);
    if (idx >= 0) list[idx] = { ...list[idx], ...card, id: editingId };
    else list.unshift(card);
  } else {
    list.unshift(card);
  }
  saveMyCards(list);
  closeModal();
  render();

  // 시트 URL 박혔으면 자동 fetch + 분석
  const sheetUrl = card.links?.sheet || (card.resources || []).find(u => /spreadsheets\/d\//.test(u || ''));
  if (sheetUrl) {
    showToast('🔄 시트 분석 중...', true);
    fetchSheetAuto(sheetUrl, { verbose: true }).then(c => {
      hideToast();
      if (c) {
        showToast('✅ 분석 완료 — ' + (c.rows?.length - 1 || 0) + '건');
        render();
        const el = document.querySelector(`.card[data-id="${card.id}"]`);
        if (el) el.classList.add('open');
      } else {
        showToast('⚠️ 분석 실패');
      }
    });
  }
};

window.deleteCard = function(id) {
  if (!confirm('삭제하시겠어요?')) return;
  const list = loadMyCards().filter(c => c.id !== id);
  saveMyCards(list);
  render();
};

// 필터 칩
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
  });
});

// 매칭 큐 상태 폴링 → 헤더 뱃지
async function pollQueue() {
  try {
    const r = await fetch('/api/match-queue');
    const data = await r.json();
    const pending = data?.pending || [];
    const badge = document.getElementById('queueBadge');
    const count = document.getElementById('queueCount');
    if (badge && count) {
      if (pending.length > 0) {
        count.textContent = pending.length;
        badge.style.display = '';
        badge.style.background = '#fff4db';
        badge.style.color = '#b57f00';
        badge.style.borderColor = '#ffb700';
        window.__pendingJobs = pending;
      } else {
        badge.style.display = 'none';
      }
    }
  } catch(e) { /* 조용히 실패 */ }
}

window.showQueueDetail = function() {
  const pending = window.__pendingJobs || [];
  if (!pending.length) { showToast('매칭 대기 없음'); return; }
  const msg = pending.map((j, i) => `${i+1}. ${j.title || j.projectId}\n   요청: ${(j.requestedAt || '').slice(0, 16).replace('T', ' ')}\n   시트: ${j.sheetUrl || '—'}`).join('\n\n');
  alert(`📊 매칭 대기 ${pending.length}건\n\n${msg}\n\n→ claude에 "큐 비워줘" 한 마디로 자동 처리됩니다.`);
};

// 첫 렌더 — projects-data.js 로드 대기 + 마이그레이션
function tryRender() {
  if (typeof window.getProject === 'function') {
    migrateLegacyIfNeeded();
    render();
    pollQueue();
    setInterval(pollQueue, 60000); // 1분마다 폴링
  } else {
    setTimeout(tryRender, 50);
  }
}
tryRender();
</script>
